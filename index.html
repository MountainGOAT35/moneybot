// == HELPER: all sundays in a date range ==
function allSundaysInRange(startMk, endMk){
  const result=[];
  let mk=startMk;
  while(mk<=endMk){
    getSundaysForMk(mk).forEach(s=>result.push(s));
    mk=offsetMk(mk,1);
  }
  return result;
}

// == HELPER: get all sundays for a year ==
function sundaysForYear(yr){ return sundaysForFY(yr); }

// == HELPER: build sorted item list for a set of sunday keys ==
function buildItemList(sundayKeys, sortBy='amount'){
  const items=[];
  shopRows().forEach(row=>{
    if(!row.desc) return;
    const total=sundayKeys.reduce((s,k)=>s+n((row.weeks||{})[k]),0);
    if(total>0) items.push({desc:row.desc, group:row.group||'', total});
  });
  if(sortBy==='amount') items.sort((a,b)=>b.total-a.total);
  else items.sort((a,b)=>a.desc.localeCompare(b.desc));
  return items;
}

// == HELPER: build store totals ==
function buildStoreTotals(sundayKeys){
  const stores={};
  const allGroups=[...shopGroups(),''];
  // Reset collapsed state whenever the active shop changes
  const currentShopId=activeShop()?.id||null;
  if(currentShopId!==lastRenderedShopId){
    collapsedGroups=new Set();
    lastRenderedShopId=currentShopId;
  }
  // Default: all groups including Other start collapsed
  if(collapsedGroups.size===0){ shopGroups().forEach(g=>collapsedGroups.add(g)); collapsedGroups.add(''); }
  allGroups.forEach(g=>{
    const total=sundayKeys.reduce((s,k)=>s+groupWeekTotal(g,k),0);
    if(total>0) stores[g||'Other']={total, items:[]};
  });
  shopRows().forEach(row=>{
    if(!row.desc) return;
    const total=sundayKeys.reduce((s,k)=>s+n((row.weeks||{})[k]),0);
    if(total<=0) return;
    const storeName=(row.group||'')===''?'Other':row.group;
    if(!stores[storeName]) stores[storeName]={total:0,items:[]};
    stores[storeName].items.push({desc:row.desc,total});
  });
  // sort items within each store
  Object.values(stores).forEach(s=>s.items.sort((a,b)=>b.total-a.total));
  return stores;
}

// == RENDER SUMMARY BAR ==
function summaryBar(budget, spent){
  const rem=budget-spent;
  const hasBud=budget>0;
  const pct=hasBud?Math.min(100,(spent/budget)*100):0;
  const over=spent>budget&&hasBud;
  return `<div class="summ-bar">
    ${hasBud?`<div class="summ-bar-item"><div class="lbl">Budget</div><div class="val">${cur()}${budget.toFixed(2)}</div></div>`:''}
    <div class="summ-bar-item"><div class="lbl">Spent</div><div class="val">${cur()}${spent.toFixed(2)}</div></div>
    ${hasBud?`<div class="summ-bar-item"><div class="lbl">Remaining</div><div class="val ${rem>=0?'pos':'neg'}">${rem<0?'-':''}${cur()}${Math.abs(rem).toFixed(2)}</div></div>`:''}
  </div>
  ${hasBud?`<div class="summ-prog"><div class="summ-prog-fill${over?' over':''}" style="width:${pct}%"></div></div>`:''}`;
}

// == RENDER STORE SECTIONS ==
function storeSections(storeTotals, sundayKeys, expandedStores, sortAlpha){
  if(Object.keys(storeTotals).length===0) return `<div class="summ-empty">No spending data for this period.</div>`;
  let html='';
  Object.entries(storeTotals).forEach(([storeName,store])=>{
    const isOpen=expandedStores.has(storeName);
    const id='store-'+storeName.replace(/\s+/g,'-');
    html+=`<div class="summ-section">
      <div class="summ-section-hdr" data-toggle="${esc(storeName)}">
        <span class="summ-section-title">${esc(storeName)}</span>
        <span class="summ-section-badge">${cur()}${store.total.toFixed(2)}</span>
        <span class="summ-section-chevron ${isOpen?'open':''}">▼</span>
      </div>`;
    if(isOpen){
      html+=`<div class="summ-section-body">`;
      const items=sortAlpha?[...store.items].sort((a,b)=>a.desc.localeCompare(b.desc)):store.items;
      items.forEach(item=>{
        const detailKey='detail-'+storeName+'-'+item.desc;
        const isExpanded=expandedStores.has(detailKey);
        // week-by-week detail for this item
        const weekDetails=sundayKeys.map(k=>{
          const v=n((shopRows().find(r=>r.desc===item.desc&&(r.group||'')===(storeName==='Other'?'':storeName))?.weeks||{})[k]);
          return v>0?{date:k,val:v}:null;
        }).filter(Boolean);
        html+=`<div class="summ-row" data-item-toggle="${esc(storeName+':'+item.desc)}">
          <span class="summ-row-name">${esc(item.desc)}</span>
          ${weekDetails.length>1?`<span class="summ-row-expand">${isExpanded?'▲':'▼'}</span>`:''}
          <span class="summ-row-amt">${cur()}${item.total.toFixed(2)}</span>
        </div>`;
        if(isExpanded&&weekDetails.length>1){
          html+=`<div class="summ-row-detail"><div class="summ-row-detail-inner">`;
          weekDetails.forEach(d=>{
            const wkD=new Date(d.date);
            html+=`<div class="summ-detail-row"><span>${dayLabel(wkD)}</span><span>${cur()}${d.val.toFixed(2)}</span></div>`;
          });
          html+=`</div></div>`;
        }
      });
      // sort toggle
      html+=`<div style="padding:8px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
        <button class="today-btn" data-sort-store="${esc(storeName)}">${sortAlpha?'Sort by amount':'Sort A–Z'}</button>
      </div>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  return html;
}

// == MAIN RENDER ==
function renderSummary(main){
  const todayMkNow=mkey(new Date());
  const todayYr=todayMkNow.split('-')[0];

  // initialise state
  if(!summaryWkKey){
    const suns=getSundaysForMk(todayMkNow);
    summaryWkKey=suns[Math.min(todayWkIdx(todayMkNow),suns.length-1)];
  }
  if(!summaryYr) summaryYr=todayYr;

  // per-render expanded state (stored on window to survive re-renders)
  if(!window._summExpanded) window._summExpanded=new Set();
  if(!window._summSortAlpha) window._summSortAlpha=new Set();

  const expanded=window._summExpanded;
  const minMk=offsetMk(todayMkNow,-13);
  const maxMk=offsetMk(todayMkNow,12);
  const minYr=minMk.split('-')[0];
  const maxYr=maxMk.split('-')[0];

  let html='';

  // == TOGGLE BAR ==
  html+=`<div class="summ-toggle">
    <button class="summ-tog-btn ${summaryView==='week'?'active':''}" data-sv="week">Week</button>
    <button class="summ-tog-btn ${summaryView==='month'?'active':''}" data-sv="month">Month</button>
    <button class="summ-tog-btn ${summaryView==='year'?'active':''}" data-sv="year">Year</button>
  </div>`;

  // ============== WEEK VIEW ==============
  if(summaryView==='week'){
    // Find all sundays across all months for navigation
    const allSuns=[];
    let mk2=minMk;
    while(mk2<=maxMk){ getSundaysForMk(mk2).forEach(s=>allSuns.push(s)); mk2=offsetMk(mk2,1); }
    allSuns.sort();
    const wkIdx=allSuns.indexOf(summaryWkKey);
    const canPrev=wkIdx>0; const canNext=wkIdx<allSuns.length-1;
    const wkD=new Date(summaryWkKey);
    const wkBud=n(shopWeekBudgets()[summaryWkKey]);
    const wkSpent=weekColTotal(summaryWkKey);
    const wkMk=summaryWkKey.substring(0,7);
    const wkSuns=getSundaysForMk(wkMk);
    const wkNum=wkSuns.indexOf(summaryWkKey)+1;

    html+=`<div class="summ-nav">
      <button class="mnav-btn" id="sv-prev" ${!canPrev?'disabled':''}>‹</button>
      <div class="summ-nav-lbl">Week ${wkNum} · ${dayLabel(wkD)}<span class="summ-nav-sub">${mLabel(wkMk)}</span></div>
      <button class="mnav-btn" id="sv-next" ${!canNext?'disabled':''}>›</button>
    </div>
    <button class="today-btn" id="sv-today" style="margin:10px 14px 0;display:inline-block">Today</button>`;

    html+=summaryBar(wkBud, wkSpent);
    const storeTotals=buildStoreTotals([summaryWkKey]);
    html+=storeSections(storeTotals,[summaryWkKey],expanded,false);
    if(wkSpent>0){
      html+=`<div class="summ-grand"><span>Week total</span><strong>${cur()}${wkSpent.toFixed(2)}</strong></div>`;
    }
  }

  // ============== MONTH VIEW ==============
  else if(summaryView==='month'){
    const suns=getSundaysForMk(currentMk);
    const moBud=calcMonthBudget(suns);
    const moSpent=grandMonthTotal(suns);
    const isCurrent=currentMk===todayMkNow;
    const isFuture=currentMk>todayMkNow;
    let badge='';
    if(isCurrent) badge='<span class="mnav-badge today" style="margin-left:6px">Today</span>';
    else if(isFuture) badge='<span class="mnav-badge future" style="margin-left:6px">Future</span>';

    html+=`<div class="summ-nav">
      <button class="mnav-btn" id="sv-prev" ${currentMk<=minMk?'disabled':''}>‹</button>
      <div class="summ-nav-lbl">${mLabel(currentMk)}${badge}</div>
      <button class="mnav-btn" id="sv-next" ${currentMk>=maxMk?'disabled':''}>›</button>
    </div>
    <button class="today-btn" id="sv-today" style="margin:10px 14px 0;display:inline-block">Today</button>`;

    html+=summaryBar(moBud, moSpent);

    // Weekly breakdown table
    html+=`<div class="summ-table">
      <div class="summ-table-row hdr" style="grid-template-columns:2fr 1fr 1fr 1fr">
        <div class="summ-tc bold">Week</div>
        <div class="summ-tc bold right">Budget</div>
        <div class="summ-tc bold right">Spent</div>
        <div class="summ-tc bold right">Left</div>
      </div>`;
    suns.forEach((sk,wi)=>{
      const wb=n(shopWeekBudgets()[sk]); const ws=weekColTotal(sk);
      const rem=wb-ws; const hasBud=wb>0;
      const d=new Date(sk);
      html+=`<div class="summ-table-row" style="grid-template-columns:2fr 1fr 1fr 1fr">
        <div class="summ-tc">Wk${wi+1} · ${dayLabel(d)}</div>
        <div class="summ-tc right">${hasBud?cur()+wb.toFixed(2):'—'}</div>
        <div class="summ-tc right">${ws>0?cur()+ws.toFixed(2):'—'}</div>
        <div class="summ-tc right ${hasBud?(rem>=0?'pos':'neg'):ws>0?'neg':''}">${hasBud||ws>0?(rem<0?'-':'')+cur()+Math.abs(rem).toFixed(2):'—'}</div>
      </div>`;
    });
    html+=`<div class="summ-table-row total" style="grid-template-columns:2fr 1fr 1fr 1fr">
      <div class="summ-tc wht bold">Month total</div>
      <div class="summ-tc wht-dim right">${moBud>0?cur()+moBud.toFixed(2):'—'}</div>
      <div class="summ-tc wht bold right">${moSpent>0?cur()+moSpent.toFixed(2):'—'}</div>
      <div class="summ-tc ${(moBud>0||moSpent>0)?(moSpent<=moBud||moBud===0)?'wht':'neg':''} bold right">${moBud>0||(moSpent>0&&moBud===0)?((moBud-moSpent)<0?'-':'')+cur()+Math.abs(moBud-moSpent).toFixed(2):'—'}</div>
    </div></div>`;

    // Store sections
    const storeTotals=buildStoreTotals(suns);
    html+=storeSections(storeTotals,suns,expanded,false);
    if(moSpent>0){
      html+=`<div class="summ-grand"><span>Month total</span><strong>${cur()}${moSpent.toFixed(2)}</strong></div>`;
    }

    // Top 5 items
    const items=buildItemList(suns);
    if(items.length>0){
      html+=`<div class="summ-insight"><h4>Top items this month</h4>`;
      items.slice(0,5).forEach((item,i)=>{
        html+=`<div class="summ-insight-row">
          <span class="rank">${i+1}</span>
          <span class="name">${esc(item.desc)} <span style="color:var(--muted);font-size:11px">${esc(item.group||'Other')}</span></span>
          <span class="amt">${cur()}${item.total.toFixed(2)}</span>
        </div>`;
      });
      html+=`</div>`;
    }

    // Trends
    const prevMk=offsetMk(currentMk,-1);
    const prevSuns=getSundaysForMk(prevMk);
    const prevSpent=grandMonthTotal(prevSuns);
    const diff=moSpent-prevSpent;
    if(prevSpent>0||moSpent>0){
      const diffStr=diff===0?'same as':(diff>0?`${cur()}${Math.abs(diff).toFixed(2)} more than`:`${cur()}${Math.abs(diff).toFixed(2)} less than`);
      html+=`<div class="summ-insight" style="background:var(--mo-bg);border-color:var(--mo-hdr)"><h4 style="color:var(--navy)">Trend</h4>
        <div class="summ-insight-row"><span class="name">vs last month (${mShort(prevMk)})</span><span class="amt" style="color:${diff>0?'var(--red)':diff<0?'var(--green)':'var(--muted)'}">${diffStr} last month</span></div>
      </div>`;
    }

    // YTD
    const yr=fyForMk(currentMk);
    const annBud=n(shopAnnualBudgets()[yr]);
    const annSp=yearTotal(yr);
    if(annBud>0||annSp>0){
      const annRem=annBud-annSp;
      html+=`<div class="summ-ytd">
        <div><span>Year to date (${fyLabel(yr)})</span><br><strong>${cur()}${annSp.toFixed(2)} spent</strong></div>
        ${annBud>0?`<div style="text-align:right"><span>of ${cur()}${annBud.toFixed(2)}</span><br><strong style="color:${annRem>=0?'#6EE7B7':'#FCA5A5'}">${cur()}${Math.abs(annRem).toFixed(2)} ${annRem>=0?'left':'over'}</strong></div>`:''}
      </div>`;
    }
  }

  // ============== YEAR VIEW ==============
  else if(summaryView==='year'){
    const canPrevYr=summaryYr>minYr; const canNextYr=summaryYr<maxYr;
    const allSuns=sundaysForFY(summaryYr);
    const annSpent=allSuns.reduce((s,k)=>s+weekColTotal(k),0);
    const annBud=n(shopAnnualBudgets()[summaryYr]);

    html+=`<div class="summ-nav">
      <button class="mnav-btn" id="sv-prev" ${!canPrevYr?'disabled':''}>‹</button>
      <div class="summ-nav-lbl">${fyLabel(summaryYr)}</div>
      <button class="mnav-btn" id="sv-next" ${!canNextYr?'disabled':''}>›</button>
    </div>`;

    html+=summaryBar(annBud, annSpent);

    // Month table
    html+=`<div class="summ-table">
      <div class="summ-table-row hdr" style="grid-template-columns:2fr 1fr 1fr 1fr">
        <div class="summ-tc bold">Month</div>
        <div class="summ-tc bold right">Budget</div>
        <div class="summ-tc bold right">Spent</div>
        <div class="summ-tc bold right">Left</div>
      </div>`;
    let totalBud=0; let totalSp=0;
    const {startMk:fyStart,endMk:fyEnd}=fyRange(summaryYr);
    let mk_iter=fyStart;
    const fyMonths=[];
    while(mk_iter<=fyEnd){ fyMonths.push(mk_iter); mk_iter=offsetMk(mk_iter,1); }
    for(let mi=0;mi<fyMonths.length;mi++){
      const m=parseInt(fyMonths[mi].split('-')[1]);
      const mk=fyMonths[mi];
      const suns=getSundaysForMk(mk);
      const bud=calcMonthBudget(suns);
      const sp=grandMonthTotal(suns);
      const rem=bud-sp; const hasBud=bud>0;
      totalBud+=bud; totalSp+=sp;
      const mName=new Date(parseInt(summaryYr),m-1,1).toLocaleString('default',{month:'short'});
      const isFut=mk>mkey(new Date());
      html+=`<div class="summ-table-row" style="grid-template-columns:2fr 1fr 1fr 1fr;${isFut?'opacity:.5':''}">
        <div class="summ-tc">${mName}</div>
        <div class="summ-tc right">${hasBud?cur()+bud.toFixed(2):'—'}</div>
        <div class="summ-tc right">${sp>0?cur()+sp.toFixed(2):'—'}</div>
        <div class="summ-tc right ${hasBud?(rem>=0?'pos':'neg'):sp>0?'neg':''}">${hasBud||sp>0?(rem<0?'-':'')+cur()+Math.abs(rem).toFixed(2):'—'}</div>
      </div>`;
    }
    html+=`<div class="summ-table-row total" style="grid-template-columns:2fr 1fr 1fr 1fr">
      <div class="summ-tc wht bold">Year total</div>
      <div class="summ-tc wht-dim right">${totalBud>0?cur()+totalBud.toFixed(2):'—'}</div>
      <div class="summ-tc wht bold right">${totalSp>0?cur()+totalSp.toFixed(2):'—'}</div>
      <div class="summ-tc wht bold right">${totalBud>0||(totalSp>0&&totalBud===0)?((totalBud-totalSp)<0?'-':'')+cur()+Math.abs(totalBud-totalSp).toFixed(2):'—'}</div>
    </div></div>`;

    // Store sections for year
    const storeTotals=buildStoreTotals(allSuns);
    html+=storeSections(storeTotals,allSuns,expanded,false);
    if(annSpent>0) html+=`<div class="summ-grand"><span>Year total</span><strong>${cur()}${annSpent.toFixed(2)}</strong></div>`;

    // Top 5 for year
    const items=buildItemList(allSuns);
    if(items.length>0){
      html+=`<div class="summ-insight"><h4>Top items this year</h4>`;
      items.slice(0,5).forEach((item,i)=>{
        html+=`<div class="summ-insight-row">
          <span class="rank">${i+1}</span>
          <span class="name">${esc(item.desc)} <span style="color:var(--muted);font-size:11px">${esc(item.group||'Other')}</span></span>
          <span class="amt">${cur()}${item.total.toFixed(2)}</span>
        </div>`;
      });
      html+=`</div>`;
    }

    // Year-on-year
    const prevYr=String(parseInt(summaryYr)-1);
    const prevYrSuns=sundaysForYear(prevYr);
    const prevYrSp=prevYrSuns.reduce((s,k)=>s+weekColTotal(k),0);
    if(prevYrSp>0){
      const diff=annSpent-prevYrSp;
      const diffStr=diff===0?'Same as':(diff>0?`${cur()}${Math.abs(diff).toFixed(2)} more than`:`${cur()}${Math.abs(diff).toFixed(2)} less than`);
      html+=`<div class="summ-insight" style="background:var(--mo-bg);border-color:var(--mo-hdr)"><h4 style="color:var(--navy)">Year on Year</h4>
        <div class="summ-insight-row"><span class="name">vs ${prevYr}</span><span class="amt" style="color:${diff>0?'var(--red)':diff<0?'var(--green)':'var(--muted)'}">${diffStr} ${prevYr}</span></div>
      </div>`;
    }
  }

  main.innerHTML=`<div class="summ-wrap">${html}</div>`;

  // == EVENTS ==
  // Toggle
  main.querySelectorAll('[data-sv]').forEach(btn=>{
    btn.onclick=()=>{ summaryView=btn.dataset.sv; renderPage(); };
  });

  // Navigation
  const prev=document.getElementById('sv-prev');
  const next=document.getElementById('sv-next');
  const todayBtn=document.getElementById('sv-today');

  if(prev) prev.onclick=()=>{
    if(summaryView==='week'){
      const allSuns=[];
      let mk2=minMk; while(mk2<=maxMk){ getSundaysForMk(mk2).forEach(s=>allSuns.push(s)); mk2=offsetMk(mk2,1); }
      allSuns.sort();
      const i=allSuns.indexOf(summaryWkKey);
      if(i>0){ summaryWkKey=allSuns[i-1]; renderPage(); }
    } else if(summaryView==='month'){
      if(currentMk>minMk){ currentMk=offsetMk(currentMk,-1); renderPage(); }
    } else if(summaryView==='year'){
      if(summaryYr>minYr){ summaryYr=String(parseInt(summaryYr)-1); renderPage(); }
    }
  };
  if(next) next.onclick=()=>{
    if(summaryView==='week'){
      const allSuns=[];
      let mk2=minMk; while(mk2<=maxMk){ getSundaysForMk(mk2).forEach(s=>allSuns.push(s)); mk2=offsetMk(mk2,1); }
      allSuns.sort();
      const i=allSuns.indexOf(summaryWkKey);
      if(i<allSuns.length-1){ summaryWkKey=allSuns[i+1]; renderPage(); }
    } else if(summaryView==='month'){
      if(currentMk<maxMk){ currentMk=offsetMk(currentMk,1); renderPage(); }
    } else if(summaryView==='year'){
      if(summaryYr<maxYr){ summaryYr=String(parseInt(summaryYr)+1); renderPage(); }
    }
  };
  if(todayBtn) todayBtn.onclick=()=>{
    if(summaryView==='week'){
      const suns=getSundaysForMk(todayMkNow);
      summaryWkKey=suns[Math.min(todayWkIdx(todayMkNow),suns.length-1)];
    } else if(summaryView==='month'){
      currentMk=todayMkNow;
    } else {
      summaryYr=todayYr;
    }
    renderPage();
  };

  // Store expand/collapse
  main.querySelectorAll('[data-toggle]').forEach(el=>{
    el.onclick=()=>{
      const name=el.dataset.toggle;
      if(expanded.has(name)) expanded.delete(name); else expanded.add(name);
      renderPage();
    };
  });

  // Item expand/collapse
  main.querySelectorAll('[data-item-toggle]').forEach(el=>{
    el.onclick=()=>{
      const key='detail-'+el.dataset.itemToggle;
      if(expanded.has(key)) expanded.delete(key); else expanded.add(key);
      renderPage();
    };
  });
}

function openKeypad(initialVal, onDone){
  const ov=document.getElementById('kpov');
  const mod=document.getElementById('kpmod');
  if(!mod) return;

  let val=initialVal||'';

  const renderKeypad=()=>{
    const displayHtml=val
      ?`<span>${val}</span>`
      :`<span class="empty">0.00</span>`;

    mod.innerHTML=`
      <div class="kp-display-row">
        <span class="kp-display-lbl">Price each (${cur()})</span>
        <div class="kp-display${val?'':' empty'}" id="kp-disp">${val||'0.00'}</div>
      </div>
      <div class="kp-grid">
        <button class="kp-key" data-k="1">1</button>
        <button class="kp-key" data-k="2">2</button>
        <button class="kp-key" data-k="3">3</button>
        <button class="kp-key" data-k="4">4</button>
        <button class="kp-key" data-k="5">5</button>
        <button class="kp-key" data-k="6">6</button>
        <button class="kp-key" data-k="7">7</button>
        <button class="kp-key" data-k="8">8</button>
        <button class="kp-key" data-k="9">9</button>
        <button class="kp-key kp-dot" data-k=".">.</button>
        <button class="kp-key" data-k="0">0</button>
        <button class="kp-key kp-back" data-k="back">⌫</button>
      </div>
      <button class="kp-done" id="kp-done">Done</button>
      <button class="kp-done" id="kp-clear" style="background:var(--bg);color:var(--muted);border:1px solid var(--border);margin-top:6px">Clear</button>`;

    mod.classList.add('open');
    ov.classList.add('open');

    mod.querySelectorAll('.kp-key').forEach(btn=>{
      btn.onclick=()=>{
        const k=btn.dataset.k;
        if(k==='back'){
          val=val.slice(0,-1);
        } else if(k==='.'){
          if(!val.includes('.')) val+='.';
        } else {
          // prevent more than 2 decimal places
          const parts=val.split('.');
          if(parts.length===2&&parts[1].length>=2) return;
          // prevent leading zeros
          if(val==='0') val=k;
          else val+=k;
        }
        const disp=document.getElementById('kp-disp');
        if(disp){
          const fv=val?(val.includes('.')?val+(val.split('.')[1]&&val.split('.')[1].length===1&&!val.endsWith('.')?'0':''):(parseFloat(val)||0).toFixed(2)):'0.00';
          disp.textContent=fv; disp.className='kp-display'+(val?'':' empty');
        }
      };
    });

    document.getElementById('kp-clear').onclick=()=>{
      val='';
      const disp=document.getElementById('kp-disp');
      if(disp){ disp.textContent='0.00'; disp.className='kp-display empty'; }
      // Stay open — user wants to type a new price
    };
    document.getElementById('kp-done').onclick=()=>{
      closeKeypad();
      onDone(val);
    };
    // Tap overlay to dismiss without saving
    ov.onclick=()=>closeKeypad();
  };

  renderKeypad();
}

function closeKeypad(){
  document.getElementById('kpmod')?.classList.remove('open');
  document.getElementById('kpov')?.classList.remove('open');
}

function openQtyPicker(ri, weekKey, grp){
  const ov=document.getElementById('qpov');
  const mod=document.getElementById('qpmod');
  if(!mod) return;

  const rows=shopRows();
  if(!rows||ri<0||ri>=rows.length){
    console.warn('openQtyPicker: invalid row index',ri,'rows length',rows?.length);
    return;
  }
  const row=rows[ri];
  if(!row){ console.warn('openQtyPicker: row not found at',ri); return; }

  // Find product — first in specified store, then any store
  const prods=shopStoreProducts()[grp]||[];
  let prod=prods.find(p=>p.desc===row.desc&&!p.archived);
  if(!prod){
    // Search all stores
    for(const g of Object.keys(shopStoreProducts()||{})){
      const found=(shopStoreProducts()[g]||[]).find(p=>p.desc===row.desc&&!p.archived);
      if(found){ prod=found; break; }
    }
  }
  // Derive price from stored amount / qty if product has no price
  const storedQty=row.qtys?row.qtys[weekKey]:null;
  const storedAmt=n((row.weeks||{})[weekKey]);
  let derivedPrice='';
  if(!prod?.price&&storedAmt>0&&storedQty){
    derivedPrice=(storedAmt/parseInt(storedQty)).toFixed(2);
  }
  const storedPrice=prod?.price||derivedPrice||'';

  const render=()=>{
    const priceVal=document.getElementById('qp-price')?.value||storedPrice||'';
    const hasPrice=priceVal&&parseFloat(priceVal)>0;
    const hoveredQty=null;

    let html=`<div class="qpmod-hdr">
      <div>
        <div class="qpmod-title">How many?</div>
        <div class="qpmod-desc">${esc(row.desc)}${grp?' · '+esc(grp):''}</div>
      </div>
      <button class="qp-close" id="qp-close-btn">&times;</button>
    </div>
    <div class="qpmod-body">
      <div class="qp-price-row" style="cursor:pointer" id="qp-price-row">
        <span class="qp-price-lbl">Price each</span>
        <span class="qp-price-sym">${cur()}</span>
        <div id="qp-price-display" class="qp-price-in" style="display:flex;align-items:center;justify-content:flex-end;cursor:pointer;min-height:44px" data-val="${esc(priceVal)}">
          ${priceVal&&parseFloat(priceVal)>0?parseFloat(priceVal).toFixed(2):'<span style="color:#bbb;font-weight:400;font-size:14px">tap to enter</span>'}
        </div>
      </div>
      <div class="qp-no-price${hasPrice?'':' show'}" id="qp-no-price-msg">Enter a price above, then tap a quantity.</div>
      <div class="qp-grid">`;

    for(let q=1;q<=10;q++){
      const total=hasPrice?(parseFloat(priceVal)*q).toFixed(2):null;
      const isActive=storedQty&&parseInt(storedQty)===q;
      html+=`<button class="qp-btn${(hasPrice||isActive)?'':' disabled'}${isActive?' qp-active':''}" data-q="${q}" title="${hasPrice?cur()+total:''}">${q}</button>`;
    }
    html+=`</div>
      <div class="qp-total" id="qp-total">${hasPrice?'Tap a number to set quantity':'—'}</div>
      ${(row.weeks||{})[weekKey]?'<button id="qp-clear-btn" style="width:100%;margin-top:8px;padding:11px;border:1px solid var(--border);border-radius:10px;background:var(--bg);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--font)">Clear this week’s amount</button>':''}
    </div>`;

    mod.innerHTML=html;
    mod.classList.add('open');
    ov.classList.add('open');

    document.getElementById('qp-close-btn').onclick=closeQtyPicker;
    ov.onclick=closeQtyPicker;
    const clearBtn=document.getElementById('qp-clear-btn');
    if(clearBtn) clearBtn.onclick=()=>{
      if(shopRows()[ri]&&shopRows()[ri].weeks) delete shopRows()[ri].weeks[weekKey];
      if(shopRows()[ri]&&shopRows()[ri].qtys) delete shopRows()[ri].qtys[weekKey];
      ensureGroupBlanks(); save();
      closeQtyPicker(); renderPage();
    };

    // Tap price display to open keypad
    document.getElementById('qp-price-row').onclick=()=>{
      const curVal=document.getElementById('qp-price-display').dataset.val||'';
      openKeypad(curVal, (newVal)=>{
        const disp=document.getElementById('qp-price-display');
        if(disp){
          disp.dataset.val=newVal;
          const fmtNew=newVal&&parseFloat(newVal)>0?parseFloat(newVal).toFixed(2):null;
          disp.innerHTML=fmtNew||'<span style="color:#bbb;font-weight:400;font-size:14px">tap to enter</span>';
        }
        const p=parseFloat(newVal)||0;
        const hasP=p>0;
        const msg=document.getElementById('qp-no-price-msg');
        if(msg) msg.classList.toggle('show',!hasP);
        document.getElementById('qpmod')?.querySelectorAll('.qp-btn').forEach(btn=>{
          btn.classList.toggle('disabled',!hasP);
          const q=parseInt(btn.dataset.q);
          btn.title=hasP?cur()+(p*q).toFixed(2):'';
        });
        const tot=document.getElementById('qp-total');
        if(tot) tot.textContent=hasP?'Tap a number to set quantity':'—';
      });
    };

    // Hover preview
    mod.querySelectorAll('.qp-btn').forEach(btn=>{
      btn.onmouseenter=()=>{
        const priceDisp2=document.getElementById('qp-price-display');
        const p=parseFloat(priceDisp2?priceDisp2.dataset.val:'')||0;
        const q=parseInt(btn.dataset.q);
        if(p>0) document.getElementById('qp-total').textContent=`${q} × ${cur()}${p.toFixed(2)} = ${cur()}${(p*q).toFixed(2)}`;
      };
      btn.onmouseleave=()=>{
        const priceDisp3=document.getElementById('qp-price-display');
        const p=parseFloat(priceDisp3?priceDisp3.dataset.val:'')||0;
        document.getElementById('qp-total').textContent=p>0?'Tap a number to set quantity':'—';
      };
      btn.onclick=()=>{
        const priceDisp=document.getElementById('qp-price-display');
        const p=parseFloat(priceDisp?priceDisp.dataset.val:'')||0;
        if(!p) return;
        const q=parseInt(btn.dataset.q);
        const total=(p*q).toFixed(2);

        // Save amount and qty to row
        if(!shopRows()[ri].weeks) shopRows()[ri].weeks={};
        shopRows()[ri].weeks[weekKey]=total;
        if(!shopRows()[ri].qtys) shopRows()[ri].qtys={};
        shopRows()[ri].qtys[weekKey]=String(q);

        // Check if price has changed vs stored
        const newPrice=p.toFixed(2);
        // Also update stored price if previously blank
        if(prod&&!storedPrice){
          prod.price=newPrice; save();
        }
        if(prod&&storedPrice&&parseFloat(storedPrice).toFixed(2)!==newPrice){
          // Price changed — ask to archive
          closeQtyPicker();
          const msg='The stored price for "'+row.desc+'" was '+cur()+parseFloat(storedPrice).toFixed(2)+'. You used '+cur()+newPrice+'. Archive the old price and update to '+cur()+newPrice+'?';
          confirmModal('Price has changed', msg, ()=>{
              if(!prod.priceHistory) prod.priceHistory=[];
              prod.priceHistory.push({price:storedPrice,date:new Date().toISOString().split('T')[0]});
              prod.price=newPrice;
              save(); renderPage();
            },
            'Update & Archive'
          );
          // Still save the amount even if they cancel the price update
          save(); renderPage();
        } else {
          // Update price if new (no previous)
          if(prod&&!storedPrice){
            prod.price=newPrice;
          }
          save();
          closeQtyPicker();
          renderPage();
        }
      };
    });
  };

  render();
}

function closeQtyPicker(){
  document.getElementById('qpmod')?.classList.remove('open');
  document.getElementById('qpov')?.classList.remove('open');
}

let prodStoreIdx=0;
let prodShowArch={};

function renderProductsPage(main){
  migrateStoreProducts(db);
  const allGrps=[...shopGroups(),''];
  const storeNames=allGrps.map(g=>g||'Other');
  if(prodStoreIdx>=allGrps.length) prodStoreIdx=0;
  const grp=allGrps[prodStoreIdx];
  const name=storeNames[prodStoreIdx];
  const prods=shopStoreProducts()[grp]||[];
  const active=prods.filter(p=>!p.archived);
  const archived=prods.filter(p=>p.archived);
  const showArch=prodShowArch[grp]||false;

  let html=`<div class="prods-wrap">
    <div class="prods-nav">
      <button class="mnav-btn" id="psp" ${prodStoreIdx===0?'disabled':''}>‹</button>
      <div class="prods-store-name">${esc(name)}</div>
      <button class="mnav-btn" id="psn" ${prodStoreIdx>=allGrps.length-1?'disabled':''}>›</button>
    </div>
    <div class="prods-body">`;

  if(active.length===0){
    html+=`<div class="pp-empty" style="padding:24px 0">No products yet. Add one below.</div>`;
  } else {
    active.forEach(p=>{
      const idx=prods.indexOf(p);
      html+=`<div class="prod-row">
        <div class="prod-row-desc" title="${esc(p.desc)}">${esc(p.desc)}</div>
        <input class="prod-price-in" type="number" min="0" step="0.01" placeholder="price"
          value="${esc(p.price||'')}" data-a="pprice" data-grp="${esc(grp)}" data-idx="${idx}">
        <button class="prod-arch-btn" data-a="parch" data-grp="${esc(grp)}" data-idx="${idx}">Archive</button>
        <button class="prod-del-btn" data-a="pdel" data-grp="${esc(grp)}" data-idx="${idx}">×</button>
      </div>`;
    });
  }

  if(archived.length>0){
    html+=`<div class="prods-arch-hdr" data-a="ptogglearch" data-grp="${esc(grp)}">
      ${showArch?'▼':'▶'} Archived (${archived.length})
    </div>`;
    if(showArch){
      archived.forEach(p=>{
        const idx=prods.indexOf(p);
        html+=`<div class="prod-row archived-row">
          <div class="prod-row-desc">${esc(p.desc)}</div>
          <div style="font-size:12px;color:var(--muted);margin-right:4px">${p.price?cur()+parseFloat(p.price).toFixed(2):'no price'}</div>
          <button class="prod-arch-btn" data-a="punarch" data-grp="${esc(grp)}" data-idx="${idx}">Restore</button>
          <button class="prod-del-btn" data-a="pdel" data-grp="${esc(grp)}" data-idx="${idx}">×</button>
        </div>`;
      });
    }
  }

  html+=`</div>
    <div class="prods-add-bar">
      <input class="ppmod-add-in" id="pp-page-new" placeholder="New product name…" autocomplete="off" autocorrect="off" spellcheck="false" style="flex:1">
      <button class="admin-btn-sm" id="pp-page-add" style="padding:9px 14px;flex-shrink:0">Add</button>
      <button class="admin-btn-sm" id="pp-back" style="padding:9px 14px;flex-shrink:0">← Back</button>
    </div>
  </div>`;

  main.innerHTML=html;

  document.getElementById('psp').onclick=()=>{ prodStoreIdx=Math.max(0,prodStoreIdx-1); renderPage(); };
  document.getElementById('psn').onclick=()=>{ prodStoreIdx=Math.min(allGrps.length-1,prodStoreIdx+1); renderPage(); };
  document.getElementById('pp-back').onclick=()=>{ currentPage='admin'; renderPage(); };

  const doPageAdd=()=>{
    const v=(document.getElementById('pp-page-new').value||'').trim();
    if(!v) return;
    if(!shopStoreProducts()[grp]) shopStoreProducts()[grp]=[];
    if(!shopStoreProducts()[grp].find(p=>p.desc===v)){
      shopStoreProducts()[grp].push({desc:v,price:'',archived:false,priceHistory:[]});
      save(); renderPage();
    } else {
      const ni=document.getElementById('pp-page-new'); if(ni){ ni.value=''; }
    }
  };
  document.getElementById('pp-page-add').onclick=doPageAdd;
  document.getElementById('pp-page-new').onkeydown=e=>{ if(e.key==='Enter') doPageAdd(); };

  main.querySelectorAll('[data-a="pprice"]').forEach(inp=>{
    inp.onchange=()=>{
      const g=inp.dataset.grp; const idx=parseInt(inp.dataset.idx);
      if(shopStoreProducts()[g]&&shopStoreProducts()[g][idx]){
        shopStoreProducts()[g][idx].price=inp.value; save();
      }
    };
  });

  main.addEventListener('click',e=>{
    const el=e.target.closest('[data-a]'); if(!el) return;
    const a=el.dataset.a; const g=el.dataset.grp; const idx=parseInt(el.dataset.idx);
    if(a==='parch'){
      if(shopStoreProducts()[g]&&shopStoreProducts()[g][idx]){ shopStoreProducts()[g][idx].archived=true; save(); renderPage(); }
    } else if(a==='punarch'){
      if(shopStoreProducts()[g]&&shopStoreProducts()[g][idx]){ shopStoreProducts()[g][idx].archived=false; save(); renderPage(); }
    } else if(a==='pdel'){
      const p=shopStoreProducts()[g]&&shopStoreProducts()[g][idx];
      if(!p) return;
      confirmModal(`Delete "${p.desc}"?`,'This permanently removes the product.',()=>{
        shopStoreProducts()[g].splice(idx,1); save(); renderPage();
      },'Delete','danger');
    } else if(a==='phist'){
      prodShowArch['hist_'+el.dataset.grp+'_'+el.dataset.idx]=!prodShowArch['hist_'+el.dataset.grp+'_'+el.dataset.idx]; renderPage();
    } else if(a==='ptogglearch'){
      prodShowArch[el.dataset.grp]=!prodShowArch[el.dataset.grp]; renderPage();
    }
  });
}

function renderCards(main){
  if(!shopCardGroups()) shopCardGroups()=[];
  if(!activeShop().cards) activeShop().cards=[];
  if(!shopCardData()) shopCardData()={};
  if(!shopCardData()[currentMk]) shopCardData()[currentMk]={entries:{}};
  const mcd=shopCardData()[currentMk];
  if(!mcd.entries) mcd.entries={};

  const todayMkNow=mkey(new Date());
  const minMk=offsetMk(todayMkNow,-13);
  const maxMk=offsetMk(todayMkNow,12);
  const isCurrent=currentMk===todayMkNow;
  const isFuture=currentMk>todayMkNow;

  let badgeHtml='';
  if(isCurrent) badgeHtml='<span class="mnav-badge today">Today</span>';
  else if(isFuture) badgeHtml='<span class="mnav-badge future">Future</span>';

  // grand total
  const grandTotal=shopCards().reduce((s,card)=>s+n((mcd.entries[card.name]||{}).amount),0);

  const shopName=activeShop()?.name||'Shop';
  const shopColor=activeShop()?.color||'#2563EB';
  let html=`<div class="shop-header-banner" style="background:${shopColor}"><strong>${esc(shopName)}</strong> <span style="opacity:.6;font-size:11px">tap Shop to switch</span></div><div style="border-left:5px solid ${shopColor}">
  <div class="mnavbar">
    <button class="mnav-btn" id="cmn-prev" ${currentMk<=minMk?'disabled':''}>‹</button>
    <div class="mnav-center"><span class="mnav-month">${mLabel(currentMk)}</span>${badgeHtml}</div>
    <button class="mnav-btn" id="cmn-next" ${currentMk>=maxMk?'disabled':''}>›</button>
  </div>
  <div class="cards-wrap"><div class="cards-grid">`;

  // == HEADER ROW ==
  html+=`<div class="gc hdr"><div class="hdr-inner"><div class="hdr-lbl">Card</div></div></div>`;
  html+=`<div class="gc hdr"><div class="hdr-inner"><div class="hdr-lbl">Statement date</div></div></div>`;
  html+=`<div class="gc hdr"><div class="hdr-inner"><div class="hdr-lbl">Due date</div></div></div>`;
  html+=`<div class="gc amt-hdr"><div class="hdr-inner"><div class="hdr-lbl">Amount</div></div></div>`;

  if(shopCardGroups().length===0 && shopCards().length===0){
    html+=`<div class="gc" style="grid-column:1/-1;padding:20px 14px;color:var(--muted);font-size:13px;font-style:italic">
      No groups or cards yet — add a group below to get started.
    </div>`;
  } else {
    // == GROUPS ==
    const allGroups=[...shopCardGroups(), {name:'',budget:''}];
    allGroups.forEach(grp=>{
      const grpCards=shopCards().filter(card=>(card.group||'')===grp.name);
      if(grp.name==='' && grpCards.length===0) return; // skip empty ungrouped

      const grpTotal=grpCards.reduce((s,card)=>s+n((mcd.entries[card.name]||{}).amount),0);
      const grpBudget=n(grp.budget);

      // group header row
      if(grp.name){
        html+=`<div class="gc grp-span" style="grid-column:1/-1;background:var(--grp-hdr)">
          <div class="grp-cell">
            <span class="grp-name">${esc(grp.name)}</span>
            <span style="font-size:11px;color:var(--muted);margin-right:6px">Budget:</span>
            <input class="bud-in" type="number" min="0" step="0.01" placeholder="0"
              value="${esc(grp.budget||'')}" data-a="grp-budget" data-grp="${esc(grp.name)}"
              style="width:80px;font-size:13px">
            <button class="grp-del" data-a="del-card-grp" data-grp="${esc(grp.name)}" title="Remove group">×</button>
          </div>
        </div>`;
      }

      // card rows in this group
      grpCards.forEach(card=>{
        const e=mcd.entries[card.name]||{};
        html+=`<div class="gc" style="display:flex;align-items:center;padding:0 8px;height:46px;font-size:13px;font-weight:500;gap:6px">
          <span style="flex:1">${esc(card.name)}</span>
          <button style="background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px;border-radius:4px;font-family:var(--font)" data-a="del-card" data-card="${esc(card.name)}" title="Remove card">×</button>
        </div>`;
        html+=`<div class="gc"><input class="card-in" type="text" placeholder="e.g. 15 Apr"
          value="${esc(e.statDate||'')}" data-a="card-stat" data-card="${esc(card.name)}" autocomplete="off"></div>`;
        html+=`<div class="gc"><input class="card-in" type="text" placeholder="e.g. 22 Apr"
          value="${esc(e.dueDate||'')}" data-a="card-due" data-card="${esc(card.name)}" autocomplete="off"></div>`;
        html+=`<div class="gc amt-cell"><input class="card-in right" type="number" min="0" step="0.01" placeholder="0.00"
          value="${esc(e.amount||'')}" data-a="card-amt" data-card="${esc(card.name)}"></div>`;
      });

      // group subtotal + remaining (only for named groups)
      if(grp.name){
        html+=`<div class="gc sub"><div class="tp lbl">${esc(grp.name)} subtotal</div></div>`;
        html+=`<div class="gc sub"></div>`;
        html+=`<div class="gc sub"></div>`;
        html+=`<div class="gc sub amt-cell"><div class="tp num">${grpTotal>0?fmtPos(grpTotal):'—'}</div></div>`;

        html+=`<div class="gc tot"><div class="tp lbl">Remaining</div></div>`;
        html+=`<div class="gc tot"></div>`;
        html+=`<div class="gc tot"></div>`;
        html+=`<div class="gc tot amt-cell">${remSpan(grpBudget-grpTotal,grpBudget>0,grpTotal)}</div>`;
      }
    });
  }

  // == GRAND TOTAL ==
  html+=`<div class="gc tot strong-top"><div class="tp lbl">Grand total</div></div>`;
  html+=`<div class="gc tot strong-top"></div>`;
  html+=`<div class="gc tot strong-top"></div>`;
  html+=`<div class="gc tot amt-cell strong-top"><div class="tp num">${grandTotal>0?fmtPos(grandTotal):'—'}</div></div>`;

  html+=`</div></div>`;

  // buttons bar
  html+=`<div class="add-card-bar" style="gap:10px;flex-wrap:wrap">
    <button class="add-grp-btn" id="add-cgrp-btn">＋ Add group</button>
    <button class="add-grp-btn" id="add-card-btn">＋ Add card</button>
  </div>`;

  main.innerHTML=html;

  // Month nav
  document.getElementById('cmn-prev').onclick=()=>{ currentMk=offsetMk(currentMk,-1); renderPage(); };
  document.getElementById('cmn-next').onclick=()=>{ currentMk=offsetMk(currentMk,1); renderPage(); };

  // Add group
  document.getElementById('add-cgrp-btn').onclick=()=>{
    showInputModal('Add card group','Group name (e.g. Food)',name=>{
      if(name&&!shopCardGroups().find(g=>g.name===name)){
        shopCardGroups().push({name,budget:''});
        save();
      }
      renderPage();
    });
  };

  // Add card — ask which group
  document.getElementById('add-card-btn').onclick=()=>{
    showInputModal('Add credit card','Card name (e.g. Barclays)',name=>{
      if(!name) return;
      if(shopCards().find(c=>c.name===name)){ renderPage(); return; }
      if(shopCardGroups().length===0){
        shopCards().push({name,group:''});
        save(); renderPage();
      } else {
        // Ask which group
        const opts=shopCardGroups().map(g=>g.name).concat(['(no group)']);
        const box=document.getElementById('modal-box');
        const ov=document.getElementById('modal-overlay');
        const btns=opts.map((o,i)=>`<button class="modal-btn" data-modal-cb="grp_${i}">${esc(o)}</button>`).join('');
        box.innerHTML=`<div class="modal-title">Assign "${esc(name)}" to a group</div><div class="modal-body">Which group does this card belong to?</div><div class="modal-btns" style="flex-wrap:wrap">${btns}</div>`;
        box._cbs={};
        opts.forEach((o,i)=>{
          box._cbs[`grp_${i}`]=()=>{
            const grp=o==='(no group)'?'':o;
            shopCards().push({name,group:grp});
            save(); renderPage();
          };
        });
        box.style.display='block'; ov.style.display='block';
      }
    });
  };

  // Grid events
  const grid=document.querySelector('.cards-grid');
  if(!grid) return;
  grid.addEventListener('change',e=>{
    const el=e.target; const a=el.dataset.a;
    if(!shopCardData()[currentMk]) shopCardData()[currentMk]={entries:{}};
    const mcd2=shopCardData()[currentMk];
    if(a==='grp-budget'){
      const grp=shopCardGroups().find(g=>g.name===el.dataset.grp);
      if(grp){ grp.budget=el.value; save(); renderPage(); }
    } else if(a==='card-stat'||a==='card-due'||a==='card-amt'){
      const card=el.dataset.card;
      if(!mcd2.entries[card]) mcd2.entries[card]={};
      if(a==='card-stat') mcd2.entries[card].statDate=el.value;
      else if(a==='card-due') mcd2.entries[card].dueDate=el.value;
      else mcd2.entries[card].amount=el.value;
      save(); renderPage();
    }
  });
  grid.addEventListener('click',e=>{
    const a=e.target.dataset.a;
    if(a==='del-card'){
      const cardName=e.target.dataset.card;
      confirmModal(`Remove "${cardName}"?`,'This removes the card and all its payment data.',()=>{
        const i=shopCards().findIndex(c=>c.name===cardName); if(i>-1) shopCards().splice(i,1);
        Object.values(shopCardData()).forEach(md=>{ if(md.entries) delete md.entries[cardName]; });
        save(); renderPage();
      },'Remove','danger');
    } else if(a==='del-card-grp'){
      const grpName=e.target.dataset.grp;
      confirmModal(`Remove group "${grpName}"?`,'Cards in this group will become ungrouped. No payment data is deleted.',()=>{
        const i=shopCardGroups().findIndex(g=>g.name===grpName); if(i>-1) shopCardGroups().splice(i,1);
        shopCards().forEach(c=>{ if(c.group===grpName) c.group=''; });
        save(); renderPage();
      },'Remove','danger');
    }
  });
}

  function buildCSV(monthOnly){
    const lines=[];
    lines.push('APP_VERSION,'+APP_VER.replace('v',''));
    lines.push('CURRENCY,'+esc(cur()));
    lines.push('YEAR_START_MONTH,'+(db.yearStartMonth||1));
    // Annual budgets
    Object.entries(shopAnnualBudgets()||{}).forEach(([fy,bud])=>{
      lines.push('ANNUAL_BUDGET,'+fy+','+bud);
    });
    lines.push('');

    // Descriptions
    lines.push('DESCRIPTIONS');
    (db.descs||[]).forEach(d=>lines.push(csvEsc(d)));
    lines.push('');

    // Shopping groups
    lines.push('SHOPPING_GROUPS');
    (shopGroups()||[]).forEach(g=>lines.push(csvEsc(g)));
    lines.push('');

    // Rows — filter to current month if monthOnly
    lines.push('ROWS');
    (shopRows()||[]).forEach(row=>{
      if(!row.desc) return;
      const weeks=row.weeks||{};
      let entries=Object.entries(weeks);
      if(monthOnly){
        const suns=getSundaysForMk(currentMk);
        entries=entries.filter(([k])=>suns.includes(k));
      }
      if(entries.length===0&&monthOnly) return;
      const wkStr=entries.map(([k,v])=>k+':'+v).join(',');
      lines.push(csvEsc(row.desc)+','+csvEsc(row.group||'')+','+wkStr);
    });
    lines.push('');

    // Week budgets
    lines.push('WEEK_BUDGETS');
    Object.entries(shopWeekBudgets()||{}).forEach(([k,v])=>{
      if(monthOnly){
        const suns=getSundaysForMk(currentMk);
        if(!suns.includes(k)) return;
      }
      if(v) lines.push(k+','+v);
    });
    lines.push('');

    // Card groups
    lines.push('CARD_GROUPS');
    (shopCardGroups()||[]).forEach(g=>lines.push(csvEsc(g.name)+','+csvEsc(g.budget||'')));
    lines.push('');

    // Cards
    lines.push('CARDS');
    (shopCards()||[]).forEach(card=>lines.push(csvEsc(card.name)+','+csvEsc(card.group||'')));
    lines.push('');

    // Card data
    lines.push('CARD_DATA');
    Object.entries(shopCardData()||{}).forEach(([mk,mcd])=>{
      if(monthOnly&&mk!==currentMk) return;
      Object.entries(mcd.entries||{}).forEach(([cardName,e])=>{
        lines.push(csvEsc(mk)+','+csvEsc(cardName)+','+csvEsc(e.statDate||'')+','+csvEsc(e.dueDate||'')+','+csvEsc(e.amount||''));
      });
    });

    return lines.join('\n');
  }

  function csvEsc(s){
    s=String(s||'');
    if(s.includes(',')||s.includes('"')||s.includes('\n')) return '"'+s.replace(/"/g,'""')+'"';
    return s;
  }

  function parseCSVLine(line){
    const result=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){ if(inQ&&line[i+1]==='"'){ cur+='"'; i++; } else inQ=!inQ; }
      else if(ch===','&&!inQ){ result.push(cur); cur=''; }
      else cur+=ch;
    }
    result.push(cur);
    return result;
  }

  function parseCSV(text){
    const lines=text.replace(/\r/g,'').split('\n');
    const data={meta:{},descs:[],groups:[],rows:[],weekBudgets:{},cardGroups:[],cards:[],cardData:{}};
    let section=null;
    for(let i=0;i<lines.length;i++){
      const raw=lines[i].trim();
      if(!raw) continue;
      const parts=parseCSVLine(raw);
      const key=parts[0];

      // metadata lines
      if(key==='APP_VERSION'){ data.meta.appVersion=parts[1]; continue; }
      if(key==='CURRENCY'){ data.meta.currency=parts[1]; continue; }
      if(key==='YEAR_START_MONTH'){ data.meta.yearStartMonth=parseInt(parts[1])||1; continue; }
      if(key==='ANNUAL_BUDGET'){ if(!data.meta.annualBudgets) data.meta.annualBudgets={}; data.meta.annualBudgets[parts[1]]=parts[2]; continue; }

      // section headers
      if(['DESCRIPTIONS','SHOPPING_GROUPS','ROWS','WEEK_BUDGETS','CARD_GROUPS','CARDS','CARD_DATA'].includes(key)){ section=key; continue; }

      // section data
      if(section==='DESCRIPTIONS'){ if(parts[0]) data.descs.push(parts[0]); }
      else if(section==='SHOPPING_GROUPS'){ if(parts[0]) data.groups.push(parts[0]); }
      else if(section==='ROWS'){
        if(!parts[0]) continue;
        const row={desc:parts[0],group:parts[1]||'',weeks:{}};
        for(let j=2;j<parts.length;j++){
          const pair=parts[j].split(':');
          if(pair.length===2&&pair[0].match(/^\d{4}-\d{2}-\d{2}$/)) row.weeks[pair[0]]=pair[1];
        }
        data.rows.push(row);
      }
      else if(section==='WEEK_BUDGETS'){ if(parts[0]&&parts[1]) data.weekBudgets[parts[0]]=parts[1]; }
      else if(section==='CARD_GROUPS'){ if(parts[0]) data.cardGroups.push({name:parts[0],budget:parts[1]||''}); }
      else if(section==='CARDS'){ if(parts[0]) data.cards.push({name:parts[0],group:parts[1]||''}); }
      else if(section==='CARD_DATA'){
        if(!parts[0]||!parts[1]) continue;
        const mk=parts[0]; const cardName=parts[1];
        if(!data.cardData[mk]) data.cardData[mk]={entries:{}};
        data.cardData[mk].entries[cardName]={statDate:parts[2]||'',dueDate:parts[3]||'',amount:parts[4]||''};
      }
    }
    return data;
  }

  function showImportPreview(parsed){
    const m=parsed.meta;
    const conflicts=[];

    // Check metadata conflicts
    if(m.currency&&m.currency!==(db.currency||'£'))
      conflicts.push({type:'currency',label:'Currency',existing:db.currency||'£',imported:m.currency});
    if(m.yearStartMonth&&m.yearStartMonth!==(db.yearStartMonth||1)){
      const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      conflicts.push({type:'yearStart',label:'Year start month',existing:months[(db.yearStartMonth||1)-1],imported:months[m.yearStartMonth-1]});
    }

    // Count new vs existing data
    const newDescs=parsed.descs.filter(d=>!db.descs.includes(d)).length;
    const newGroups=parsed.groups.filter(g=>!shopGroups().includes(g)).length;
    const newRows=parsed.rows.filter(r=>!shopRows().find(e=>e.desc===r.desc&&(e.group||'')===(r.group||''))).length;
    const updRows=parsed.rows.filter(r=>shopRows().find(e=>e.desc===r.desc&&(e.group||'')===(r.group||''))).length;
    const newWkBuds=Object.keys(parsed.weekBudgets).filter(k=>!shopWeekBudgets()[k]).length;
    const confWkBuds=Object.keys(parsed.weekBudgets).filter(k=>shopWeekBudgets()[k]&&shopWeekBudgets()[k]!==parsed.weekBudgets[k]).length;

    let html=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px">
      <div style="font-weight:700;margin-bottom:8px;color:var(--navy)">What will be imported:</div>`;

    html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin-bottom:10px">`;
    [[newDescs,'new item descriptions'],[newGroups,'new store groups'],[newRows,'new item rows'],[updRows,'rows to update'],[newWkBuds,'new week budgets']].forEach(([n,label])=>{
      if(n>0) html+=`<div style="color:var(--text)">✓ <strong>${n}</strong> ${label}</div>`;
    });
    html+=`</div>`;

    if(conflicts.length>0){
      html+=`<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:6px">
        <div style="font-weight:700;color:var(--red);margin-bottom:6px">⚠️ Conflicts to resolve:</div>`;
      conflicts.forEach(conflict=>{
        html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span style="color:var(--muted);flex:0 0 auto">${esc(conflict.label)}:</span>
          <span style="background:#FEF3C7;padding:2px 6px;border-radius:4px;font-size:12px">existing: <strong>${esc(conflict.existing)}</strong></span>
          <span style="color:var(--muted)">vs</span>
          <span style="background:#DBEAFE;padding:2px 6px;border-radius:4px;font-size:12px">imported: <strong>${esc(conflict.imported)}</strong></span>
          <select class="admin-select" data-conflict="${esc(conflict.type)}" style="font-size:12px;padding:3px 6px">
            <option value="keep">Keep existing</option>
            <option value="replace">Use imported</option>
          </select>
        </div>`;
      });
      html+=`</div>`;
    }

    if(confWkBuds>0){
      html+=`<div style="margin-top:8px;padding:8px;background:#FEF3C7;border-radius:6px;font-size:12px">
        <strong>${confWkBuds} week budget(s)</strong> differ from your existing data.
        <select class="admin-select" id="wk-bud-conflict" style="font-size:12px;padding:3px 6px;margin-left:6px">
          <option value="keep">Keep existing</option>
          <option value="replace">Use imported</option>
        </select>
      </div>`;
    }

    html+=`<div style="margin-top:12px;display:flex;gap:8px">
      <button class="admin-btn-sm" id="import-cancel-btn" style="padding:8px 14px">Cancel</button>
      <button class="admin-btn-sm" id="import-confirm-btn" style="padding:8px 14px;background:var(--blue);color:#fff;border-color:var(--blue)">Import now</button>
    </div></div>`;

    importPreview.innerHTML=html;

    document.getElementById('import-cancel-btn').onclick=()=>{
      importPreview.innerHTML='';
      importFileName.textContent='';
      importFileInput.value='';
    };

    document.getElementById('import-confirm-btn').onclick=()=>{
      // Resolve conflict choices
      const conflictChoices={};
      importPreview.querySelectorAll('[data-conflict]').forEach(sel=>{
        conflictChoices[sel.dataset.conflict]=sel.value;
      });
      const wkBudChoice=(document.getElementById('wk-bud-conflict')?.value)||'keep';

      doImport(parsed,conflictChoices,wkBudChoice);
    };
  }

  function doImport(parsed,conflictChoices,wkBudChoice){
    const m=parsed.meta;
    let stats={descs:0,groups:0,rows:0,rowsUpdated:0,wkBuds:0,cardGroups:0,cards:0,cardData:0};

    // Metadata
    if(m.currency&&conflictChoices.currency==='replace') db.currency=m.currency;
    if(m.yearStartMonth&&conflictChoices.yearStart==='replace') db.yearStartMonth=m.yearStartMonth;
    if(m.annualBudgets) Object.entries(m.annualBudgets).forEach(([fy,bud])=>{ if(!shopAnnualBudgets()[fy]||conflictChoices['annBud-'+fy]==='replace') shopAnnualBudgets()[fy]=bud; });

    // Descriptions
    parsed.descs.forEach(d=>{ if(d&&!db.descs.includes(d)){ db.descs.push(d); stats.descs++; } });
    db.descs.sort((a,b)=>a.localeCompare(b));

    // Shopping groups
    parsed.groups.forEach(g=>{ if(g&&!shopGroups().includes(g)){ shopGroups().push(g); stats.groups++; } });

    // Rows — merge week amounts
    parsed.rows.forEach(importRow=>{
      if(!importRow.desc) return;
      let local=shopRows().find(r=>r.desc===importRow.desc&&(r.group||'')===(importRow.group||''));
      if(!local){ local={desc:importRow.desc,group:importRow.group||'',weeks:{}}; shopRows().push(local); stats.rows++; }
      else stats.rowsUpdated++;
      if(!local.weeks) local.weeks={};
      Object.entries(importRow.weeks).forEach(([date,val])=>{
        if(!local.weeks[date]) local.weeks[date]=val; // add new dates silently
        // existing dates: keep existing (import doesn't overwrite existing amounts)
      });
    });
    ensureGroupBlanks();

    // Week budgets
    Object.entries(parsed.weekBudgets).forEach(([k,v])=>{
      if(!shopWeekBudgets()[k]){ shopWeekBudgets()[k]=v; stats.wkBuds++; }
      else if(wkBudChoice==='replace'){ shopWeekBudgets()[k]=v; stats.wkBuds++; }
    });

    // Card groups
    parsed.cardGroups.forEach(cg=>{
      const existing=shopCardGroups().find(g=>g.name===cg.name);
      if(!existing){ shopCardGroups().push({name:cg.name,budget:cg.budget}); stats.cardGroups++; }
      else if(cg.budget&&!existing.budget) existing.budget=cg.budget;
    });

    // Cards
    parsed.cards.forEach(card=>{
      if(!shopCards().find(c=>c.name===card.name)){ shopCards().push({name:card.name,group:card.group||''}); stats.cards++; }
    });

    // Card data — merge entries
    Object.entries(parsed.cardData).forEach(([mk,mcd])=>{
      if(!shopCardData()[mk]) shopCardData()[mk]={entries:{}};
      Object.entries(mcd.entries||{}).forEach(([cardName,e])=>{
        if(!shopCardData()[mk].entries[cardName]){ shopCardData()[mk].entries[cardName]=e; stats.cardData++; }
      });
    });

    save();

    // Summary popup
    const box=document.getElementById('modal-box');
    const ov=document.getElementById('modal-overlay');
    box.innerHTML=`<div class="modal-title">✅ Import complete</div>
      <div class="modal-body">
        <div style="font-size:13px;line-height:1.8">
          ${stats.descs>0?`✓ ${stats.descs} new item description${stats.descs>1?'s':''}<br>`:''}
          ${stats.groups>0?`✓ ${stats.groups} new store group${stats.groups>1?'s':''}<br>`:''}
          ${stats.rows>0?`✓ ${stats.rows} new item row${stats.rows>1?'s':''}<br>`:''}
          ${stats.rowsUpdated>0?`✓ ${stats.rowsUpdated} existing row${stats.rowsUpdated>1?'s':''} updated<br>`:''}
          ${stats.wkBuds>0?`✓ ${stats.wkBuds} week budget${stats.wkBuds>1?'s':''} imported<br>`:''}
          ${stats.cardGroups>0?`✓ ${stats.cardGroups} card group${stats.cardGroups>1?'s':''}<br>`:''}
          ${stats.cards>0?`✓ ${stats.cards} card${stats.cards>1?'s':''}<br>`:''}
          ${stats.cardData>0?`✓ ${stats.cardData} card payment${stats.cardData>1?'s':''}<br>`:''}
          ${Object.values(stats).every(v=>v===0)?'No new data found — everything was already up to date.':''}
        </div>
      </div>
      <div class="modal-btns"><button class="modal-btn primary" data-modal-cb="cancel">Done</button></div>`;
    box.style.display='block'; ov.style.display='block';

    // Reset import UI
    importPreview.innerHTML='';
    importFileName.textContent='';
    importFileInput.value='';
    renderPage();
  }

  // Clear all products
  document.getElementById('clear-all-products-btn').onclick=()=>{
    const total=Object.values(shopStoreProducts()||{}).reduce((s,p)=>s+p.length,0);
    confirmModal(
      'Clear all products?',
      `This will permanently delete all ${total} product${total!==1?'s':''} from every store. This cannot be undone.`,
      ()=>{
        Object.keys(shopStoreProducts()||{}).forEach(g=>{ shopStoreProducts()[g]=[]; });
        save(); renderPage();
      },'Delete all','danger'
    );
  };

  renderCleanup();
}

function renderCleanup(){
    const body=document.getElementById('cleanup-body');
    if(!body) return;
    const emptyRows=shopRows().filter(r=>r.desc&&isBlankRow(r));
    const trueEmpty=shopRows().filter(r=>!r.desc&&isBlankRow(r)); // nameless blanks — auto-managed
    if(emptyRows.length===0){
      body.innerHTML='<p style="font-size:13px;color:var(--muted)">No empty rows found. ✓</p>';
      return;
    }
    let html=`<p style="font-size:13px;color:var(--muted);margin-bottom:12px">${emptyRows.length} row${emptyRows.length>1?'s have':' has'} a name but no amounts entered anywhere. You can safely delete them.</p>`;
    html+=`<div style="margin-bottom:12px">`;
    emptyRows.forEach((r,i)=>{
      html+=`<div class="admin-row">
        <div class="admin-row-label">${esc(r.desc)} <span style="color:var(--muted);font-size:11px">(${esc(r.group||'Other')})</span></div>
        <input type="checkbox" class="cleanup-cb" data-desc="${esc(r.desc)}" data-group="${esc(r.group||'')}" style="width:18px;height:18px;cursor:pointer" checked>
      </div>`;
    });
    html+=`</div>`;
    html+=`<div style="display:flex;gap:8px">
      <button class="admin-btn-sm" id="cleanup-all-btn">Select all</button>
      <button class="admin-btn-sm" id="cleanup-none-btn">Deselect all</button>
      <button class="admin-btn-sm danger" id="cleanup-delete-btn" style="margin-left:auto">Delete selected</button>
    </div>`;
    body.innerHTML=html;

    document.getElementById('cleanup-all-btn').onclick=()=>{ body.querySelectorAll('.cleanup-cb').forEach(cb=>cb.checked=true); };
    document.getElementById('cleanup-none-btn').onclick=()=>{ body.querySelectorAll('.cleanup-cb').forEach(cb=>cb.checked=false); };
    document.getElementById('cleanup-delete-btn').onclick=()=>{
      const selected=[...body.querySelectorAll('.cleanup-cb:checked')].map(cb=>({desc:cb.dataset.desc,group:cb.dataset.group}));
      if(selected.length===0) return;
      confirmModal(
        `Delete ${selected.length} empty row${selected.length>1?'s':''}?`,
        `This will permanently remove: ${selected.map(s=>s.desc).join(', ')}. This cannot be undone.`,
        ()=>{
          selected.forEach(s=>{
            const idx=shopRows().findIndex(r=>r.desc===s.desc&&(r.group||'')===s.group);
            if(idx>-1) shopRows().splice(idx,1);
          });
          save(); renderPage();
        },'Delete','danger'
      );
    };
  }

function init(){
  db=loadDb();
  mobile=window.innerWidth<NARROW;
  currentMk=mkey(new Date());
  viewWk=todayWkIdx(currentMk);
  annualFy=fyForDate(new Date());
  selectedShopIds=db.lastShopIds?[...(db.lastShopIds||[])].slice(0,1):[];

  navigate('home');
}

// Global error handler — shows errors visibly on iPhone
window.onerror=function(msg,src,line,col,err){
  var div=document.createElement('div');
  div.style.cssText='position:fixed;bottom:80px;left:10px;right:10px;background:#FEF2F2;border:2px solid #DC2626;border-radius:10px;padding:12px;font-size:11px;font-family:monospace;z-index:9999;overflow:auto;max-height:180px';
  div.textContent='ERR: '+String(msg).slice(0,200)+' L'+line;
  document.body.appendChild(div);
  return false;
};

try{
  init();
} catch(e){
  var div=document.createElement('div');
  div.style.cssText='position:fixed;bottom:80px;left:10px;right:10px;background:#FEF2F2;border:2px solid #DC2626;border-radius:10px;padding:12px;font-size:11px;font-family:monospace;z-index:9999;overflow:auto;max-height:180px';
  div.textContent='INIT ERR: '+String(e.message||e).slice(0,300);
  document.body.appendChild(div);
}
