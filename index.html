<!DOCTYPE html>
<!--
  Money Bot v60
  =============
  Changes in v60:
  - TESTING ONLY: localStorage.clear() added at startup to wipe all local data on every load (extra edit)
  - This is intentional during active development to prevent stale data from older versions causing silent JS errors
  - MUST BE REMOVED before going live

  Changes in v59:
  - Replaced all box-drawing characters (U+2550, U+2551 etc) in JS comments with plain hyphens
  - Added charset meta tag to ensure UTF-8 is declared
  - These characters may have caused iOS Safari to silently refuse to execute the script

  Changes in v58:
  - Added visible error trap on iPhone — any JS crash now shows an error message on screen
  - Added window.onerror handler to catch and display silent failures

  Changes in v57:
  - Fixed: getSundaysForMk was still hardcoded to Sunday (0) and never read weekStartDay
  - Week start day setting now correctly affects which dates appear as column headers

  Changes in v56:
  - Added configurable week start day (Admin → Financial Year section)
  - Default is Sunday (as before); user can choose any day of the week
  - LOCKING RULE: The week start day can only be changed when no shopping amounts
    have been entered anywhere. Once a single amount exists in any row in any shop,
    the setting becomes read-only and is greyed out in Admin with an explanation.
  - REASON FOR LOCKING: Week columns are keyed by the date of the week-start day
    (e.g. Sunday 2026-04-27). If the start day were changed after data entry, all
    existing amounts would be stored under Sunday-keyed dates but displayed in
    Friday-keyed columns — the data would appear to vanish or misalign.
  - RESET & REUSE: A user who wants to change the week start day after having entered
    data must: (1) export all data via Admin → Export Data, (2) use Admin → Clear All
    or delete all row amounts, (3) the lock releases automatically once no amounts
    remain, (4) change the week start day, (5) re-import or re-enter data.
  - FIRST USE PROMPT: When a user opens the Weekly Shop for the first time (no amounts
    anywhere), a one-time popup informs them which day weeks currently start on and
    invites them to change it before entering any data. This prompt does not appear
    again once any amount has been entered.
  - YEAR START MONTH: Unlike the week start day, the financial year start month CAN
    be changed at any time without affecting data. The year start month is a display
    and grouping preference only — it changes how months are grouped into financial
    years and how labels like "2025/26" are displayed, but all underlying data
    (amounts keyed by date) remains unchanged and correctly displayed.
  - The week start day setting lives at the top level of db (alongside currency and
    yearStartMonth) so it applies consistently across all shops.

  Changes in v55:
  - Fixed: single shop stripe now correctly wraps all content below the banner

  Changes in v54:
  - Single shop: banner background uses shop colour; stripe runs full height of grid
  - Aggregate view: each shop name banner background uses that shop's colour

  Changes in v53:
  - Aggregate view: each shop now has its own grid with a single continuous colour stripe
  - Stripe no longer breaks between rows — runs solidly down the full shop section

  Changes in v52:
  - Fixed: shopColor ReferenceError (variable used before declaration in renderShop)

  Changes in v51:
  - Each shop can have a colour set in Admin → Shops
  - A thick coloured stripe runs down the left side of the Weekly Shop grid
  - In aggregate view each shop has its own colour stripe
  - Default colours assigned to existing shops automatically

  Changes in v50:
  - Fixed: aggregate view now always shows group headers including Other for every shop
  - Other section always shown even when empty

  Changes in v49:
  - Fixed: stores now collapse by default when entering a shop; switching shops resets collapsed state

  Changes in v48:
  - Fixed: new shops no longer inherit default Food stores (Abel and Cole etc.)
  - migrateStoreProducts only adds default stores to the legacy Food shop, not new empty shops

  Changes in v47:
  - Fixed: adding a store/group from Weekly Shop failed silently due to invalid assignment to shopStoreProducts()

  Changes in v46:
  - Admin shop section now lists all shops with radio buttons
  - Selecting a radio button switches active shop throughout Admin AND sets it as default in Weekly Shop
  - Add shop button in Admin
  - Delete shop button per shop (disabled when only one shop exists)

  Changes in v45:
  - Other (ungrouped rows) now has its own collapsible header like named stores
  - Other starts collapsed by default
  - Other header shows no delete button (it cannot be removed)

  Changes in v44:
  - Collapsed store headers now show subtotals in proper grid cells aligned with week/month columns
  - Expanded headers span full width as before with × delete button visible

  Changes in v43:
  - Store groups now collapsed by default (tap header to expand)
  - Collapsed header shows subtotals in same format as the subtotal row, not narrative text

  Changes in v42:
  - Fixed: isCollapsed ReferenceError when opening shop (variable was scoped inside if(g) block)

  Changes in v41:
  - Store groups in Weekly Shop are now collapsible — tap the store header to collapse/expand
  - When collapsed, the store name and monthly (and weekly on iPhone) subtotal are shown
  - Collapsed state resets when navigating away

  Changes in v40 (previously documented):
  - Removed Google Fonts external dependency (Outfit font replaced with system font stack)
    so the app works fully offline when added to iPhone/iPad home screen
  - Added ↑ ↓ reorder buttons to Stores/Groups in Admin so store display order can be changed
  - Added per-version change comments to the HTML file (this block)

  Previous versions summary:
  v39: Fixed Admin crash (db.groups/db.rows/db.cards still referenced directly after multi-shop migration)
  v38: Amount cells changed from <div> to <button> for reliable iOS touch events
  v37: Guards added to openQtyPicker and click handlers for invalid row indices; duplicate row deduplication in migration
  v36: Defensive fixes for activeShop() returning undefined after migration; shopX() optional chaining
  v35: Multi-shop architecture — each shop self-contained; shop selector screen; aggregate view
  v34: Telephone keypad Clear button stays open; price field shows 2dp in qty popup
  v33: Keypad display formatted to 2 decimal places
  v32: Clear button added to telephone keypad
  v31: Price display in qty popup searches all stores; derives price from amount/qty
  v30: Qty highlight (qp-active) made visible with !important overrides
  v29: Clear this week's amount button added to qty popup
  v28: Telephone keypad popup for price entry; Clear All Products in Admin
  v27: Detox Trading added as default store; migration deduplication for Other store
  v26: xN button removed; amount cell tappable directly; last qty highlighted in blue
  v25: Feature 1B — quantity picker popup (1-10 buttons) with price field and price history
  v24: Close (×) button added to product picker popup
  v23: Products admin page layout fix — nav bar no longer overlaps first product
  v22: Per-store product lists (Feature 1A); product picker popup in Weekly Shop; Admin Products page
  v21: CSV export and import
  v20: CSV export with device-specific post-export instructions
  v19: Annual Summary page fully implemented
  v18: Performance page removed from navigation
  v17: Financial year settings and annual budget in Admin
  v16: Summary Expenditure page (week/month/year views with trends and rankings)
  v15: Credit card groups with per-group budgets; card management in Admin
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Money Bot v61</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --bg:#F7F6F2;
  --surface:#FFFFFF;
  --border:#E2DFDA;
  --border2:#CCC9C3;
  --text:#1A1A1A;
  --muted:#6B7070;
  --navy:#1E3048;
  --navy2:#263D5A;
  --blue:#2563EB;
  --blue-lt:#EFF6FF;
  --blue-hdr:#DBEAFE;
  --mo-bg:#FDF8F0;
  --mo-hdr:#F5EFE3;
  --grp-hdr:#F0EDE8;
  --sub-bg:#F8F6F3;
  --green:#15803D;
  --red:#DC2626;
  --green-bg:#F0FDF4;
  --red-bg:#FEF2F2;
  --row-h:46px;
  --sb-w:172px;
  --bn-h:60px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text)}

/* == APP SHELL == */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sb-w);flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
#sb-brand{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
#sb-brand h1{font-size:14px;font-weight:700;color:#fff;line-height:1.3}
#sb-brand .ver{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.sb-nav{padding:8px 0;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 16px;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all .15s;text-decoration:none;-webkit-user-select:none;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:rgba(37,99,235,.25);border-left-color:var(--blue);color:#fff}
.sb-item .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
#main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;padding-top:env(safe-area-inset-top);height:calc(50px + env(safe-area-inset-top));align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;flex-shrink:0}
#tb-left{display:flex;flex-direction:column}
#tb-appname{font-size:15px;font-weight:700;line-height:1.1}
#tb-pagename{font-size:11px;color:var(--muted)}
#tb-admin{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px 8px;border-radius:6px}
#tb-admin:hover{background:var(--bg)}
#main{flex:1;overflow-y:auto}
#bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);height:var(--bn-h);padding-bottom:env(safe-area-inset-bottom);z-index:20;flex-shrink:0}
.bn-inner{display:flex;height:100%}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:500;border:none;background:none;padding:0;-webkit-user-select:none;user-select:none;transition:color .15s}
.bn-item .ico{font-size:20px;line-height:1}
.bn-item.active{color:var(--blue)}
.bn-item:active{opacity:.7}

/* == MOBILE == */
@media(max-width:599px){
  #sidebar{display:none}
  #topbar{display:flex}
  #bottomnav{display:block}
  #main{padding-bottom:var(--bn-h)}
}

/* == HOME PAGE == */
.home-wrap{padding:20px 16px 24px;max-width:600px}
.home-greeting{margin-bottom:20px}
.home-greeting h2{font-size:22px;font-weight:700}
.home-greeting .date{font-size:13px;color:var(--muted);margin-top:3px}
.home-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;transition:box-shadow .15s,transform .1s}
.home-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.home-card:active{transform:scale(.99)}
.hc-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px}
.hc-title{font-size:16px;font-weight:700;margin-bottom:10px}
.hc-nums{display:flex;gap:20px;margin-bottom:10px;flex-wrap:wrap}
.hc-num{display:flex;flex-direction:column;gap:2px}
.hc-num .lbl{font-size:11px;color:var(--muted)}
.hc-num .val{font-size:18px;font-weight:700}
.hc-num .val.pos{color:var(--green)}
.hc-num .val.neg{color:var(--red)}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;background:var(--blue)}
.progress-fill.over{background:var(--red)}
.home-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.home-link-btn{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;font-family:var(--font)}
.home-link-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.home-link-btn:active{opacity:.8}
.home-footer{margin-top:20px;font-size:11px;color:var(--muted)}
.home-first{text-align:center;padding:40px 20px}
.home-first h2{font-size:24px;font-weight:700;margin-bottom:8px}
.home-first p{color:var(--muted);margin-bottom:24px}
.btn-primary{padding:12px 24px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn-primary:active{opacity:.85}

/* == MONTH NAV BAR == */
.mnavbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;gap:8px}
@media(max-width:599px){.mnavbar{position:relative;top:auto}}
.mnav-btn{background:var(--navy);color:#fff;border:none;border-radius:8px;width:40px;height:40px;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.mnav-btn:disabled{background:var(--border);color:var(--muted);cursor:default}
.mnav-btn:not(:disabled):active{opacity:.75}
.mnav-center{flex:1;text-align:center}
.mnav-month{font-size:16px;font-weight:700}
.mnav-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.mnav-badge.today{background:var(--blue);color:#fff}
.mnav-badge.future{background:#F3F4F6;color:var(--muted)}

/* == SHOP GRID == */
.shop-wrap{overflow-x:auto}
.shop-grid{display:grid;border-left:1px solid var(--border);border-top:1px solid var(--border)}
.gc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);min-width:0;overflow:hidden}
.gc.wk-hi{background:var(--blue-lt)}
.gc.mo{background:var(--mo-bg)}
.gc.hdr{background:var(--bg)}
.gc.hdr.wk-hi{background:var(--blue-hdr)}
.gc.hdr.mo{background:var(--mo-hdr)}
.gc.grp{background:var(--grp-hdr)}
.gc.sub{background:var(--sub-bg)}
.gc.sub.wk-hi{background:#E0ECFF}
.gc.sub.mo{background:#EEE8DC}
.gc.tot{background:var(--bg)}
.gc.tot.wk-hi{background:var(--blue-hdr)}
.gc.tot.mo{background:var(--mo-hdr)}
.gc.strong-top{border-top:2px solid var(--border2)}

/* header cells */
.hdr-inner{padding:8px 8px 6px}
.hdr-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px;font-weight:600}
.hdr-date{font-size:11px;color:var(--navy);font-weight:600;margin-bottom:4px}
.bud-in{display:block;width:100%;font-size:14px;font-weight:700;color:var(--blue);border:none;border-bottom:1.5px solid var(--blue);background:transparent;padding:2px 0;outline:none;font-family:var(--font)}
.bud-in::placeholder{color:#C8C4C0;font-weight:400}
.bud-auto{font-size:14px;font-weight:700;color:var(--navy);padding:2px 0}
.reset-btn{margin-top:5px;font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--font);text-decoration:underline;padding:0}
.reset-btn:hover{color:var(--red)}

/* week nav (narrow) */
.wk-nav{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:6px}
.wk-nav-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;width:44px;height:44px;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-user-select:none;user-select:none}
.wk-nav-btn:disabled{background:var(--border);color:var(--muted)}
.wk-nav-btn:not(:disabled):active{opacity:.75;transform:scale(.94)}
.wk-nav-lbl{font-size:12px;font-weight:700;text-align:center;line-height:1.3}

/* data cells */
.desc-in,.amt-in{display:block;width:100%;height:var(--row-h);border:none;background:transparent;padding:0 8px;font-size:13px;color:var(--text);outline:none;font-family:var(--font)}
.amt-in{text-align:right}
.amt-display{height:var(--row-h);display:flex;align-items:center;justify-content:flex-end;padding:0 8px;font-size:13px;font-weight:600;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .12s;border:none;background:transparent;width:100%;font-family:var(--font);text-align:right;-webkit-appearance:none}
.amt-display:hover,.amt-display:active{background:var(--blue-lt)}
.desc-in::placeholder{color:#C0BDB8;font-style:italic}
.mo-val{height:var(--row-h);display:flex;align-items:center;justify-content:flex-end;padding:0 8px;font-size:13px;color:var(--muted)}
.mo-val.has{color:var(--text);font-weight:600}

/* group header cell */
.grp-cell{display:flex;align-items:center;gap:8px;padding:0 10px;height:44px;cursor:pointer;-webkit-user-select:none;user-select:none}
.grp-cell:active{background:rgba(0,0,0,.04)}
.grp-chevron{font-size:11px;color:var(--muted);transition:transform .2s;margin-left:auto;flex-shrink:0}
.grp-chevron.collapsed{transform:rotate(-90deg)}
.grp-name{font-size:13px;font-weight:700;color:var(--navy);flex:1}
.grp-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 4px;border-radius:4px;font-family:var(--font)}
.grp-del:hover{color:var(--red);background:var(--red-bg)}
.grp-span{grid-column:1/-1}

/* sub-total and total cells */
.tp{padding:9px 8px}
.tp.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
.tp.num{text-align:right;font-weight:700;font-size:13px}
.tp.pos{color:var(--green)}
.tp.neg{color:var(--red)}
.tp.dim{color:var(--muted)}

/* add-group bar */
.add-grp-bar{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--bg)}
.add-grp-btn{padding:7px 14px;border:1px dashed var(--border2);border-radius:8px;background:var(--surface);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .15s}
.add-grp-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}

/* == YTD STRIP == */
.ytd-strip{padding:8px 14px;background:var(--navy);color:rgba(255,255,255,.85);font-size:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ytd-strip strong{color:#fff}

/* == ADMIN PAGE == */
.admin-wrap{padding:16px;max-width:600px}
.admin-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.admin-section-hdr{padding:13px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.admin-section-hdr .ico{font-size:18px}
.admin-section-body{padding:14px 16px}
.admin-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.admin-row:last-child{border-bottom:none}
.admin-row-label{flex:1;font-size:13px}
.admin-row-label.editing input{border:1px solid var(--blue);border-radius:6px;padding:3px 6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
.admin-btn-sm{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);color:var(--text)}
.admin-btn-sm:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.admin-btn-sm.danger:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
select.admin-select{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none}
.admin-input{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;width:100%}
.admin-input:focus{border-color:var(--blue)}
.admin-textarea{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;width:100%;resize:vertical;min-height:80px}
.admin-textarea:focus{border-color:var(--blue)}
.admin-search{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;width:100%;margin-bottom:10px}
.admin-search:focus{border-color:var(--blue)}
.admin-empty{color:var(--muted);font-size:13px;font-style:italic;padding:4px 0}
.admin-flex{display:flex;gap:8px;align-items:center;margin-top:10px}
.admin-add-row{display:flex;gap:8px;margin-bottom:12px}


/* == WEEK NAV BAR (mobile only) == */
.wknavbar{display:none;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--blue-hdr);border-bottom:1px solid var(--border);gap:8px}
@media(max-width:599px){.wknavbar{display:flex}}
.wknavbar-lbl{flex:1;text-align:center;font-size:13px;font-weight:700;line-height:1.3}
.wknavbar-lbl span{display:block;font-size:11px;font-weight:400;color:var(--muted)}




/* == TELEPHONE KEYPAD MODAL == */
.kpov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;backdrop-filter:blur(2px)}
.kpov.open{display:block}
.kpmod{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--surface);border-radius:20px;z-index:301;width:min(320px,92vw);box-shadow:0 24px 70px rgba(0,0,0,.35);display:none;flex-direction:column;overflow:hidden}
.kpmod.open{display:flex}
.kp-display-row{padding:16px 20px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border)}
.kp-display-lbl{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
.kp-display{flex:1;text-align:right;font-size:28px;font-weight:700;color:var(--navy);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kp-display.empty{color:var(--muted);font-size:20px}
.kp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.kp-key{padding:16px 0;border:none;border-radius:12px;background:var(--bg);font-size:24px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--navy);transition:background .1s,transform .08s;-webkit-user-select:none;user-select:none}
.kp-key:active{background:var(--blue-hdr);transform:scale(.93)}
.kp-key.kp-dot{font-size:20px}

function dateKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function mkey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function mLabel(mk){ const [y,m]=mk.split('-').map(Number); return new Date(y,m-1,1).toLocaleString('default',{month:'long',year:'numeric'}); }
function mShort(mk){ const [y,m]=mk.split('-').map(Number); return new Date(y,m-1,1).toLocaleString('default',{month:'short'}); }
function dayLabel(d){ return d.toLocaleString('default',{weekday:'short',day:'numeric',month:'short'}); }

// Returns array of Sunday date-key strings for the given month
function getSundaysForMk(mk){
  const [yr,mo]=mk.split('-').map(Number);
  const startDay=(db&&db.weekStartDay!=null?db.weekStartDay:0);
  const d=new Date(yr,mo-1,1);
  while(d.getDay()!==startDay) d.setDate(d.getDate()+1); // advance to first startDay
  const result=[];
  while(d.getMonth()===mo-1){
    result.push(dateKey(new Date(d)));
    d.setDate(d.getDate()+7);
  }
  return result;
}

function offsetMk(mk,months){
  const [y,m]=mk.split('-').map(Number);
  const d=new Date(y,m-1+months,1);
  return mkey(d);
}

function todayWkIdx(mk){
  const today=dateKey(new Date());
  const suns=getSundaysForMk(mk);
  let idx=0;
  suns.forEach((s,i)=>{ if(s<=today) idx=i; });
  return idx;
}

// == FINANCIAL YEAR HELPERS ==
// Returns the financial year key (string) for a given date or month-key
// FY key = the calendar year in which the financial year STARTS
// e.g. if yearStartMonth=5 (May), date 2026-03 is in FY2025 (May25-Apr26)
function fyForMk(mk){
  const ysm=(db.yearStartMonth||1);
  if(ysm===1) return mk.split('-')[0];
  const [y,m]=mk.split('-').map(Number);
  return m>=ysm?String(y):String(y-1);
}
function fyForDate(d){
  return fyForMk(mkey(d));
}
// Returns start/end mk for a financial year key
function fyRange(fyKey){
  const ysm=(db.yearStartMonth||1);
  const y=parseInt(fyKey);
  const startMk=String(y)+'-'+String(ysm).padStart(2,'0');
  // end = month before ysm in y+1
  const endM=ysm===1?12:ysm-1;
  const endY=ysm===1?y:y+1;
  const endMk=String(endY)+'-'+String(endM).padStart(2,'0');
  return {startMk,endMk};
}
// All sundays in a financial year
function sundaysForFY(fyKey){
  const {startMk,endMk}=fyRange(fyKey);
  const result=[];
  let mk=startMk;
  while(mk<=endMk){
    getSundaysForMk(mk).forEach(s=>result.push(s));
    mk=offsetMk(mk,1);
  }
  return result;
}
// Label for a financial year

  const y=parseInt(fyKey);
  return fyKey+'/'+(String(y+1).slice(2));
}

}

function migrateStoreProducts(s, isLegacyFood){
  // s is a shop object (or legacy flat db)

    const defaultGroups=['Abel and Cole','Riverford','Wylde','Ocado','Detox Trading'];

      if(!s.groups) s.groups=[];
      if(!s.groups.includes(g)) s.groups.push(g);
      if(!s.storeProducts[g]) s.storeProducts[g]=[];
    });
  }
  const allGroups=[...(s.groups||[]),''];
  // Reset collapsed state whenever the active shop changes
  const currentShopId=activeShop()?.id||null;
  if(currentShopId!==lastRenderedShopId){
    collapsedGroups=new Set();
    lastRenderedShopId=currentShopId;
  }
  // Default: all groups including Other start collapsed
  if(collapsedGroups.size===0){ shopGroups().forEach(g=>collapsedGroups.add(g)); collapsedGroups.add(''); }
  allGroups.forEach(g=>{ if(!s.storeProducts[g]) s.storeProducts[g]=[]; });
  if(s.descs&&s.descs.length>0){
    const allStoreDescs=new Set();
    Object.values(s.storeProducts).forEach(prods=>prods.forEach(p=>allStoreDescs.add(p.desc)));
    s.descs.forEach(desc=>{
      if(desc&&!allStoreDescs.has(desc)&&!s.storeProducts[''].find(p=>p.desc===desc))
        s.storeProducts[''].push({desc,price:'',archived:false,priceHistory:[]});
    });
  }
}

function activeShop(){

  const db=freshDb();

    Object.entries(v2.months).forEach(([mk,md])=>{
      const suns=getSundaysForMk(mk);
      // migrate weekBudgets
      (md.weekBudgets||[]).forEach((b,i)=>{ if(b&&suns[i]) shopWeekBudgets()[suns[i]]=b; });
      // migrate rows

      });
    });
  }
  ensureGroupBlanks(db);
  return db;
}

function migrateToShops(d){
  // If already has shops array, just ensure each shop has storeProducts migrated
  if(d.shops&&Array.isArray(d.shops)){
    d.shops.forEach((s,si)=>{
      // Ensure all required fields exist
      if(!s.id) s.id='shop_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      if(!s.name) s.name='Shop';
      if(!s.annualBudgets) s.annualBudgets={};
      if(!s.storeProducts) s.storeProducts={};
      if(!s.groups) s.groups=[];
      if(!s.rows) s.rows=[];
      if(!s.weekBudgets) s.weekBudgets={};
      if(!s.cardGroups) s.cardGroups=[];
      if(!s.cards) s.cards=[];
      if(!s.cardData) s.cardData={};
      // Only inject default stores into the first/legacy shop if it has no groups yet
      const isLegacy=si===0&&(!s.groups||s.groups.length===0);
      migrateStoreProducts(s, isLegacy);
      // Assign default colour if missing
      if(!s.color){
        const palette=["#2563EB","#16A34A","#DC2626","#D97706","#7C3AED","#0891B2","#DB2777","#65A30D"];
        s.color=palette[si%palette.length];
      }
      ensureGroupBlanks(s);
    });
    if(!d.lastShopIds||!d.lastShopIds.length) d.lastShopIds=[d.shops[0]?.id].filter(Boolean);
    // Ensure top-level fields
    if(!d.currency) d.currency='£';
    if(!d.yearStartMonth) d.yearStartMonth=1;
    return d;
  }
  // Legacy flat structure — wrap into Food shop
  // Deduplicate rows by desc+group
  if(d.rows&&Array.isArray(d.rows)){
    const seen=new Set();
    d.rows=d.rows.filter(r=>{
      if(!r.desc) return true; // keep blank rows
      const key=r.desc+'|||'+(r.group||'');
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }
  const shop={
    id:'shop_food_legacy',
    name:'Food',
    annualBudgets: d.annualBudgets||{},
    storeProducts: d.storeProducts||{},
    groups: d.groups||['Abel and Cole','Riverford','Wylde','Ocado','Detox Trading'],
    rows: d.rows||[],
    weekBudgets: d.weekBudgets||{},
    cardGroups: d.cardGroups||[],
    cards: d.cards||[],
    cardData: d.cardData||{}
  };
  shop.color=shop.color||'#2563EB';
  migrateStoreProducts(shop, true); // legacy Food shop gets default stores
  ensureGroupBlanks(shop);
  const newDb={
    version:5,
    currency: d.currency||'£',
    yearStartMonth: d.yearStartMonth||1,
    shops:[shop],
    lastShopIds:[shop.id]
  };
  return newDb;
}

function isBlankRow(row){
  return !row.desc && Object.values(row.weeks||{}).every(v=>!v||n(v)===0);
}

function ensureGroupBlanks(d){
  // d can be a shop object or the whole db (legacy)
  if(!d) return;
  const dbd=d||db;
  const groups=[...dbd.groups,''];
  groups.forEach(g=>{
    const gRows=dbd.rows.filter(r=>(r.group||'')===g);
    // remove duplicate trailing blanks
    while(gRows.length>1&&isBlankRow(gRows[gRows.length-1])&&isBlankRow(gRows[gRows.length-2])){
      const idx=dbd.rows.indexOf(gRows[gRows.length-1]);
      if(idx>-1) dbd.rows.splice(idx,1);
      gRows.pop();
    }
    // ensure one blank at end
    if(gRows.length===0||!isBlankRow(gRows[gRows.length-1])){
      // Insert after last row of this group
      const lastIdx=gRows.length>0?dbd.rows.lastIndexOf(gRows[gRows.length-1]):-1;
      const newRow={desc:'',group:g,weeks:{}};
      if(lastIdx>=0) dbd.rows.splice(lastIdx+1,0,newRow);
      else dbd.rows.push(newRow);
    }
  });
}

function showModal(title,body,buttons){
  const box=document.getElementById('modal-box');
  const ov=document.getElementById('modal-overlay');
  let btns=buttons.map(b=>`<button class="modal-btn ${b.cls||''}" data-modal-cb="${b.cb}">${esc(b.label)}</button>`).join('');
  box.innerHTML=`<div class="modal-title">${esc(title)}</div><div class="modal-body">${body}</div><div class="modal-btns">${btns}</div>`;
  box.style.display='block'; ov.style.display='block';
}
function showInputModal(title,placeholder,cb){
  const box=document.getElementById('modal-box');
  const ov=document.getElementById('modal-overlay');
  box.innerHTML=`<div class="modal-title">${esc(title)}</div>
    <input class="modal-input" id="modal-inp" placeholder="${esc(placeholder)}" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="modal-btns">
      <button class="modal-btn" data-modal-cb="cancel">Cancel</button>
      <button class="modal-btn primary" data-modal-cb="ok">Add</button>
    </div>`;
  box.style.display='block'; ov.style.display='block';
  const inp=document.getElementById('modal-inp');
  inp.focus();
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const v=inp.value.trim(); hideModal(); if(v) cb(v); } });
  // store cb for ok button
  box._inputCb=cb;
}
function hideModal(){
  document.getElementById('modal-box').style.display='none';
  document.getElementById('modal-overlay').style.display='none';
}
document.getElementById('modal-overlay').addEventListener('click',hideModal);
document.getElementById('modal-box').addEventListener('click',e=>{
  const cb=e.target.dataset.modalCb;
  if(!cb) return;
  if(cb==='cancel'){hideModal();return;}
  if(cb==='ok'){
    const inp=document.getElementById('modal-inp');
    if(inp){ const v=inp.value.trim(); hideModal(); if(v&&document.getElementById('modal-box')._inputCb) document.getElementById('modal-box')._inputCb(v); return; }
    hideModal(); return;
  }
  // numeric cb = button index for confirm modals
  hideModal();
  if(document.getElementById('modal-box')._cbs){
    const fn=document.getElementById('modal-box')._cbs[cb];
    if(fn) fn();
  }
});

function confirmModal(title,body,onConfirm,confirmLabel='Confirm',confirmCls='primary'){
  const box=document.getElementById('modal-box');
  const ov=document.getElementById('modal-overlay');
  box.innerHTML=`<div class="modal-title">${esc(title)}</div><div class="modal-body">${body}</div>
    <div class="modal-btns">
      <button class="modal-btn" data-modal-cb="cancel">Cancel</button>
      <button class="modal-btn ${confirmCls}" data-modal-cb="confirm">${esc(confirmLabel)}</button>
    </div>`;
  box._cbs={confirm:onConfirm};
  box.style.display='block'; ov.style.display='block';
}

function renderShopSel(main){
  const shops=db.shops||[];
  // Sort: lastShopIds first, then the rest
  const lastIds=db.lastShopIds||[];
  const sorted=[
    ...lastIds.map(id=>shops.find(s=>s.id===id)).filter(Boolean),
    ...shops.filter(s=>!lastIds.includes(s.id))
  ];

  let html=`<div class="shopsel-wrap">
    <div class="shopsel-title">Choose Shop</div>
    <div class="shopsel-sub">Select one or more shops to view together.</div>`;

  sorted.forEach((shop,i)=>{
    const checked=selectedShopIds.includes(shop.id)||(selectedShopIds.length===0&&i===0);
    const storeCount=shop.groups?.length||0;
    html+=`<div class="shopsel-item${checked?' active':''}" data-shopid="${esc(shop.id)}">
      <input type="checkbox" class="shopsel-cb" id="scb_${esc(shop.id)}"
        ${checked?'checked':''} data-shopid="${esc(shop.id)}">
      <div style="flex:1;min-width:0">
        <div class="shopsel-name">${esc(shop.name)}</div>
        <div class="shopsel-meta">${storeCount} store${storeCount!==1?'s':''}</div>
      </div>
      ${shops.length>1?`<button class="shopsel-del" data-a="del-shop" data-shopid="${esc(shop.id)}" title="Delete shop">×</button>`:''}
    </div>`;
  });

  html+=`<div class="shopsel-actions">
    <button class="shopsel-new" id="shopsel-new-btn">＋ New shop</button>
    <button class="shopsel-go" id="shopsel-go-btn">Open shop →</button>
  </div></div>`;

  main.innerHTML=html;

  // Checkbox toggles
  main.querySelectorAll('.shopsel-cb').forEach(cb=>{
    cb.onchange=()=>{
      const sid=cb.dataset.shopid;
      if(cb.checked){
        if(!selectedShopIds.includes(sid)) selectedShopIds.push(sid);
      } else {
        selectedShopIds=selectedShopIds.filter(id=>id!==sid);
      }
      // Update active styling
      main.querySelectorAll('.shopsel-item').forEach(item=>{
        item.classList.toggle('active', selectedShopIds.includes(item.dataset.shopid)||
          (selectedShopIds.length===0&&item===main.querySelector('.shopsel-item')));
      });
    };
  });

  // Clicking item row toggles checkbox
  main.querySelectorAll('.shopsel-item').forEach(item=>{
    item.addEventListener('click',e=>{
      if(e.target.classList.contains('shopsel-del')||e.target.classList.contains('shopsel-cb')) return;
      const cb=item.querySelector('.shopsel-cb');
      if(cb){ cb.checked=!cb.checked; cb.dispatchEvent(new Event('change')); }
    });
  });

  // Delete shop
  main.querySelectorAll('[data-a="del-shop"]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const sid=btn.dataset.shopid;
      const shop=db.shops.find(s=>s.id===sid);
      if(!shop) return;
      confirmModal(`Delete "${shop.name}"?`,
        'This will permanently delete this shop and all its data.',
        ()=>{
          db.shops=db.shops.filter(s=>s.id!==sid);
          db.lastShopIds=(db.lastShopIds||[]).filter(id=>id!==sid);
          selectedShopIds=selectedShopIds.filter(id=>id!==sid);
          save(); renderPage();
        },'Delete','danger');
    };
  });

  // New shop
  document.getElementById('shopsel-new-btn').onclick=()=>{
    showInputModal('New shop name','e.g. Supplements',name=>{
      if(!name) return;
      const newShop={
        id:'shop_'+Date.now()+'_'+Math.random().toString(36).slice(2),
        name,
        annualBudgets:{}, storeProducts:{}, groups:[], rows:[],
        weekBudgets:{}, cardGroups:[], cards:[], cardData:{}
      };
      ensureGroupBlanks(newShop);
      db.shops.push(newShop);
      selectedShopIds=[newShop.id];
      db.lastShopIds=[newShop.id];
      save(); navigate('shop');
    });
  };

  // Go button
  document.getElementById('shopsel-go-btn').onclick=()=>{
    // Determine selected from checkboxes
    const checked=[...main.querySelectorAll('.shopsel-cb:checked')].map(cb=>cb.dataset.shopid);
    if(checked.length===0){
      // default to first
      selectedShopIds=[sorted[0]?.id].filter(Boolean);
    } else {
      selectedShopIds=checked;
    }
    // Update lastShopIds — most recently selected goes first
    const primary=selectedShopIds[0];
    db.lastShopIds=[primary,...(db.lastShopIds||[]).filter(id=>id!==primary)].slice(0,5);
    save();
    navigate('shop');
  };
}

  let badgeHtml='';

  else if(isFuture) badgeHtml='<span class="mnav-badge future">Future</span>';

  const shopNames=shops.map(s=>s.name).join(' + ');
  let html=`<div class="shop-header-banner"><strong>${esc(shopNames)}</strong></div>
  <div class="mnavbar">
    <button class="mnav-btn" id="mn-prev" ${currentMk<=minMk?'disabled':''}>‹</button>
    <div class="mnav-center"><span class="mnav-month">${mLabel(currentMk)}</span>${badgeHtml}</div>

  if(mobile){
    const wkD=new Date(suns[viewWk]);

      <div class="wknavbar-lbl">Week ${viewWk+1} · ${dayLabel(wkD)}</div>
      <button class="wk-nav-btn" id="wn-next" ${viewWk>=suns.length-1?'disabled':''}>›</button>
    </div>`;
  }

  const gridCols=mobile?'minmax(90px,2fr) minmax(76px,1fr) minmax(68px,1fr)':`minmax(110px,2fr) repeat(${suns.length},minmax(65px,1fr)) minmax(75px,1fr)`;

  // Shared column header row (outside per-shop grids)
  html+=`<div id="sgrid-hdr" class="shop-grid" style="grid-template-columns:${gridCols};margin-left:8px">`;
  html+=`<div class="gc hdr"><div class="hdr-inner"><div class="hdr-lbl">Item</div></div></div>`;
  if(!mobile){
    suns.forEach((sk,wi)=>{
      const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
      const d=new Date(sk);
      html+=`<div class="gc hdr${hi}"><div class="hdr-inner">
        <div class="hdr-lbl">Week ${wi+1}</div>
        <div class="hdr-date">${dayLabel(d)}</div>
      </div></div>`;
    });
  }
  html+=`<div class="gc hdr mo"><div class="hdr-inner"><div class="hdr-lbl" style="font-weight:700;color:var(--navy)">${mShort(currentMk).toUpperCase()}</div></div></div>`;
  html+=`</div>`; // close header grid

  // Each shop gets its own grid wrapped in a coloured stripe div
  let grandWkTots=new Array(suns.length).fill(0);
  let grandMoTot=0;

  shops.forEach((shop,shopIdx)=>{
    const shopStripeColor=shop.color||'#2563EB';
    // Outer wrapper with continuous left colour stripe
    html+=`<div style="border-left:5px solid ${shopStripeColor};margin-bottom:12px">`;
    // Shop name banner
    html+=`<div style="background:${shopStripeColor};padding:8px 12px;display:flex;align-items:center">
      <span style="font-size:13px;font-weight:700;color:#fff">${esc(shop.name)}</span>
    </div>`;
    // Shop grid
    html+=`<div class="shop-grid${shopIdx===0?' ':' '}agg-grid-${shopIdx}" data-shopgrid="${esc(shop.id)}" style="grid-template-columns:${gridCols}">`;

    const shopAllGroups=[...(shop.groups||[]),''];
    shopAllGroups.forEach(g=>{
      const gRows=(shop.rows||[]).filter(r=>(r.group||'')===g);
      const grpDisplayName=g||'Other';
      // Group header
      html+=`<div class="gc grp-span" style="grid-column:1/-1;background:var(--grp-hdr)">
        <div class="grp-cell"><span class="grp-name">${esc(grpDisplayName)}</span></div>
      </div>`;
      if(gRows.length===0) return;
      gRows.forEach(row=>{
        const ri=(shop.rows||[]).indexOf(row);
        const isBlank=isBlankRow(row);
        const moTotal=(shop.rows?.[ri]?suns.reduce((s,k)=>s+n((row.weeks||{})[k]),0):0);
        const descColor=row.desc?'var(--text)':'var(--muted)';
        const descContent=row.desc?esc(row.desc):'<span style="font-style:italic">add item…</span>';
        html+=`<div class="gc" style="cursor:pointer" data-a="pick-desc-agg" data-ri="${ri}" data-shopid="${esc(shop.id)}" data-grp="${esc(g)}">
          <div class="desc-cell" style="height:var(--row-h);display:flex;align-items:center;padding:0 8px;font-size:13px;color:${descColor};pointer-events:none">${descContent}</div>
        </div>`;

          html+=`<div class="gc wk-hi"><div class="amt-display${val?'':' amt-empty'}" data-a="open-qty-agg" data-ri="${ri}" data-shopid="${esc(shop.id)}" data-key="${sk}" data-grp="${esc(g)}">${val?cur()+parseFloat(val).toFixed(2):'<span style="font-style:italic;font-size:11px;color:var(--muted)">tap</span>'}</div></div>`;
        } else {
          suns.forEach((sk,wi)=>{
            const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
            const val=(row.weeks||{})[sk];
            html+=`<div class="gc${hi}"><div class="amt-display${val?'':' amt-empty'}" data-a="open-qty-agg" data-ri="${ri}" data-shopid="${esc(shop.id)}" data-key="${sk}" data-grp="${esc(g)}">${val?cur()+parseFloat(val).toFixed(2):'<span style="font-style:italic;font-size:11px;color:var(--muted)">tap</span>'}</div></div>`;
          });
        }
        html+=`<div class="gc mo"><div class="mo-val${moTotal>0?' has':''}">${moTotal>0?cur()+moTotal.toFixed(2):''}</div></div>`;
        grandMoTot+=moTotal;
        suns.forEach((sk,wi)=>{ grandWkTots[wi]+=n((row.weeks||{})[sk]); });
      });
    });
    html+=`</div>`; // close shop grid
    html+=`</div>`; // close stripe wrapper

  // Grand totals bar
  html+=`<div class="shop-grid" style="grid-template-columns:${gridCols};margin-left:8px;background:var(--navy);border-radius:0 0 8px 8px">`;

  } else {
    suns.forEach((sk,wi)=>{
      const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
      html+=`<div class="gc tot${hi}"><div class="tp num wht">${grandWkTots[wi]>0?cur()+grandWkTots[wi].toFixed(2):'—'}</div></div>`;
    });
  }
  html+=`<div class="gc tot mo"><div class="tp num wht">${grandMoTot>0?cur()+grandMoTot.toFixed(2):'—'}</div></div>`;
  html+=`</div>`;

  html+=`</div>`; // close shop-wrap outer
  main.innerHTML=html;

  // Nav events
  const mnPrev=document.getElementById('mn-prev');
  const mnNext=document.getElementById('mn-next');
  if(mnPrev) mnPrev.onclick=()=>{ currentMk=offsetMk(currentMk,-1); viewWk=0; renderPage(); };
  if(mnNext) mnNext.onclick=()=>{ currentMk=offsetMk(currentMk,1); viewWk=0; renderPage(); };
  const wnPrev=document.getElementById('wn-prev');
  const wnNext=document.getElementById('wn-next');
  if(wnPrev) wnPrev.onclick=()=>{ if(viewWk>0){viewWk--;renderPage();} };
  if(wnNext) wnNext.onclick=()=>{ if(viewWk<suns.length-1){viewWk++;renderPage();} };

  // Desc picker in aggregate — listen on main since sgrid is now per-shop
  main.addEventListener('click',e=>{
      const el=e.target.closest('[data-a]');
      if(!el) return;
      const a=el.dataset.a;
      if(a==='pick-desc-agg'){
        const shop=db.shops.find(s=>s.id===el.dataset.shopid);
        if(!shop) return;
        // Temporarily point to this shop for product picker
        const origIds=selectedShopIds;
        selectedShopIds=[shop.id];
        openProductPicker(parseInt(el.dataset.ri), el.dataset.grp||'', shop);
        selectedShopIds=origIds;
      } else if(a==='open-qty-agg'){
        const shop=db.shops.find(s=>s.id===el.dataset.shopid);
        if(!shop) return;
        const ri=parseInt(el.dataset.ri);
        const row2=shop.rows?.[ri];
        if(!row2||!row2.desc){ openProductPicker(ri, el.dataset.grp||'', shop); }
        else { openQtyPickerForShop(ri, el.dataset.key, el.dataset.grp||'', shop); }
      }
  });
}

      <div style="font-size:64px;margin-bottom:12px">🛒</div>
      <h2>Welcome to Money Bot</h2>
      <p>Track your weekly and monthly shopping spend across all your stores.</p>
      <button class="btn-primary" id="home-setup">Set up my budget →</button>
    </div>`;
    document.getElementById('home-setup').onclick=()=>navigate('shop');
    return;
  }
  const now=new Date();
  const hr=now.getHours();
  const greeting=hr<12?'Good morning':hr<18?'Good afternoon':'Good evening';
  const todayStr=now.toLocaleDateString('default',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const mk=mkey(now);
  const suns=getSundaysForMk(mk);
  const wkIdx=todayWkIdx(mk);
  const wkKey=suns[wkIdx]||suns[0];
  const wkBud=n(shopWeekBudgets()[wkKey]);
  const wkSpent=weekColTotal(wkKey);
  const wkLeft=wkBud-wkSpent;
  const moBud=calcMonthBudget(suns);
  const moSpent=grandMonthTotal(suns);
  const moLeft=moBud-moSpent;
  const yr=fyForDate(now);
  const annBud=n(shopAnnualBudgets()[yr]);
  const annSpent=yearTotal(yr);
  const annLeft=annBud-annSpent;

  const wkD=new Date(wkKey);
  const wkLabel=`Week ${wkIdx+1} · ${dayLabel(wkD)}`;

  function card(label,title,spent,left,bud,page){
    const pct=bud>0?Math.min(100,(spent/bud)*100):0;
    const over=spent>bud&&bud>0;
    const remHtml=bud>0?`<div class="hc-num"><div class="lbl">Remaining</div><div class="val ${left>=0?'pos':'neg'}">${cur()}${Math.abs(left).toFixed(2)}</div></div>`:'';
    return `<div class="home-card" data-nav="${page}">
      <div class="hc-label">${label}</div>
      <div class="hc-title">${title}</div>
      <div class="hc-nums">
        ${bud>0?`<div class="hc-num"><div class="lbl">Budget</div><div class="val">${cur()}${bud.toFixed(2)}</div></div>`:''}
        <div class="hc-num"><div class="lbl">Spent</div><div class="val">${cur()}${spent.toFixed(2)}</div></div>
        ${remHtml}
      </div>
      ${bud>0?`<div class="progress-bar"><div class="progress-fill${over?' over':''}" style="width:${pct}%"></div></div>`:''}
    </div>`;
  }

  main.innerHTML=`<div class="home-wrap">
    <div class="home-greeting"><h2>${greeting}</h2><div class="date">${todayStr}</div></div>
    ${card('This Week',wkLabel,wkSpent,wkLeft,wkBud,'shopsel')}
    ${card('This Month',mLabel(mk),moSpent,moLeft,moBud,'shopsel')}
    ${annBud>0?card('This Year',fyLabel(yr),annSpent,annLeft,annBud,'annual'):''}
    <div class="home-links">
      <button class="home-link-btn" data-nav="shopsel">🛒 Enter this week's shopping</button>
<button class="home-link-btn" data-nav="summary">📋 View summary</button>
      <button class="home-link-btn" data-nav="admin">⚙️ Admin</button>
    </div>
    <div class="home-footer">Money Bot ${APP_VER}</div>
  </div>`;
  main.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>navigate(el.dataset.nav)));
}

function renderShop(main){
  // First-use popup: show once when no amounts have been entered
  if(!hasAnyAmounts()&&!sessionStorage.getItem('mb_wk_prompted')){
    sessionStorage.setItem('mb_wk_prompted','1');
    const dayName=DAY_NAMES[db.weekStartDay||0];
    const canChange=!hasAnyAmounts();
    setTimeout(()=>{
      showModal('Week start day',
        `<div style="font-size:14px;line-height:1.6">
          <p>Money Bot currently starts each week on <strong>${dayName}</strong>.</p>
          <p>This setting <strong>cannot be changed once you start entering shopping data</strong>. If you would like a different day, please update it in <strong>Admin → Financial Year → Week starts on</strong> before making your first entry.</p>
          <p style="font-size:12px;color:var(--muted)">If you ever need to change this later, you can export all your data, clear your amounts, change the setting, and re-import.</p>
        </div>`,
        [{label:'Got it',cb:()=>{}}]
      );
    },400);
  }
  const activeShops=selectedShops();
  // Single shop: normal render. Multi-shop: aggregate render.
  if(activeShops.length>1){
    renderShopAggregate(main, activeShops);
    return;
  }
  const suns=getSundaysForMk(currentMk);
  const todayMkNow=mkey(new Date());
  const isCurrent=currentMk===todayMkNow;
  const isFuture=currentMk>todayMkNow;
  const minMk=offsetMk(todayMkNow,-13);
  const maxMk=offsetMk(todayMkNow,12);
  const todaySunIdx=isCurrent?todayWkIdx(currentMk):0;

  // clamp viewWk
  if(viewWk>=suns.length) viewWk=suns.length-1;

  const moBud=calcMonthBudget(suns);
  const moSpent=grandMonthTotal(suns);
  const moRem=moBud-moSpent;

  // month nav bar
  let badgeHtml='';
  if(isCurrent) badgeHtml='<span class="mnav-badge today">Today</span>';
  else if(isFuture) badgeHtml='<span class="mnav-badge future">Future</span>';

  const shopName=activeShop()?.name||'Shop';
  const shopColor=activeShop()?.color||'#2563EB';
  let html=`<div class="shop-header-banner" style="background:${shopColor}"><strong>${esc(shopName)}</strong> <span style="opacity:.6;font-size:11px">tap Shop to switch</span></div><div style="border-left:5px solid ${shopColor}">
  <div class="mnavbar">
    <button class="mnav-btn" id="mn-prev" ${currentMk<=minMk?'disabled':''}>‹</button>
    <div class="mnav-center"><span class="mnav-month">${mLabel(currentMk)}</span>${badgeHtml}</div>
    <button class="mnav-btn" id="mn-next" ${currentMk>=maxMk?'disabled':''}>›</button>
  </div>
  <div class="shop-wrap"><div class="shop-grid" id="sgrid">`;

  // build grid columns style
  if(mobile){
    // narrow: desc | 1 week | month
    html=html.replace('id="sgrid">',`id="sgrid" style="grid-template-columns:minmax(90px,2fr) minmax(76px,1fr) minmax(68px,1fr)">`);
  } else {
    const wkCols=suns.length;
    const wkFr=`repeat(${wkCols},minmax(65px,1fr))`;
    html=html.replace('id="sgrid">',`id="sgrid" style="grid-template-columns:minmax(110px,2fr) ${wkFr} minmax(75px,1fr)">`);
  }

  // == HEADER ROW ==
  // Description header
  html+=`<div class="gc hdr"><div class="hdr-inner"><div class="hdr-lbl">Item</div><div style="font-size:10px;color:#bbb;font-style:italic">tap to choose or type</div></div></div>`;

  if(mobile){
    // week nav bar — rendered ABOVE the grid, not inside it
    const wkD=new Date(suns[viewWk]);
    // inject wknavbar AFTER mnavbar and BEFORE shop-wrap
    html=html.replace('<div class="shop-wrap">',`<div class="wknavbar"><button class="wk-nav-btn" id="wn-prev" ${viewWk===0?'disabled':''}>‹</button><div class="wknavbar-lbl">Week ${viewWk+1} · ${dayLabel(wkD)}</div><button class="wk-nav-btn" id="wn-next" ${viewWk>=suns.length-1?'disabled':''}>›</button></div><div class="shop-wrap">`);
    // simple header cell — just budget input, no nav arrows
    html+=`<div class="gc hdr wk-hi"><div class="hdr-inner">
      <div class="hdr-lbl">Budget</div>
      <input class="bud-in" type="number" min="0" step="0.01" placeholder="0" value="${esc(shopWeekBudgets()[suns[viewWk]]||'')}" data-a="wb" data-key="${suns[viewWk]}">
    </div></div>`;
  } else {
    suns.forEach((sk,wi)=>{
      const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
      const d=new Date(sk);
      html+=`<div class="gc hdr${hi}"><div class="hdr-inner">
        <div class="hdr-lbl">Week ${wi+1}</div>
        <div class="hdr-date">${dayLabel(d)}</div>
        <div class="hdr-lbl">Budget</div>
        <input class="bud-in" type="number" min="0" step="0.01" placeholder="0" value="${esc(shopWeekBudgets()[sk]||'')}" data-a="wb" data-key="${sk}">
        <button class="reset-btn" data-a="reset" data-key="${sk}" data-wi="${wi}">↺ reset</button>
      </div></div>`;
    });
  }

  // Month header
  html+=`<div class="gc hdr mo"><div class="hdr-inner">
    <div class="hdr-lbl" style="font-weight:700;color:var(--navy)">${mShort(currentMk).toUpperCase()}</div>
    <div class="hdr-lbl" style="margin-top:2px">Budget (auto)</div>
    <div class="bud-auto">${moBud>0?cur()+moBud.toFixed(2):'—'}</div>
  </div></div>`;

  // == DATA ROWS (grouped) ==
  const allGroups=[...shopGroups(),''];
  // Reset collapsed state whenever the active shop changes
  const currentShopId=activeShop()?.id||null;
  if(currentShopId!==lastRenderedShopId){
    collapsedGroups=new Set();
    lastRenderedShopId=currentShopId;
  }
  // Default: all groups including Other start collapsed
  if(collapsedGroups.size===0){ shopGroups().forEach(g=>collapsedGroups.add(g)); collapsedGroups.add(''); }
  allGroups.forEach(g=>{
    const gRows=shopRows().filter(r=>(r.group||'')===g);
    if(gRows.length===0) return;
    // isCollapsed applies to all groups including Other ('')
    const isCollapsed=collapsedGroups.has(g);
    // Only show group header if it has a name
    // Always show a header — named groups and Other both get one
    {
      const grpDisplayName = g || 'Other';
      const grpMoTotDisp = groupMonthTotal(g, suns);
      if(isCollapsed){
        // Collapsed: name cell + subtotal cells aligned to columns
        html+=`<div class="gc grp" style="cursor:pointer" data-a="toggle-grp" data-grp="${esc(g)}">
          <div class="grp-cell" style="cursor:pointer;pointer-events:none">
            <span class="grp-name">${esc(grpDisplayName)}</span>
            <span class="grp-chevron collapsed" style="margin-left:auto">▶</span>
          </div>
        </div>`;
        if(mobile){
          const sk=suns[viewWk];
          const gt=groupWeekTotal(g,sk);
          html+=`<div class="gc grp wk-hi" style="cursor:pointer" data-a="toggle-grp" data-grp="${esc(g)}"><div class="tp num" style="padding:9px 8px">${gt>0?fmtPos(gt):'—'}</div></div>`;
        } else {
          suns.forEach((sk,wi)=>{
            const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
            const gt=groupWeekTotal(g,sk);
            html+=`<div class="gc grp${hi}" style="cursor:pointer" data-a="toggle-grp" data-grp="${esc(g)}"><div class="tp num" style="padding:9px 8px">${gt>0?fmtPos(gt):'—'}</div></div>`;
          });
        }
        html+=`<div class="gc grp mo" style="cursor:pointer" data-a="toggle-grp" data-grp="${esc(g)}"><div class="tp num" style="padding:9px 8px">${grpMoTotDisp>0?fmtPos(grpMoTotDisp):'—'}</div></div>`;
      } else {
        // Expanded: full-width header
        html+=`<div class="gc grp grp-span" style="grid-column:1/-1">
          <div class="grp-cell" data-a="toggle-grp" data-grp="${esc(g)}">
            <span class="grp-name">${esc(grpDisplayName)}</span>
            <span class="grp-chevron">▼</span>
            ${g?`<button class="grp-del" data-a="del-grp" data-grp="${esc(g)}" title="Remove group (rows stay)">×</button>`:''}
          </div>
        </div>`;
      }
    }
    // item rows and subtotal — skip if collapsed
    if(!isCollapsed){
    gRows.forEach((row,localIdx)=>{
      const ri=shopRows().indexOf(row);
      const isBlank=isBlankRow(row);
      const moTotal=rowMonthTotal(row,suns);
      // desc cell — tapping opens product picker
      const descColor=row.desc?'var(--text)':'var(--muted)';
      const descContent=row.desc?esc(row.desc):'<span style="font-style:italic">add item…</span>';
      html+=`<div class="gc" style="cursor:pointer" data-a="pick-desc" data-ri="${ri}" data-grp="${esc(g)}" onclick="void(0)"><div class="desc-cell" style="height:var(--row-h);display:flex;align-items:center;padding:0 8px;font-size:13px;color:${descColor};pointer-events:none">${descContent}</div></div>`;
      // amount cells
      if(mobile){
        const sk=suns[viewWk];
        const hi=viewWk===todaySunIdx&&isCurrent?' wk-hi':'';
        html+=`<div class="gc${hi}">
          <button class="amt-display${(row.weeks||{})[sk]?'':' amt-empty'}" data-a="open-qty" data-ri="${ri}" data-key="${sk}" data-grp="${esc(g)}">
            ${(row.weeks||{})[sk]?cur()+parseFloat((row.weeks||{})[sk]).toFixed(2):'<span style="font-style:italic;font-size:11px;color:var(--muted)">tap</span>'}
          </button>
        </div>`;
      } else {
        suns.forEach((sk,wi)=>{
          const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
          html+=`<div class="gc${hi}">
            <button class="amt-display${(row.weeks||{})[sk]?'':' amt-empty'}" data-a="open-qty" data-ri="${ri}" data-key="${sk}" data-grp="${esc(g)}">
              ${(row.weeks||{})[sk]?cur()+parseFloat((row.weeks||{})[sk]).toFixed(2):'<span style="font-style:italic;font-size:11px;color:var(--muted)">tap</span>'}
            </button>
          </div>`;
        });
      }
      // month total cell
      html+=`<div class="gc mo"><div class="mo-val${moTotal>0?' has':''}">${moTotal>0?cur()+moTotal.toFixed(2):''}</div></div>`;
    });

    // sub-total row (only if named group or if there are named groups)
    if(g||shopGroups().length>0){
      const label=g?`${g} subtotal`:'Other subtotal';
      html+=`<div class="gc sub"><div class="tp lbl">${esc(label)}</div></div>`;
      if(mobile){
        const sk=suns[viewWk];
        const gt=groupWeekTotal(g,sk);
        html+=`<div class="gc sub wk-hi"><div class="tp num">${gt>0?fmtPos(gt):'—'}</div></div>`;
      } else {
        suns.forEach((sk,wi)=>{
          const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
          const gt=groupWeekTotal(g,sk);
          html+=`<div class="gc sub${hi}"><div class="tp num">${gt>0?fmtPos(gt):'—'}</div></div>`;
        });
      }
      const gmo=groupMonthTotal(g,suns);
      html+=`<div class="gc sub mo"><div class="tp num">${gmo>0?fmtPos(gmo):'—'}</div></div>`;
    }
    } // end if(!isCollapsed)
  });

  // == SPENT ROW ==
  html+=`<div class="gc tot strong-top"><div class="tp lbl">Spent</div></div>`;
  if(mobile){
    const sk=suns[viewWk]; const wt=weekColTotal(sk);
    html+=`<div class="gc tot wk-hi strong-top"><div class="tp num">${wt>0?fmtPos(wt):'—'}</div></div>`;
  } else {
    suns.forEach((sk,wi)=>{
      const hi=wi===todaySunIdx&&isCurrent?' wk-hi':''; const wt=weekColTotal(sk);
      html+=`<div class="gc tot${hi} strong-top"><div class="tp num">${wt>0?fmtPos(wt):'—'}</div></div>`;
    });
  }
  html+=`<div class="gc tot mo strong-top"><div class="tp num">${moSpent>0?fmtPos(moSpent):'—'}</div></div>`;

  // == LEFT ROW ==
  html+=`<div class="gc tot"><div class="tp lbl">Left</div></div>`;
  if(mobile){
    const sk=suns[viewWk]; const wb=n(shopWeekBudgets()[sk]); const ws=weekColTotal(sk);
    html+=`<div class="gc tot wk-hi">${remSpan(wb-ws,wb>0,ws)}</div>`;
  } else {
    suns.forEach((sk,wi)=>{
      const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
      const wb=n(shopWeekBudgets()[sk]); const ws=weekColTotal(sk);
      html+=`<div class="gc tot${hi}">${remSpan(wb-ws,wb>0,ws)}</div>`;
    });
  }
  html+=`<div class="gc tot mo">${remSpan(moRem,moBud>0,moSpent)}</div>`;

  html+=`</div></div>`; // close grid + shop-wrap
  html+=`</div>`; // close stripe wrapper

  // Add-group button
  html+=`<div class="add-grp-bar">
    <button class="add-grp-btn" id="add-grp-btn">＋ Add store / group</button>
  </div>`;

  // YTD strip
  const yr=fyForMk(currentMk);
  const annBud=n(shopAnnualBudgets()[yr]);
  if(annBud>0){
    const annSp=yearTotal(yr);
    const annL=annBud-annSp;
    html+=`<div class="ytd-strip">
      <span>Year so far:</span>
      <strong>${cur()}${annSp.toFixed(2)}</strong>
      <span>of</span>
      <strong>${cur()}${annBud.toFixed(2)}</strong>
      <span>—</span>
      <strong style="color:${annL>=0?'#6EE7B7':'#FCA5A5'}">${cur()}${Math.abs(annL).toFixed(2)} ${annL>=0?'left':'over'}</strong>
    </div>`;
  }

  main.innerHTML=html;

  // Attach nav events
  const mnPrev=document.getElementById('mn-prev');
  const mnNext=document.getElementById('mn-next');
  if(mnPrev) mnPrev.onclick=()=>{ currentMk=offsetMk(currentMk,-1); viewWk=0; renderPage(); };
  if(mnNext) mnNext.onclick=()=>{ currentMk=offsetMk(currentMk,1); viewWk=0; renderPage(); };
  const wnPrev=document.getElementById('wn-prev');
  const wnNext=document.getElementById('wn-next');
  if(wnPrev) wnPrev.onclick=()=>{ if(viewWk>0){viewWk--;renderPage();} };
  if(wnNext) wnNext.onclick=()=>{ if(viewWk<suns.length-1){viewWk++;renderPage();} };

  const addGrpBtn=document.getElementById('add-grp-btn');
  if(addGrpBtn) addGrpBtn.onclick=()=>{
    showInputModal('Add store / group','Store name (e.g. Riverford)',name=>{
      if(name&&!shopGroups().includes(name)){
        shopGroups().push(name);
        const s=activeShop();
        if(s){
          if(!s.storeProducts) s.storeProducts={};
          if(!s.storeProducts[name]) s.storeProducts[name]=[];
        }
        ensureGroupBlanks();
        save();
      }
      renderPage();
    });
  };

  // Attach grid events
  const grid=document.getElementById('sgrid');
  if(grid){
    grid.addEventListener('change',onShopChange);
    grid.addEventListener('click',onShopClick);
  }
}

function onShopChange(e){
  const el=e.target; const a=el.dataset.a;
  if(a==='wb'){
    shopWeekBudgets()[el.dataset.key]=el.value;
    save(); renderPage();
  // desc changes now handled by product picker popup
  } else if(a==='amt'){
    const ri=parseInt(el.dataset.ri);
    const key=el.dataset.key;
    if(!shopRows()[ri].weeks) shopRows()[ri].weeks={};
    shopRows()[ri].weeks[key]=el.value;
    ensureGroupBlanks();
    save(); renderPage();
  }
}

function onShopClick(e){
  // walk up to find data-a element
  const el=e.target.closest('[data-a]')||e.target;
  const a=el?el.dataset.a:null;
  if(a==='pick-desc'){
    const ri3=parseInt(el.dataset.ri);
    const rows3=shopRows();
    if(isNaN(ri3)||ri3<0||ri3>=rows3.length){ return; }
    openProductPicker(ri3, el.dataset.grp||'');
    return;
  }
  if(a==='open-qty'){
    const ri2=parseInt(el.dataset.ri);
    const rows2=shopRows();
    // Guard: ri2 must be valid
    if(isNaN(ri2)||ri2<0||ri2>=rows2.length){
      console.warn('open-qty: invalid ri',ri2,'rows',rows2.length);
      return;
    }
    const row2=rows2[ri2];
    if(!row2||!row2.desc){
      openProductPicker(ri2, el.dataset.grp||'');
    } else {
      openQtyPicker(ri2, el.dataset.key, el.dataset.grp||'');
    }
    return;
  }
  if(a==='toggle-grp'){
    const grp=el.dataset.grp;
    if(collapsedGroups.has(grp)) collapsedGroups.delete(grp);
    else collapsedGroups.add(grp);
    renderPage();
    return;
  }
  if(a==='reset'){
    const sk=el.dataset.key; const wi=el.dataset.wi;
    const d=new Date(sk); const lbl=dayLabel(d);
    confirmModal(`Reset Week ${parseInt(wi)+1}`,`Clear all amounts for ${lbl}? The week budget will not be affected. This cannot be undone.`,()=>{
      shopRows().forEach(r=>{ if(r.weeks) delete r.weeks[sk]; });
      save(); renderPage();
    },'Clear','danger');
  } else if(a==='del-grp'){
    const grp=el.dataset.grp;
    confirmModal(`Remove group "${grp}"?`,'Item rows will become ungrouped. No data will be deleted.',()=>{
      const idx=shopGroups().indexOf(grp);
      if(idx>-1) shopGroups().splice(idx,1);
      shopRows().forEach(r=>{ if(r.group===grp) r.group=''; });
      save(); renderPage();
    },'Remove');
  }
}

function renderAnnual(main){
  const todayNow=new Date();
  const todayMkNow=mkey(todayNow);

  // initialise FY to current
  if(!annualFy) annualFy=fyForDate(todayNow);

  const ysm=db.yearStartMonth||1;
  const minFy=fyForMk(offsetMk(todayMkNow,-13));
  const maxFy=String(parseInt(fyForDate(todayNow))+2);
  const canPrev=annualFy>minFy;
  const canNext=annualFy<maxFy;

  const {startMk,endMk}=fyRange(annualFy);
  const annBud=n(shopAnnualBudgets()[annualFy]);

  // Calculate all months in this FY
  const fyMonths=[];
  let mk=startMk;
  while(mk<=endMk){ fyMonths.push(mk); mk=offsetMk(mk,1); }

  // Totals
  let totalBud=0, totalSp=0;
  const monthData=fyMonths.map(mk=>{
    const suns=getSundaysForMk(mk);
    const bud=calcMonthBudget(suns);
    const sp=grandMonthTotal(suns);
    totalBud+=bud; totalSp+=sp;
    return {mk,bud,sp};
  });

  const annRem=annBud-totalSp;
  const hasBud=annBud>0;
  const pct=hasBud?Math.min(100,(totalSp/annBud)*100):0;
  const over=totalSp>annBud&&hasBud;
  const isCurrFy=annualFy===fyForDate(todayNow);
  const isFutureFy=annualFy>fyForDate(todayNow);

  let badge='';
  if(isCurrFy) badge='<span class="mnav-badge today" style="margin-left:8px">Current</span>';
  else if(isFutureFy) badge='<span class="mnav-badge future" style="margin-left:8px">Future</span>';

  let html=`<div class="annual-wrap">`;

  // Month nav bar (reuse mnavbar style)
  html+=`<div class="mnavbar">
    <button class="mnav-btn" id="an-prev" ${!canPrev?'disabled':''}>‹</button>
    <div class="mnav-center">
      <span class="mnav-month">${fyLabel(annualFy)}</span>${badge}
    </div>
    <button class="mnav-btn" id="an-next" ${!canNext?'disabled':''}>›</button>
  </div>`;

  // Annual budget input
  html+=`<div class="annual-bud-bar">
    <label>Annual budget</label>
    <div class="annual-bud-input-wrap">
      <span>${cur()}</span>
      <input type="number" min="0" step="0.01" id="annual-bud-in"
        value="${esc(shopAnnualBudgets()[annualFy]||'')}" placeholder="0">
    </div>
    ${hasBud?`<span style="font-size:12px;color:var(--muted)">set in Admin → Annual Budget</span>`:`<span style="font-size:12px;color:var(--muted)">set in Admin → Annual Budget</span>`}
  </div>`;

  // Summary bar
  if(hasBud||totalSp>0){
    html+=`<div class="annual-summary-bar">
      ${hasBud?`<div class="annual-summary-item"><div class="lbl">Budget</div><div class="val">${cur()}${annBud.toFixed(2)}</div></div>`:''}
      <div class="annual-summary-item"><div class="lbl">Spent</div><div class="val">${cur()}${totalSp.toFixed(2)}</div></div>
      ${hasBud?`<div class="annual-summary-item"><div class="lbl">${annRem>=0?'Remaining':'Over budget'}</div><div class="val ${annRem>=0?'pos':'neg'}">${annRem<0?'-':''}${cur()}${Math.abs(annRem).toFixed(2)}</div></div>`:''}
    </div>`;
    if(hasBud){
      html+=`<div class="annual-prog-wrap" style="padding-top:8px">
        <div class="annual-prog"><div class="annual-prog-fill${over?' over':''}" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:right">${Math.round(pct)}% of annual budget used</div>
      </div>`;
    }
  }

  // Month table
  html+=`<div class="annual-table">
    <div class="annual-row hdr">
      <div class="annual-cell bold">Month</div>
      <div class="annual-cell bold right">Budget</div>
      <div class="annual-cell bold right">Spent</div>
      <div class="annual-cell bold right">Left / Over</div>
    </div>`;

  monthData.forEach(({mk,bud,sp})=>{
    const rem=bud-sp;
    const hasMBud=bud>0;
    const isFuture=mk>todayMkNow;
    const isCurrent=mk===todayMkNow;
    const mName=new Date(parseInt(mk.split('-')[0]),parseInt(mk.split('-')[1])-1,1)
      .toLocaleString('default',{month:'long'});
    const remCls=hasMBud?(rem>=0?'pos':'neg'):sp>0?'neg':'muted';
    const remVal=hasMBud||sp>0?(rem<0?'-':'')+cur()+Math.abs(rem).toFixed(2):'—';

    html+=`<div class="annual-row${isFuture?' future':''}" data-nav-mk="${mk}">
      <div class="annual-cell bold">${mName}${isCurrent?' <span style="font-size:10px;background:var(--blue);color:#fff;padding:1px 5px;border-radius:4px;vertical-align:middle">Now</span>':''}</div>
      <div class="annual-cell right ${hasMBud?'':'muted'}">${hasMBud?cur()+bud.toFixed(2):'—'}</div>
      <div class="annual-cell right ${sp>0?'bold':'muted'}">${sp>0?cur()+sp.toFixed(2):'—'}</div>
      <div class="annual-cell right ${remCls}">${remVal}</div>
    </div>`;
  });

  // Total row
  const totalRem=totalBud-totalSp;
  html+=`<div class="annual-row total">
    <div class="annual-cell wht bold">Year total</div>
    <div class="annual-cell wht-dim right">${totalBud>0?cur()+totalBud.toFixed(2):'—'}</div>
    <div class="annual-cell wht bold right">${totalSp>0?cur()+totalSp.toFixed(2):'—'}</div>
    <div class="annual-cell ${totalBud>0||(totalSp>0&&totalBud===0)?((totalBud-totalSp)<0?'neg':'wht'):'wht-dim'} bold right">${totalBud>0||(totalSp>0&&totalBud===0)?((totalBud-totalSp)<0?'-':'')+cur()+Math.abs(totalBud-totalSp).toFixed(2):'—'}</div>
  </div>`;

  html+=`</div>`; // close annual-table

  // No data message
  if(totalSp===0&&!hasBud){
    html+=`<div class="annual-no-data">No data yet for ${fyLabel(annualFy)}.<br>Set a budget in Admin → Annual Budget, or start entering shopping in Weekly Shop.</div>`;
  }

  html+=`</div>`; // close annual-wrap
  main.innerHTML=html;

  // Nav
  document.getElementById('an-prev').onclick=()=>{ annualFy=String(parseInt(annualFy)-1); renderPage(); };
  document.getElementById('an-next').onclick=()=>{ annualFy=String(parseInt(annualFy)+1); renderPage(); };

  // Annual budget input — read-only display (set via Admin)
  const budIn=document.getElementById('annual-bud-in');
  if(budIn){
    budIn.onchange=()=>{
      if(budIn.value) shopAnnualBudgets()[annualFy]=budIn.value;
      else delete shopAnnualBudgets()[annualFy];
      save(); renderPage();
    };
  }

  // Tap month row → navigate to that month in Weekly Shop
  main.querySelectorAll('[data-nav-mk]').forEach(row=>{
    row.onclick=()=>{
      currentMk=row.dataset.navMk;
      navigate('shop');
    };
  });
}
