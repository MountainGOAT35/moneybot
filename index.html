<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Money Bot v21</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --font:'Outfit',system-ui,sans-serif;
  --bg:#F7F6F2;
  --surface:#FFFFFF;
  --border:#E2DFDA;
  --border2:#CCC9C3;
  --text:#1A1A1A;
  --muted:#6B7070;
  --navy:#1E3048;
  --navy2:#263D5A;
  --blue:#2563EB;
  --blue-lt:#EFF6FF;
  --blue-hdr:#DBEAFE;
  --mo-bg:#FDF8F0;
  --mo-hdr:#F5EFE3;
  --grp-hdr:#F0EDE8;
  --sub-bg:#F8F6F3;
  --green:#15803D;
  --red:#DC2626;
  --green-bg:#F0FDF4;
  --red-bg:#FEF2F2;
  --row-h:46px;
  --sb-w:172px;
  --bn-h:60px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text)}

/* ── APP SHELL ── */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sb-w);flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
#sb-brand{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
#sb-brand h1{font-size:14px;font-weight:700;color:#fff;line-height:1.3}
#sb-brand .ver{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.sb-nav{padding:8px 0;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 16px;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all .15s;text-decoration:none;-webkit-user-select:none;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:rgba(37,99,235,.25);border-left-color:var(--blue);color:#fff}
.sb-item .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
#main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;padding-top:env(safe-area-inset-top);height:calc(50px + env(safe-area-inset-top));align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;flex-shrink:0}
#tb-left{display:flex;flex-direction:column}
#tb-appname{font-size:15px;font-weight:700;line-height:1.1}
#tb-pagename{font-size:11px;color:var(--muted)}
#tb-admin{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px 8px;border-radius:6px}
#tb-admin:hover{background:var(--bg)}
#main{flex:1;overflow-y:auto}
#bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);height:var(--bn-h);padding-bottom:env(safe-area-inset-bottom);z-index:20;flex-shrink:0}
.bn-inner{display:flex;height:100%}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:500;border:none;background:none;padding:0;-webkit-user-select:none;user-select:none;transition:color .15s}
.bn-item .ico{font-size:20px;line-height:1}
.bn-item.active{color:var(--blue)}
.bn-item:active{opacity:.7}

/* ── MOBILE ── */
@media(max-width:599px){
  #sidebar{display:none}
  #topbar{display:flex}
  #bottomnav{display:block}
  #main{padding-bottom:var(--bn-h)}
}

/* ── HOME PAGE ── */
.home-wrap{padding:20px 16px 24px;max-width:600px}
.home-greeting{margin-bottom:20px}
.home-greeting h2{font-size:22px;font-weight:700}
.home-greeting .date{font-size:13px;color:var(--muted);margin-top:3px}
.home-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;transition:box-shadow .15s,transform .1s}
.home-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.home-card:active{transform:scale(.99)}
.hc-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px}
.hc-title{font-size:16px;font-weight:700;margin-bottom:10px}
.hc-nums{display:flex;gap:20px;margin-bottom:10px;flex-wrap:wrap}
.hc-num{display:flex;flex-direction:column;gap:2px}
.hc-num .lbl{font-size:11px;color:var(--muted)}
.hc-num .val{font-size:18px;font-weight:700}
.hc-num .val.pos{color:var(--green)}
.hc-num .val.neg{color:var(--red)}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;background:var(--blue)}
.progress-fill.over{background:var(--red)}
.home-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.home-link-btn{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;font-family:var(--font)}
.home-link-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.home-link-btn:active{opacity:.8}
.home-footer{margin-top:20px;font-size:11px;color:var(--muted)}
.home-first{text-align:center;padding:40px 20px}
.home-first h2{font-size:24px;font-weight:700;margin-bottom:8px}
.home-first p{color:var(--muted);margin-bottom:24px}
.btn-primary{padding:12px 24px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn-primary:active{opacity:.85}

/* ── MONTH NAV BAR ── */
.mnavbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;gap:8px}
@media(max-width:599px){.mnavbar{position:relative;top:auto}}
.mnav-btn{background:var(--navy);color:#fff;border:none;border-radius:8px;width:40px;height:40px;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.mnav-btn:disabled{background:var(--border);color:var(--muted);cursor:default}
.mnav-btn:not(:disabled):active{opacity:.75}
.mnav-center{flex:1;text-align:center}
.mnav-month{font-size:16px;font-weight:700}
.mnav-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.mnav-badge.today{background:var(--blue);color:#fff}
.mnav-badge.future{background:#F3F4F6;color:var(--muted)}

/* ── SHOP GRID ── */
.shop-wrap{overflow-x:auto}
.shop-grid{display:grid;border-left:1px solid var(--border);border-top:1px solid var(--border)}
.gc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);min-width:0;overflow:hidden}
.gc.wk-hi{background:var(--blue-lt)}
.gc.mo{background:var(--mo-bg)}
.gc.hdr{background:var(--bg)}
.gc.hdr.wk-hi{background:var(--blue-hdr)}
.gc.hdr.mo{background:var(--mo-hdr)}
.gc.grp{background:var(--grp-hdr)}
.gc.sub{background:var(--sub-bg)}
.gc.sub.wk-hi{background:#E0ECFF}
.gc.sub.mo{background:#EEE8DC}
.gc.tot{background:var(--bg)}
.gc.tot.wk-hi{background:var(--blue-hdr)}
.gc.tot.mo{background:var(--mo-hdr)}
.gc.strong-top{border-top:2px solid var(--border2)}

/* header cells */
.hdr-inner{padding:8px 8px 6px}
.hdr-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px;font-weight:600}
.hdr-date{font-size:11px;color:var(--navy);font-weight:600;margin-bottom:4px}
.bud-in{display:block;width:100%;font-size:14px;font-weight:700;color:var(--blue);border:none;border-bottom:1.5px solid var(--blue);background:transparent;padding:2px 0;outline:none;font-family:var(--font)}
.bud-in::placeholder{color:#C8C4C0;font-weight:400}
.bud-auto{font-size:14px;font-weight:700;color:var(--navy);padding:2px 0}
.reset-btn{margin-top:5px;font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--font);text-decoration:underline;padding:0}
.reset-btn:hover{color:var(--red)}

/* week nav (narrow) */
.wk-nav{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:6px}
.wk-nav-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;width:44px;height:44px;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-user-select:none;user-select:none}
.wk-nav-btn:disabled{background:var(--border);color:var(--muted)}
.wk-nav-btn:not(:disabled):active{opacity:.75;transform:scale(.94)}
.wk-nav-lbl{font-size:12px;font-weight:700;text-align:center;line-height:1.3}

/* data cells */
.desc-in,.amt-in{display:block;width:100%;height:var(--row-h);border:none;background:transparent;padding:0 8px;font-size:13px;color:var(--text);outline:none;font-family:var(--font)}
.amt-in{text-align:right}
.desc-in::placeholder{color:#C0BDB8;font-style:italic}
.mo-val{height:var(--row-h);display:flex;align-items:center;justify-content:flex-end;padding:0 8px;font-size:13px;color:var(--muted)}
.mo-val.has{color:var(--text);font-weight:600}

/* group header cell */
.grp-cell{display:flex;align-items:center;gap:8px;padding:0 10px;height:38px}
.grp-name{font-size:13px;font-weight:700;color:var(--navy);flex:1}
.grp-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 4px;border-radius:4px;font-family:var(--font)}
.grp-del:hover{color:var(--red);background:var(--red-bg)}
.grp-span{grid-column:1/-1}

/* sub-total and total cells */
.tp{padding:9px 8px}
.tp.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
.tp.num{text-align:right;font-weight:700;font-size:13px}
.tp.pos{color:var(--green)}
.tp.neg{color:var(--red)}
.tp.dim{color:var(--muted)}

/* add-group bar */
.add-grp-bar{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--bg)}
.add-grp-btn{padding:7px 14px;border:1px dashed var(--border2);border-radius:8px;background:var(--surface);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .15s}
.add-grp-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}

/* ── YTD STRIP ── */
.ytd-strip{padding:8px 14px;background:var(--navy);color:rgba(255,255,255,.85);font-size:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ytd-strip strong{color:#fff}

/* ── ADMIN PAGE ── */
.admin-wrap{padding:16px;max-width:600px}
.admin-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.admin-section-hdr{padding:13px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.admin-section-hdr .ico{font-size:18px}
.admin-section-body{padding:14px 16px}
.admin-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.admin-row:last-child{border-bottom:none}
.admin-row-label{flex:1;font-size:13px}
.admin-row-label.editing input{border:1px solid var(--blue);border-radius:6px;padding:3px 6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
.admin-btn-sm{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);color:var(--text)}
.admin-btn-sm:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.admin-btn-sm.danger:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
select.admin-select{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none}
.admin-input{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;width:100%}
.admin-input:focus{border-color:var(--blue)}
.admin-textarea{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;width:100%;resize:vertical;min-height:80px}
.admin-textarea:focus{border-color:var(--blue)}
.admin-search{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;width:100%;margin-bottom:10px}
.admin-search:focus{border-color:var(--blue)}
.admin-empty{color:var(--muted);font-size:13px;font-style:italic;padding:4px 0}
.admin-flex{display:flex;gap:8px;align-items:center;margin-top:10px}
.admin-add-row{display:flex;gap:8px;margin-bottom:12px}


/* ── WEEK NAV BAR (mobile only) ── */
.wknavbar{display:none;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--blue-hdr);border-bottom:1px solid var(--border);gap:8px}
@media(max-width:599px){.wknavbar{display:flex}}
.wknavbar-lbl{flex:1;text-align:center;font-size:13px;font-weight:700;line-height:1.3}
.wknavbar-lbl span{display:block;font-size:11px;font-weight:400;color:var(--muted)}

/* ── CREDIT CARDS PAGE ── */
.cards-wrap{padding:0 0 24px}
.cards-grid{display:grid;grid-template-columns:minmax(120px,2fr) minmax(100px,1fr) minmax(100px,1fr) minmax(100px,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border)}
.cards-grid .gc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);min-width:0}
.cards-grid .gc.hdr{background:var(--bg)}
.cards-grid .gc.amt-hdr{background:var(--mo-hdr)}
.cards-grid .gc.amt-cell{background:var(--mo-bg)}
.cards-grid .gc.tot{background:var(--bg)}
.cards-grid .gc.tot.amt-cell{background:var(--mo-hdr)}
.cards-grid .gc.strong-top{border-top:2px solid var(--border2)}
.card-in{display:block;width:100%;height:46px;border:none;background:transparent;padding:0 8px;font-size:13px;color:var(--text);outline:none;font-family:var(--font)}
.card-in.right{text-align:right}
.card-in::placeholder{color:#C0BDB8;font-style:italic}
.add-card-bar{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--bg)}



/* ── ANNUAL SUMMARY PAGE ── */
.annual-wrap{padding:0 0 32px;max-width:700px}
.annual-bud-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.annual-bud-bar label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.annual-bud-input-wrap{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 10px}
.annual-bud-input-wrap span{font-size:14px;font-weight:700;color:var(--blue)}
.annual-bud-input-wrap input{border:none;background:transparent;font-size:14px;font-weight:700;color:var(--blue);outline:none;width:90px;font-family:var(--font)}
.annual-summary-bar{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border)}
.annual-summary-item{flex:1;padding:12px 14px}
.annual-summary-item .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;margin-bottom:3px}
.annual-summary-item .val{font-size:20px;font-weight:700}
.annual-summary-item .val.pos{color:var(--green)}
.annual-summary-item .val.neg{color:var(--red)}
.annual-prog-wrap{padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);padding-bottom:12px}
.annual-prog{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.annual-prog-fill{height:6px;border-radius:3px;transition:width .3s;background:var(--blue)}
.annual-prog-fill.over{background:var(--red)}
.annual-table{margin:14px 14px 0;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.annual-row{display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.annual-row:last-child{border-bottom:none}
.annual-row.hdr{cursor:default;background:var(--grp-hdr)}
.annual-row.hdr:hover{background:var(--grp-hdr)}
.annual-row.total{background:var(--navy);cursor:default}
.annual-row.future{opacity:.45}
.annual-row:not(.hdr):not(.total):hover{background:var(--blue-lt)}
.annual-cell{padding:11px 12px;font-size:13px}
.annual-cell.bold{font-weight:700}
.annual-cell.right{text-align:right}
.annual-cell.muted{color:var(--muted)}
.annual-cell.pos{color:var(--green);font-weight:700}
.annual-cell.neg{color:var(--red);font-weight:700}
.annual-cell.wht{color:#fff;font-weight:700}
.annual-cell.wht-dim{color:rgba(255,255,255,.65)}
.annual-no-data{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}

/* ── SUMMARY PAGE ── */
.summ-wrap{padding:0 0 24px;max-width:900px}
.summ-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px;margin:14px 14px 0}
.summ-tog-btn{flex:1;padding:8px 0;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--muted);background:transparent;transition:all .15s}
.summ-tog-btn.active{background:var(--surface);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.summ-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px}
.summ-nav-lbl{flex:1;text-align:center;font-size:15px;font-weight:700}
.summ-nav-sub{font-size:11px;font-weight:400;color:var(--muted);display:block}
.today-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--navy);white-space:nowrap}
.today-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.summ-bar{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.summ-bar-item{flex:1;padding:12px 14px;min-width:80px}
.summ-bar-item .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;margin-bottom:3px}
.summ-bar-item .val{font-size:18px;font-weight:700}
.summ-bar-item .val.pos{color:var(--green)}
.summ-bar-item .val.neg{color:var(--red)}
.summ-prog{height:4px;background:var(--border);margin:0 14px 0}
.summ-prog-fill{height:4px;background:var(--blue);transition:width .3s}
.summ-prog-fill.over{background:var(--red)}
.summ-section{margin:14px 14px 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.summ-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;-webkit-user-select:none;user-select:none;background:var(--grp-hdr)}
.summ-section-hdr:hover{background:var(--mo-hdr)}
.summ-section-title{font-size:14px;font-weight:700;color:var(--navy)}
.summ-section-badge{font-size:13px;font-weight:700;color:var(--navy)}
.summ-section-chevron{font-size:12px;color:var(--muted);transition:transform .2s}
.summ-section-chevron.open{transform:rotate(180deg)}
.summ-section-body{border-top:1px solid var(--border)}
.summ-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.summ-row:last-child{border-bottom:none}
.summ-row:hover{background:var(--bg)}
.summ-row-name{font-size:13px;color:var(--text);flex:1}
.summ-row-amt{font-size:13px;font-weight:600;color:var(--text);margin-left:12px;white-space:nowrap}
.summ-row-expand{font-size:10px;color:var(--muted);margin-left:8px}
.summ-row-detail{background:var(--bg);border-bottom:1px solid var(--border)}
.summ-row-detail-inner{padding:6px 14px 6px 28px}

// ═══════════════════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════════════════
function dateKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function mkey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function mLabel(mk){ const [y,m]=mk.split('-').map(Number); return new Date(y,m-1,1).toLocaleString('default',{month:'long',year:'numeric'}); }
function mShort(mk){ const [y,m]=mk.split('-').map(Number); return new Date(y,m-1,1).toLocaleString('default',{month:'short'}); }
function dayLabel(d){ return d.toLocaleString('default',{weekday:'short',day:'numeric',month:'short'}); }

// Returns array of Sunday date-key strings for the given month
function getSundaysForMk(mk){
  const [yr,mo]=mk.split('-').map(Number);
  const d=new Date(yr,mo-1,1);
  while(d.getDay()!==0) d.setDate(d.getDate()+1); // advance to first Sunday
  const result=[];
  while(d.getMonth()===mo-1){
    result.push(dateKey(new Date(d)));
    d.setDate(d.getDate()+7);
  }
  return result;
}

function offsetMk(mk,months){
  const [y,m]=mk.split('-').map(Number);
  const d=new Date(y,m-1+months,1);
  return mkey(d);
}

function todayWkIdx(mk){
  const today=dateKey(new Date());
  const suns=getSundaysForMk(mk);
  let idx=0;
  suns.forEach((s,i)=>{ if(s<=today) idx=i; });
  return idx;
}

// ═══════════════════════════════════════════════════════════
// FORMAT HELPERS
// ═══════════════════════════════════════════════════════════
function n(v){ return parseFloat(v)||0; }
function cur(){ return db.currency||'£'; }
function fmt(v){ return v>0 ? cur()+v.toFixed(2) : v<0 ? '-'+cur()+Math.abs(v).toFixed(2) : '—'; }
function fmtPos(v){ return cur()+v.toFixed(2); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Returns HTML span for remaining (green/red/dash)
function remSpan(rem,hasBudget,spent){
  if(!hasBudget&&!(spent>0)) return '<span class="tp num dim">—</span>';
  const cls=rem>=0?'pos':'neg';
  const sign=rem<0?'-':'';
  return `<span class="tp num ${cls}">${sign}${cur()}${Math.abs(rem).toFixed(2)}</span>`;
}

// ═══════════════════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════════════════
function calcMonthBudget(sundayKeys){
  return sundayKeys.reduce((s,k)=>s+n(db.weekBudgets[k]),0);
}
function rowMonthTotal(row,sundayKeys){
  return sundayKeys.reduce((s,k)=>s+n((row.weeks||{})[k]),0);
}
function weekColTotal(key){
  return db.rows.reduce((s,r)=>s+n((r.weeks||{})[key]),0);
}
function groupWeekTotal(grp,key){
  return db.rows.filter(r=>(r.group||'')===(grp||'')).reduce((s,r)=>s+n((r.weeks||{})[key]),0);
}
function groupMonthTotal(grp,sundayKeys){
  return sundayKeys.reduce((s,k)=>s+groupWeekTotal(grp,k),0);
}
function grandMonthTotal(sundayKeys){
  return sundayKeys.reduce((s,k)=>s+weekColTotal(k),0);
}
function yearTotal(yr){
  // yr is a financial year key
  const suns=sundaysForFY(yr);
  return suns.reduce((s,k)=>s+weekColTotal(k),0);
}


// ── FINANCIAL YEAR HELPERS ──
// Returns the financial year key (string) for a given date or month-key
// FY key = the calendar year in which the financial year STARTS
// e.g. if yearStartMonth=5 (May), date 2026-03 is in FY2025 (May25-Apr26)
function fyForMk(mk){
  const ysm=(db.yearStartMonth||1);
  if(ysm===1) return mk.split('-')[0];
  const [y,m]=mk.split('-').map(Number);
  return m>=ysm?String(y):String(y-1);
}
function fyForDate(d){
  return fyForMk(mkey(d));
}
// Returns start/end mk for a financial year key
function fyRange(fyKey){
  const ysm=(db.yearStartMonth||1);
  const y=parseInt(fyKey);
  const startMk=String(y)+'-'+String(ysm).padStart(2,'0');
  // end = month before ysm in y+1
  const endM=ysm===1?12:ysm-1;
  const endY=ysm===1?y:y+1;
  const endMk=String(endY)+'-'+String(endM).padStart(2,'0');
  return {startMk,endMk};
}
// All sundays in a financial year
function sundaysForFY(fyKey){
  const {startMk,endMk}=fyRange(fyKey);
  const result=[];
  let mk=startMk;
  while(mk<=endMk){
    getSundaysForMk(mk).forEach(s=>result.push(s));
    mk=offsetMk(mk,1);
  }
  return result;
}
// Label for a financial year
function fyLabel(fyKey){
  const ysm=(db.yearStartMonth||1);
  if(ysm===1) return fyKey;
  const y=parseInt(fyKey);
  return fyKey+'/'+(String(y+1).slice(2));
}
// Total spending in a financial year
function fyTotal(fyKey){
  const suns=sundaysForFY(fyKey);
  return suns.reduce((s,k)=>s+weekColTotal(k),0);
}

// ═══════════════════════════════════════════════════════════
// DATA — LOAD / SAVE / MIGRATE
// ═══════════════════════════════════════════════════════════
function freshDb(){
  const d={version:5,currency:'£',yearStartMonth:1,annualBudgets:{},descs:[],groups:['Abel and Cole','Riverford','Wylde','Ocado'],rows:[],weekBudgets:{},cardGroups:[],cards:[],cardData:{}};
  ensureGroupBlanks(d);
  return d;
}

function migrateV2(v2){
  const db=freshDb();
  db.descs=[...(v2.descs||[])];
  if(v2.months){
    Object.entries(v2.months).forEach(([mk,md])=>{
      const suns=getSundaysForMk(mk);
      // migrate weekBudgets
      (md.weekBudgets||[]).forEach((b,i)=>{ if(b&&suns[i]) db.weekBudgets[suns[i]]=b; });
      // migrate rows
      (md.rows||[]).forEach(row=>{
        if(!row.desc) return;
        let gr=db.rows.find(r=>r.desc===row.desc&&r.group==='');
        if(!gr){ gr={desc:row.desc,group:'',weeks:{}}; db.rows.push(gr); }
        (row.amounts||[]).forEach((a,i)=>{ if(a&&suns[i]) gr.weeks[suns[i]]=a; });
      });
    });
  }
  ensureGroupBlanks(db);
  return db;
}

function save(){
  try{ localStorage.setItem(STORE,JSON.stringify(db)); }catch(e){}
}

function isBlankRow(row){
  return !row.desc && Object.values(row.weeks||{}).every(v=>!v||n(v)===0);
}

function ensureGroupBlanks(d){
  const dbd=d||db;
  const groups=[...dbd.groups,''];
  groups.forEach(g=>{
    const gRows=dbd.rows.filter(r=>(r.group||'')===g);
    // remove duplicate trailing blanks
    while(gRows.length>1&&isBlankRow(gRows[gRows.length-1])&&isBlankRow(gRows[gRows.length-2])){
      const idx=dbd.rows.indexOf(gRows[gRows.length-1]);
      if(idx>-1) dbd.rows.splice(idx,1);
      gRows.pop();
    }
    // ensure one blank at end
    if(gRows.length===0||!isBlankRow(gRows[gRows.length-1])){
      // Insert after last row of this group
      const lastIdx=gRows.length>0?dbd.rows.lastIndexOf(gRows[gRows.length-1]):-1;
      const newRow={desc:'',group:g,weeks:{}};
      if(lastIdx>=0) dbd.rows.splice(lastIdx+1,0,newRow);
      else dbd.rows.push(newRow);
    }
  });
}

function addDesc(v){
  if(v&&!db.descs.includes(v)){ db.descs.push(v); db.descs.sort((a,b)=>a.localeCompare(b)); }
}

// ═══════════════════════════════════════════════════════════
// MODAL

function showModal(title,body,buttons){
  const box=document.getElementById('modal-box');
  const ov=document.getElementById('modal-overlay');
  let btns=buttons.map(b=>`<button class="modal-btn ${b.cls||''}" data-modal-cb="${b.cb}">${esc(b.label)}</button>`).join('');
  box.innerHTML=`<div class="modal-title">${esc(title)}</div><div class="modal-body">${body}</div><div class="modal-btns">${btns}</div>`;
  box.style.display='block'; ov.style.display='block';
}
function showInputModal(title,placeholder,cb){
  const box=document.getElementById('modal-box');
  const ov=document.getElementById('modal-overlay');
  box.innerHTML=`<div class="modal-title">${esc(title)}</div>
    <input class="modal-input" id="modal-inp" placeholder="${esc(placeholder)}" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="modal-btns">
      <button class="modal-btn" data-modal-cb="cancel">Cancel</button>
      <button class="modal-btn primary" data-modal-cb="ok">Add</button>
    </div>`;
  box.style.display='block'; ov.style.display='block';
  const inp=document.getElementById('modal-inp');
  inp.focus();
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const v=inp.value.trim(); hideModal(); if(v) cb(v); } });
  // store cb for ok button
  box._inputCb=cb;
}
function hideModal(){
  document.getElementById('modal-box').style.display='none';
  document.getElementById('modal-overlay').style.display='none';
}
document.getElementById('modal-overlay').addEventListener('click',hideModal);
document.getElementById('modal-box').addEventListener('click',e=>{
  const cb=e.target.dataset.modalCb;
  if(!cb) return;
  if(cb==='cancel'){hideModal();return;}
  if(cb==='ok'){
    const inp=document.getElementById('modal-inp');
    if(inp){ const v=inp.value.trim(); hideModal(); if(v&&document.getElementById('modal-box')._inputCb) document.getElementById('modal-box')._inputCb(v); return; }
    hideModal(); return;
  }
  // numeric cb = button index for confirm modals
  hideModal();
  if(document.getElementById('modal-box')._cbs){
    const fn=document.getElementById('modal-box')._cbs[cb];
    if(fn) fn();
  }
});

function confirmModal(title,body,onConfirm,confirmLabel='Confirm',confirmCls='primary'){
  const box=document.getElementById('modal-box');
  const ov=document.getElementById('modal-overlay');
  box.innerHTML=`<div class="modal-title">${esc(title)}</div><div class="modal-body">${body}</div>
    <div class="modal-btns">
      <button class="modal-btn" data-modal-cb="cancel">Cancel</button>
      <button class="modal-btn ${confirmCls}" data-modal-cb="confirm">${esc(confirmLabel)}</button>
    </div>`;
  box._cbs={confirm:onConfirm};
  box.style.display='block'; ov.style.display='block';
}

function navigate(page){
  currentPage=page;
  // update nav highlights
  document.querySelectorAll('.sb-item,.bn-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===page);
  });
  document.getElementById('tb-pagename').textContent=PAGE_NAMES[page]||'';
  renderPage();
}

function renderPage(){
  const main=document.getElementById('main');
  // update datalist
  const dl=document.getElementById('desc-dl');
  dl.innerHTML=db.descs.map(d=>`<option value="${esc(d)}">`).join('');
  switch(currentPage){
    case 'home':   renderHome(main); break;
    case 'shop':   renderShop(main); break;
    case 'admin':  renderAdmin(main); break;
    case 'annual': renderAnnual(main); break;
    case 'summary':renderSummary(main); break;
    case 'cards':  renderCards(main); break;
  }
}

// ═══════════════════════════════════════════════════════════
// HOME PAGE
// ═══════════════════════════════════════════════════════════
function renderHome(main){
  const hasAny=db.rows.some(r=>r.desc)||Object.keys(db.weekBudgets).length>0;
  if(!hasAny){
    main.innerHTML=`<div class="home-first">
      <div style="font-size:64px;margin-bottom:12px">🛒</div>
      <h2>Welcome to Money Bot</h2>
      <p>Track your weekly and monthly shopping spend across all your stores.</p>
      <button class="btn-primary" id="home-setup">Set up my budget →</button>
    </div>`;
    document.getElementById('home-setup').onclick=()=>navigate('shop');
    return;
  }
  const now=new Date();
  const hr=now.getHours();
  const greeting=hr<12?'Good morning':hr<18?'Good afternoon':'Good evening';
  const todayStr=now.toLocaleDateString('default',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const mk=mkey(now);
  const suns=getSundaysForMk(mk);
  const wkIdx=todayWkIdx(mk);
  const wkKey=suns[wkIdx]||suns[0];
  const wkBud=n(db.weekBudgets[wkKey]);
  const wkSpent=weekColTotal(wkKey);
  const wkLeft=wkBud-wkSpent;
  const moBud=calcMonthBudget(suns);
  const moSpent=grandMonthTotal(suns);
  const moLeft=moBud-moSpent;
  const yr=fyForDate(now);
  const annBud=n(db.annualBudgets[yr]);
  const annSpent=yearTotal(yr);
  const annLeft=annBud-annSpent;

  const wkD=new Date(wkKey);
  const wkLabel=`Week ${wkIdx+1} · ${dayLabel(wkD)}`;

  function card(label,title,spent,left,bud,page){
    const pct=bud>0?Math.min(100,(spent/bud)*100):0;
    const over=spent>bud&&bud>0;
    const remHtml=bud>0?`<div class="hc-num"><div class="lbl">Remaining</div><div class="val ${left>=0?'pos':'neg'}">${cur()}${Math.abs(left).toFixed(2)}</div></div>`:'';
    return `<div class="home-card" data-nav="${page}">
      <div class="hc-label">${label}</div>
      <div class="hc-title">${title}</div>
      <div class="hc-nums">
        ${bud>0?`<div class="hc-num"><div class="lbl">Budget</div><div class="val">${cur()}${bud.toFixed(2)}</div></div>`:''}
        <div class="hc-num"><div class="lbl">Spent</div><div class="val">${cur()}${spent.toFixed(2)}</div></div>
        ${remHtml}
      </div>
      ${bud>0?`<div class="progress-bar"><div class="progress-fill${over?' over':''}" style="width:${pct}%"></div></div>`:''}
    </div>`;
  }

  main.innerHTML=`<div class="home-wrap">
    <div class="home-greeting"><h2>${greeting}</h2><div class="date">${todayStr}</div></div>
    ${card('This Week',wkLabel,wkSpent,wkLeft,wkBud,'shop')}
    ${card('This Month',mLabel(mk),moSpent,moLeft,moBud,'shop')}
    ${annBud>0?card('This Year',fyLabel(yr),annSpent,annLeft,annBud,'annual'):''}
    <div class="home-links">
      <button class="home-link-btn" data-nav="shop">🛒 Enter this week's shopping</button>
<button class="home-link-btn" data-nav="summary">📋 View summary</button>
      <button class="home-link-btn" data-nav="admin">⚙️ Admin</button>
    </div>
    <div class="home-footer">Money Bot ${APP_VER}</div>
  </div>`;
  main.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>navigate(el.dataset.nav)));
}

// ═══════════════════════════════════════════════════════════
// WEEKLY SHOP
// ═══════════════════════════════════════════════════════════
function renderShop(main){
  const suns=getSundaysForMk(currentMk);
  const todayMkNow=mkey(new Date());
  const isCurrent=currentMk===todayMkNow;
  const isFuture=currentMk>todayMkNow;
  const minMk=offsetMk(todayMkNow,-13);
  const maxMk=offsetMk(todayMkNow,12);
  const todaySunIdx=isCurrent?todayWkIdx(currentMk):0;

  // clamp viewWk
  if(viewWk>=suns.length) viewWk=suns.length-1;

  const moBud=calcMonthBudget(suns);
  const moSpent=grandMonthTotal(suns);
  const moRem=moBud-moSpent;

  // month nav bar
  let badgeHtml='';
  if(isCurrent) badgeHtml='<span class="mnav-badge today">Today</span>';
  else if(isFuture) badgeHtml='<span class="mnav-badge future">Future</span>';

  let html=`<div class="mnavbar">
    <button class="mnav-btn" id="mn-prev" ${currentMk<=minMk?'disabled':''}>‹</button>
    <div class="mnav-center"><span class="mnav-month">${mLabel(currentMk)}</span>${badgeHtml}</div>
    <button class="mnav-btn" id="mn-next" ${currentMk>=maxMk?'disabled':''}>›</button>
  </div>
  <div class="shop-wrap"><div class="shop-grid" id="sgrid">`;

  // build grid columns style
  if(mobile){
    // narrow: desc | 1 week | month
    html=html.replace('id="sgrid">',`id="sgrid" style="grid-template-columns:minmax(90px,2fr) minmax(76px,1fr) minmax(68px,1fr)">`);
  } else {
    const wkCols=suns.length;
    const wkFr=`repeat(${wkCols},minmax(65px,1fr))`;
    html=html.replace('id="sgrid">',`id="sgrid" style="grid-template-columns:minmax(110px,2fr) ${wkFr} minmax(75px,1fr)">`);
  }

  // ── HEADER ROW ──
  // Description header
  html+=`<div class="gc hdr"><div class="hdr-inner"><div class="hdr-lbl">Item</div><div style="font-size:10px;color:#bbb;font-style:italic">tap to choose or type</div></div></div>`;

  if(mobile){
    // week nav bar — rendered ABOVE the grid, not inside it
    const wkD=new Date(suns[viewWk]);
    // inject wknavbar AFTER mnavbar and BEFORE shop-wrap
    html=html.replace('<div class="shop-wrap">',`<div class="wknavbar"><button class="wk-nav-btn" id="wn-prev" ${viewWk===0?'disabled':''}>‹</button><div class="wknavbar-lbl">Week ${viewWk+1} · ${dayLabel(wkD)}</div><button class="wk-nav-btn" id="wn-next" ${viewWk>=suns.length-1?'disabled':''}>›</button></div><div class="shop-wrap">`);
    // simple header cell — just budget input, no nav arrows
    html+=`<div class="gc hdr wk-hi"><div class="hdr-inner">
      <div class="hdr-lbl">Budget</div>
      <input class="bud-in" type="number" min="0" step="0.01" placeholder="0" value="${esc(db.weekBudgets[suns[viewWk]]||'')}" data-a="wb" data-key="${suns[viewWk]}">
    </div></div>`;
  } else {
    suns.forEach((sk,wi)=>{
      const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
      const d=new Date(sk);
      html+=`<div class="gc hdr${hi}"><div class="hdr-inner">
        <div class="hdr-lbl">Week ${wi+1}</div>
        <div class="hdr-date">${dayLabel(d)}</div>
        <div class="hdr-lbl">Budget</div>
        <input class="bud-in" type="number" min="0" step="0.01" placeholder="0" value="${esc(db.weekBudgets[sk]||'')}" data-a="wb" data-key="${sk}">
        <button class="reset-btn" data-a="reset" data-key="${sk}" data-wi="${wi}">↺ reset</button>
      </div></div>`;
    });
  }

  // Month header
  html+=`<div class="gc hdr mo"><div class="hdr-inner">
    <div class="hdr-lbl" style="font-weight:700;color:var(--navy)">${mShort(currentMk).toUpperCase()}</div>
    <div class="hdr-lbl" style="margin-top:2px">Budget (auto)</div>
    <div class="bud-auto">${moBud>0?cur()+moBud.toFixed(2):'—'}</div>
  </div></div>`;

  // ── DATA ROWS (grouped) ──
  const allGroups=[...db.groups,''];
  allGroups.forEach(g=>{
    const gRows=db.rows.filter(r=>(r.group||'')===g);
    if(gRows.length===0) return;
    // Only show group header if it has a name
    if(g){
      // group header spans full width
      html+=`<div class="gc grp grp-span" style="grid-column:1/-1">
        <div class="grp-cell"><span class="grp-name">${esc(g)}</span>
        <button class="grp-del" data-a="del-grp" data-grp="${esc(g)}" title="Remove group (rows stay)">×</button></div>
      </div>`;
    }
    // item rows
    gRows.forEach((row,localIdx)=>{
      const ri=db.rows.indexOf(row);
      const isBlank=isBlankRow(row);
      const moTotal=rowMonthTotal(row,suns);
      // desc cell
      html+=`<div class="gc"><input class="desc-in" type="text" list="desc-dl"
        value="${esc(row.desc)}" placeholder="${isBlank?'add item…':''}"
        data-a="desc" data-ri="${ri}" autocomplete="off" autocorrect="off" spellcheck="false"></div>`;
      // amount cells
      if(mobile){
        const sk=suns[viewWk];
        const hi=viewWk===todaySunIdx&&isCurrent?' wk-hi':'';
        html+=`<div class="gc${hi}"><input class="amt-in" type="number" min="0" step="0.01"
          value="${esc((row.weeks||{})[sk]||'')}" data-a="amt" data-ri="${ri}" data-key="${sk}"></div>`;
      } else {
        suns.forEach((sk,wi)=>{
          const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
          html+=`<div class="gc${hi}"><input class="amt-in" type="number" min="0" step="0.01"
            value="${esc((row.weeks||{})[sk]||'')}" data-a="amt" data-ri="${ri}" data-key="${sk}"></div>`;
        });
      }
      // month total cell
      html+=`<div class="gc mo"><div class="mo-val${moTotal>0?' has':''}">${moTotal>0?cur()+moTotal.toFixed(2):''}</div></div>`;
    });

    // sub-total row (only if named group or if there are named groups)
    if(g||db.groups.length>0){
      const label=g?`${g} subtotal`:'Other';
      html+=`<div class="gc sub"><div class="tp lbl">${esc(label)}</div></div>`;
      if(mobile){
        const sk=suns[viewWk];
        const gt=groupWeekTotal(g,sk);
        html+=`<div class="gc sub wk-hi"><div class="tp num">${gt>0?fmtPos(gt):'—'}</div></div>`;
      } else {
        suns.forEach((sk,wi)=>{
          const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
          const gt=groupWeekTotal(g,sk);
          html+=`<div class="gc sub${hi}"><div class="tp num">${gt>0?fmtPos(gt):'—'}</div></div>`;
        });
      }
      const gmo=groupMonthTotal(g,suns);
      html+=`<div class="gc sub mo"><div class="tp num">${gmo>0?fmtPos(gmo):'—'}</div></div>`;
    }
  });

  // ── SPENT ROW ──
  html+=`<div class="gc tot strong-top"><div class="tp lbl">Spent</div></div>`;
  if(mobile){
    const sk=suns[viewWk]; const wt=weekColTotal(sk);
    html+=`<div class="gc tot wk-hi strong-top"><div class="tp num">${wt>0?fmtPos(wt):'—'}</div></div>`;
  } else {
    suns.forEach((sk,wi)=>{
      const hi=wi===todaySunIdx&&isCurrent?' wk-hi':''; const wt=weekColTotal(sk);
      html+=`<div class="gc tot${hi} strong-top"><div class="tp num">${wt>0?fmtPos(wt):'—'}</div></div>`;
    });
  }
  html+=`<div class="gc tot mo strong-top"><div class="tp num">${moSpent>0?fmtPos(moSpent):'—'}</div></div>`;

  // ── LEFT ROW ──
  html+=`<div class="gc tot"><div class="tp lbl">Left</div></div>`;
  if(mobile){
    const sk=suns[viewWk]; const wb=n(db.weekBudgets[sk]); const ws=weekColTotal(sk);
    html+=`<div class="gc tot wk-hi">${remSpan(wb-ws,wb>0,ws)}</div>`;
  } else {
    suns.forEach((sk,wi)=>{
      const hi=wi===todaySunIdx&&isCurrent?' wk-hi':'';
      const wb=n(db.weekBudgets[sk]); const ws=weekColTotal(sk);
      html+=`<div class="gc tot${hi}">${remSpan(wb-ws,wb>0,ws)}</div>`;
    });
  }
  html+=`<div class="gc tot mo">${remSpan(moRem,moBud>0,moSpent)}</div>`;

  html+=`</div></div>`; // close grid + shop-wrap

  // Add-group button
  html+=`<div class="add-grp-bar">
    <button class="add-grp-btn" id="add-grp-btn">＋ Add store / group</button>
  </div>`;

  // YTD strip
  const yr=fyForMk(currentMk);
  const annBud=n(db.annualBudgets[yr]);
  if(annBud>0){
    const annSp=yearTotal(yr);
    const annL=annBud-annSp;
    html+=`<div class="ytd-strip">
      <span>Year so far:</span>
      <strong>${cur()}${annSp.toFixed(2)}</strong>
      <span>of</span>
      <strong>${cur()}${annBud.toFixed(2)}</strong>
      <span>—</span>
      <strong style="color:${annL>=0?'#6EE7B7':'#FCA5A5'}">${cur()}${Math.abs(annL).toFixed(2)} ${annL>=0?'left':'over'}</strong>
    </div>`;
  }

  main.innerHTML=html;

  // Attach nav events
  const mnPrev=document.getElementById('mn-prev');
  const mnNext=document.getElementById('mn-next');
  if(mnPrev) mnPrev.onclick=()=>{ currentMk=offsetMk(currentMk,-1); viewWk=0; renderPage(); };
  if(mnNext) mnNext.onclick=()=>{ currentMk=offsetMk(currentMk,1); viewWk=0; renderPage(); };
  const wnPrev=document.getElementById('wn-prev');
  const wnNext=document.getElementById('wn-next');
  if(wnPrev) wnPrev.onclick=()=>{ if(viewWk>0){viewWk--;renderPage();} };
  if(wnNext) wnNext.onclick=()=>{ if(viewWk<suns.length-1){viewWk++;renderPage();} };

  const addGrpBtn=document.getElementById('add-grp-btn');
  if(addGrpBtn) addGrpBtn.onclick=()=>{
    showInputModal('Add store / group','Store name (e.g. Riverford)',name=>{
      if(!db.groups.includes(name)){
        db.groups.push(name);
        ensureGroupBlanks();
        save();
      }
      renderPage();
    });
  };

  // Attach grid events
  const grid=document.getElementById('sgrid');
  if(grid){
    grid.addEventListener('change',onShopChange);
    grid.addEventListener('click',onShopClick);
  }
}

function onShopChange(e){
  const el=e.target; const a=el.dataset.a;
  if(a==='wb'){
    db.weekBudgets[el.dataset.key]=el.value;
    save(); renderPage();
  } else if(a==='desc'){
    const ri=parseInt(el.dataset.ri);
    const v=el.value.trim();
    db.rows[ri].desc=v;
    addDesc(v);
    ensureGroupBlanks();
    save(); renderPage();
  } else if(a==='amt'){
    const ri=parseInt(el.dataset.ri);
    const key=el.dataset.key;
    if(!db.rows[ri].weeks) db.rows[ri].weeks={};
    db.rows[ri].weeks[key]=el.value;
    ensureGroupBlanks();
    save(); renderPage();
  }
}

function onShopClick(e){
  const el=e.target; const a=el.dataset.a;
  if(a==='reset'){
    const sk=el.dataset.key; const wi=el.dataset.wi;
    const d=new Date(sk); const lbl=dayLabel(d);
    confirmModal(`Reset Week ${parseInt(wi)+1}`,`Clear all amounts for ${lbl}? The week budget will not be affected. This cannot be undone.`,()=>{
      db.rows.forEach(r=>{ if(r.weeks) delete r.weeks[sk]; });
      save(); renderPage();
    },'Clear','danger');
  } else if(a==='del-grp'){
    const grp=el.dataset.grp;
    confirmModal(`Remove group "${grp}"?`,'Item rows will become ungrouped. No data will be deleted.',()=>{
      const idx=db.groups.indexOf(grp);
      if(idx>-1) db.groups.splice(idx,1);
      db.rows.forEach(r=>{ if(r.group===grp) r.group=''; });
      save(); renderPage();
    },'Remove');
  }
}




// ═══════════════════════════════════════════════════════════
// ANNUAL SUMMARY PAGE
// ═══════════════════════════════════════════════════════════
function renderAnnual(main){
  const todayNow=new Date();
  const todayMkNow=mkey(todayNow);

  // initialise FY to current
  if(!annualFy) annualFy=fyForDate(todayNow);

  const ysm=db.yearStartMonth||1;
  const minFy=fyForMk(offsetMk(todayMkNow,-13));
  const maxFy=String(parseInt(fyForDate(todayNow))+2);
  const canPrev=annualFy>minFy;
  const canNext=annualFy<maxFy;

  const {startMk,endMk}=fyRange(annualFy);
  const annBud=n(db.annualBudgets[annualFy]);

  // Calculate all months in this FY
  const fyMonths=[];
  let mk=startMk;
  while(mk<=endMk){ fyMonths.push(mk); mk=offsetMk(mk,1); }

  // Totals
  let totalBud=0, totalSp=0;
  const monthData=fyMonths.map(mk=>{
    const suns=getSundaysForMk(mk);
    const bud=calcMonthBudget(suns);
    const sp=grandMonthTotal(suns);
    totalBud+=bud; totalSp+=sp;
    return {mk,bud,sp};
  });

  const annRem=annBud-totalSp;
  const hasBud=annBud>0;
  const pct=hasBud?Math.min(100,(totalSp/annBud)*100):0;
  const over=totalSp>annBud&&hasBud;
  const isCurrFy=annualFy===fyForDate(todayNow);
  const isFutureFy=annualFy>fyForDate(todayNow);

  let badge='';
  if(isCurrFy) badge='<span class="mnav-badge today" style="margin-left:8px">Current</span>';
  else if(isFutureFy) badge='<span class="mnav-badge future" style="margin-left:8px">Future</span>';

  let html=`<div class="annual-wrap">`;

  // Month nav bar (reuse mnavbar style)
  html+=`<div class="mnavbar">
    <button class="mnav-btn" id="an-prev" ${!canPrev?'disabled':''}>‹</button>
    <div class="mnav-center">
      <span class="mnav-month">${fyLabel(annualFy)}</span>${badge}
    </div>
    <button class="mnav-btn" id="an-next" ${!canNext?'disabled':''}>›</button>
  </div>`;

  // Annual budget input
  html+=`<div class="annual-bud-bar">
    <label>Annual budget</label>
    <div class="annual-bud-input-wrap">
      <span>${cur()}</span>
      <input type="number" min="0" step="0.01" id="annual-bud-in"
        value="${esc(db.annualBudgets[annualFy]||'')}" placeholder="0">
    </div>
    ${hasBud?`<span style="font-size:12px;color:var(--muted)">set in Admin → Annual Budget</span>`:`<span style="font-size:12px;color:var(--muted)">set in Admin → Annual Budget</span>`}
  </div>`;

  // Summary bar
  if(hasBud||totalSp>0){
    html+=`<div class="annual-summary-bar">
      ${hasBud?`<div class="annual-summary-item"><div class="lbl">Budget</div><div class="val">${cur()}${annBud.toFixed(2)}</div></div>`:''}
      <div class="annual-summary-item"><div class="lbl">Spent</div><div class="val">${cur()}${totalSp.toFixed(2)}</div></div>
      ${hasBud?`<div class="annual-summary-item"><div class="lbl">${annRem>=0?'Remaining':'Over budget'}</div><div class="val ${annRem>=0?'pos':'neg'}">${annRem<0?'-':''}${cur()}${Math.abs(annRem).toFixed(2)}</div></div>`:''}
    </div>`;
    if(hasBud){
      html+=`<div class="annual-prog-wrap" style="padding-top:8px">
        <div class="annual-prog"><div class="annual-prog-fill${over?' over':''}" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:right">${Math.round(pct)}% of annual budget used</div>
      </div>`;
    }
  }

  // Month table
  html+=`<div class="annual-table">
    <div class="annual-row hdr">
      <div class="annual-cell bold">Month</div>
      <div class="annual-cell bold right">Budget</div>
      <div class="annual-cell bold right">Spent</div>
      <div class="annual-cell bold right">Left / Over</div>
    </div>`;

  monthData.forEach(({mk,bud,sp})=>{
    const rem=bud-sp;
    const hasMBud=bud>0;
    const isFuture=mk>todayMkNow;
    const isCurrent=mk===todayMkNow;
    const mName=new Date(parseInt(mk.split('-')[0]),parseInt(mk.split('-')[1])-1,1)
      .toLocaleString('default',{month:'long'});
    const remCls=hasMBud?(rem>=0?'pos':'neg'):sp>0?'neg':'muted';
    const remVal=hasMBud||sp>0?(rem<0?'-':'')+cur()+Math.abs(rem).toFixed(2):'—';

    html+=`<div class="annual-row${isFuture?' future':''}" data-nav-mk="${mk}">
      <div class="annual-cell bold">${mName}${isCurrent?' <span style="font-size:10px;background:var(--blue);color:#fff;padding:1px 5px;border-radius:4px;vertical-align:middle">Now</span>':''}</div>
      <div class="annual-cell right ${hasMBud?'':'muted'}">${hasMBud?cur()+bud.toFixed(2):'—'}</div>
      <div class="annual-cell right ${sp>0?'bold':'muted'}">${sp>0?cur()+sp.toFixed(2):'—'}</div>
      <div class="annual-cell right ${remCls}">${remVal}</div>
    </div>`;
  });

  // Total row
  const totalRem=totalBud-totalSp;
  html+=`<div class="annual-row total">
    <div class="annual-cell wht bold">Year total</div>
    <div class="annual-cell wht-dim right">${totalBud>0?cur()+totalBud.toFixed(2):'—'}</div>
    <div class="annual-cell wht bold right">${totalSp>0?cur()+totalSp.toFixed(2):'—'}</div>
    <div class="annual-cell ${totalBud>0||(totalSp>0&&totalBud===0)?((totalBud-totalSp)<0?'neg':'wht'):'wht-dim'} bold right">${totalBud>0||(totalSp>0&&totalBud===0)?((totalBud-totalSp)<0?'-':'')+cur()+Math.abs(totalBud-totalSp).toFixed(2):'—'}</div>
  </div>`;

  html+=`</div>`; // close annual-table

  // No data message
  if(totalSp===0&&!hasBud){
    html+=`<div class="annual-no-data">No data yet for ${fyLabel(annualFy)}.<br>Set a budget in Admin → Annual Budget, or start entering shopping in Weekly Shop.</div>`;
  }

  html+=`</div>`; // close annual-wrap
  main.innerHTML=html;

  // Nav
  document.getElementById('an-prev').onclick=()=>{ annualFy=String(parseInt(annualFy)-1); renderPage(); };
  document.getElementById('an-next').onclick=()=>{ annualFy=String(parseInt(annualFy)+1); renderPage(); };

  // Annual budget input — read-only display (set via Admin)
  const budIn=document.getElementById('annual-bud-in');
  if(budIn){
    budIn.onchange=()=>{
      if(budIn.value) db.annualBudgets[annualFy]=budIn.value;
      else delete db.annualBudgets[annualFy];
      save(); renderPage();
    };
  }

  // Tap month row → navigate to that month in Weekly Shop
  main.querySelectorAll('[data-nav-mk]').forEach(row=>{
    row.onclick=()=>{
      currentMk=row.dataset.navMk;
      navigate('shop');
    };
  });
}

// ── HELPER: all sundays in a date range ──
function allSundaysInRange(startMk, endMk){
  const result=[];
  let mk=startMk;
  while(mk<=endMk){
    getSundaysForMk(mk).forEach(s=>result.push(s));
    mk=offsetMk(mk,1);
  }
  return result;
}

// ── HELPER: get all sundays for a year ──
function sundaysForYear(yr){ return sundaysForFY(yr); }

// ── HELPER: build sorted item list for a set of sunday keys ──
function buildItemList(sundayKeys, sortBy='amount'){
  const items=[];
  db.rows.forEach(row=>{
    if(!row.desc) return;
    const total=sundayKeys.reduce((s,k)=>s+n((row.weeks||{})[k]),0);
    if(total>0) items.push({desc:row.desc, group:row.group||'', total});
  });
  if(sortBy==='amount') items.sort((a,b)=>b.total-a.total);
  else items.sort((a,b)=>a.desc.localeCompare(b.desc));
  return items;
}

// ── HELPER: build store totals ──
function buildStoreTotals(sundayKeys){
  const stores={};
  const allGroups=[...db.groups,''];
  allGroups.forEach(g=>{
    const total=sundayKeys.reduce((s,k)=>s+groupWeekTotal(g,k),0);
    if(total>0) stores[g||'Other']={total, items:[]};
  });
  db.rows.forEach(row=>{
    if(!row.desc) return;
    const total=sundayKeys.reduce((s,k)=>s+n((row.weeks||{})[k]),0);
    if(total<=0) return;
    const storeName=(row.group||'')===''?'Other':row.group;
    if(!stores[storeName]) stores[storeName]={total:0,items:[]};
    stores[storeName].items.push({desc:row.desc,total});
  });
  // sort items within each store
  Object.values(stores).forEach(s=>s.items.sort((a,b)=>b.total-a.total));
  return stores;
}

// ── RENDER SUMMARY BAR ──
function summaryBar(budget, spent){
  const rem=budget-spent;
  const hasBud=budget>0;
  const pct=hasBud?Math.min(100,(spent/budget)*100):0;
  const over=spent>budget&&hasBud;
  return `<div class="summ-bar">
    ${hasBud?`<div class="summ-bar-item"><div class="lbl">Budget</div><div class="val">${cur()}${budget.toFixed(2)}</div></div>`:''}
    <div class="summ-bar-item"><div class="lbl">Spent</div><div class="val">${cur()}${spent.toFixed(2)}</div></div>
    ${hasBud?`<div class="summ-bar-item"><div class="lbl">Remaining</div><div class="val ${rem>=0?'pos':'neg'}">${rem<0?'-':''}${cur()}${Math.abs(rem).toFixed(2)}</div></div>`:''}
  </div>
  ${hasBud?`<div class="summ-prog"><div class="summ-prog-fill${over?' over':''}" style="width:${pct}%"></div></div>`:''}`;
}

// ── RENDER STORE SECTIONS ──
function storeSections(storeTotals, sundayKeys, expandedStores, sortAlpha){
  if(Object.keys(storeTotals).length===0) return `<div class="summ-empty">No spending data for this period.</div>`;
  let html='';
  Object.entries(storeTotals).forEach(([storeName,store])=>{
    const isOpen=expandedStores.has(storeName);
    const id='store-'+storeName.replace(/\s+/g,'-');
    html+=`<div class="summ-section">
      <div class="summ-section-hdr" data-toggle="${esc(storeName)}">
        <span class="summ-section-title">${esc(storeName)}</span>
        <span class="summ-section-badge">${cur()}${store.total.toFixed(2)}</span>
        <span class="summ-section-chevron ${isOpen?'open':''}">▼</span>
      </div>`;
    if(isOpen){
      html+=`<div class="summ-section-body">`;
      const items=sortAlpha?[...store.items].sort((a,b)=>a.desc.localeCompare(b.desc)):store.items;
      items.forEach(item=>{
        const detailKey='detail-'+storeName+'-'+item.desc;
        const isExpanded=expandedStores.has(detailKey);
        // week-by-week detail for this item
        const weekDetails=sundayKeys.map(k=>{
          const v=n((db.rows.find(r=>r.desc===item.desc&&(r.group||'')===(storeName==='Other'?'':storeName))?.weeks||{})[k]);
          return v>0?{date:k,val:v}:null;
        }).filter(Boolean);
        html+=`<div class="summ-row" data-item-toggle="${esc(storeName+':'+item.desc)}">
          <span class="summ-row-name">${esc(item.desc)}</span>
          ${weekDetails.length>1?`<span class="summ-row-expand">${isExpanded?'▲':'▼'}</span>`:''}
          <span class="summ-row-amt">${cur()}${item.total.toFixed(2)}</span>
        </div>`;
        if(isExpanded&&weekDetails.length>1){
          html+=`<div class="summ-row-detail"><div class="summ-row-detail-inner">`;
          weekDetails.forEach(d=>{
            const wkD=new Date(d.date);
            html+=`<div class="summ-detail-row"><span>${dayLabel(wkD)}</span><span>${cur()}${d.val.toFixed(2)}</span></div>`;
          });
          html+=`</div></div>`;
        }
      });
      // sort toggle
      html+=`<div style="padding:8px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
        <button class="today-btn" data-sort-store="${esc(storeName)}">${sortAlpha?'Sort by amount':'Sort A–Z'}</button>
      </div>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  return html;
}

// ── MAIN RENDER ──
function renderSummary(main){
  const todayMkNow=mkey(new Date());
  const todayYr=todayMkNow.split('-')[0];

  // initialise state
  if(!summaryWkKey){
    const suns=getSundaysForMk(todayMkNow);
    summaryWkKey=suns[Math.min(todayWkIdx(todayMkNow),suns.length-1)];
  }
  if(!summaryYr) summaryYr=todayYr;

  // per-render expanded state (stored on window to survive re-renders)
  if(!window._summExpanded) window._summExpanded=new Set();
  if(!window._summSortAlpha) window._summSortAlpha=new Set();

  const expanded=window._summExpanded;
  const minMk=offsetMk(todayMkNow,-13);
  const maxMk=offsetMk(todayMkNow,12);
  const minYr=minMk.split('-')[0];
  const maxYr=maxMk.split('-')[0];

  let html='';

  // ── TOGGLE BAR ──
  html+=`<div class="summ-toggle">
    <button class="summ-tog-btn ${summaryView==='week'?'active':''}" data-sv="week">Week</button>
    <button class="summ-tog-btn ${summaryView==='month'?'active':''}" data-sv="month">Month</button>
    <button class="summ-tog-btn ${summaryView==='year'?'active':''}" data-sv="year">Year</button>
  </div>`;

  // ══════════════ WEEK VIEW ══════════════
  if(summaryView==='week'){
    // Find all sundays across all months for navigation
    const allSuns=[];
    let mk2=minMk;
    while(mk2<=maxMk){ getSundaysForMk(mk2).forEach(s=>allSuns.push(s)); mk2=offsetMk(mk2,1); }
    allSuns.sort();
    const wkIdx=allSuns.indexOf(summaryWkKey);
    const canPrev=wkIdx>0; const canNext=wkIdx<allSuns.length-1;
    const wkD=new Date(summaryWkKey);
    const wkBud=n(db.weekBudgets[summaryWkKey]);
    const wkSpent=weekColTotal(summaryWkKey);
    const wkMk=summaryWkKey.substring(0,7);
    const wkSuns=getSundaysForMk(wkMk);
    const wkNum=wkSuns.indexOf(summaryWkKey)+1;

    html+=`<div class="summ-nav">
      <button class="mnav-btn" id="sv-prev" ${!canPrev?'disabled':''}>‹</button>
      <div class="summ-nav-lbl">Week ${wkNum} · ${dayLabel(wkD)}<span class="summ-nav-sub">${mLabel(wkMk)}</span></div>
      <button class="mnav-btn" id="sv-next" ${!canNext?'disabled':''}>›</button>
    </div>
    <button class="today-btn" id="sv-today" style="margin:10px 14px 0;display:inline-block">Today</button>`;

    html+=summaryBar(wkBud, wkSpent);
    const storeTotals=buildStoreTotals([summaryWkKey]);
    html+=storeSections(storeTotals,[summaryWkKey],expanded,false);
    if(wkSpent>0){
      html+=`<div class="summ-grand"><span>Week total</span><strong>${cur()}${wkSpent.toFixed(2)}</strong></div>`;
    }
  }

  // ══════════════ MONTH VIEW ══════════════
  else if(summaryView==='month'){
    const suns=getSundaysForMk(currentMk);
    const moBud=calcMonthBudget(suns);
    const moSpent=grandMonthTotal(suns);
    const isCurrent=currentMk===todayMkNow;
    const isFuture=currentMk>todayMkNow;
    let badge='';
    if(isCurrent) badge='<span class="mnav-badge today" style="margin-left:6px">Today</span>';
    else if(isFuture) badge='<span class="mnav-badge future" style="margin-left:6px">Future</span>';

    html+=`<div class="summ-nav">
      <button class="mnav-btn" id="sv-prev" ${currentMk<=minMk?'disabled':''}>‹</button>
      <div class="summ-nav-lbl">${mLabel(currentMk)}${badge}</div>
      <button class="mnav-btn" id="sv-next" ${currentMk>=maxMk?'disabled':''}>›</button>
    </div>
    <button class="today-btn" id="sv-today" style="margin:10px 14px 0;display:inline-block">Today</button>`;

    html+=summaryBar(moBud, moSpent);

    // Weekly breakdown table
    html+=`<div class="summ-table">
      <div class="summ-table-row hdr" style="grid-template-columns:2fr 1fr 1fr 1fr">
        <div class="summ-tc bold">Week</div>
        <div class="summ-tc bold right">Budget</div>
        <div class="summ-tc bold right">Spent</div>
        <div class="summ-tc bold right">Left</div>
      </div>`;
    suns.forEach((sk,wi)=>{
      const wb=n(db.weekBudgets[sk]); const ws=weekColTotal(sk);
      const rem=wb-ws; const hasBud=wb>0;
      const d=new Date(sk);
      html+=`<div class="summ-table-row" style="grid-template-columns:2fr 1fr 1fr 1fr">
        <div class="summ-tc">Wk${wi+1} · ${dayLabel(d)}</div>
        <div class="summ-tc right">${hasBud?cur()+wb.toFixed(2):'—'}</div>
        <div class="summ-tc right">${ws>0?cur()+ws.toFixed(2):'—'}</div>
        <div class="summ-tc right ${hasBud?(rem>=0?'pos':'neg'):ws>0?'neg':''}">${hasBud||ws>0?(rem<0?'-':'')+cur()+Math.abs(rem).toFixed(2):'—'}</div>
      </div>`;
    });
    html+=`<div class="summ-table-row total" style="grid-template-columns:2fr 1fr 1fr 1fr">
      <div class="summ-tc wht bold">Month total</div>
      <div class="summ-tc wht-dim right">${moBud>0?cur()+moBud.toFixed(2):'—'}</div>
      <div class="summ-tc wht bold right">${moSpent>0?cur()+moSpent.toFixed(2):'—'}</div>
      <div class="summ-tc ${(moBud>0||moSpent>0)?(moSpent<=moBud||moBud===0)?'wht':'neg':''} bold right">${moBud>0||(moSpent>0&&moBud===0)?((moBud-moSpent)<0?'-':'')+cur()+Math.abs(moBud-moSpent).toFixed(2):'—'}</div>
    </div></div>`;

    // Store sections
    const storeTotals=buildStoreTotals(suns);
    html+=storeSections(storeTotals,suns,expanded,false);
    if(moSpent>0){
      html+=`<div class="summ-grand"><span>Month total</span><strong>${cur()}${moSpent.toFixed(2)}</strong></div>`;
    }

    // Top 5 items
    const items=buildItemList(suns);
    if(items.length>0){
      html+=`<div class="summ-insight"><h4>Top items this month</h4>`;
      items.slice(0,5).forEach((item,i)=>{
        html+=`<div class="summ-insight-row">
          <span class="rank">${i+1}</span>
          <span class="name">${esc(item.desc)} <span style="color:var(--muted);font-size:11px">${esc(item.group||'Other')}</span></span>
          <span class="amt">${cur()}${item.total.toFixed(2)}</span>
        </div>`;
      });
      html+=`</div>`;
    }

    // Trends
    const prevMk=offsetMk(currentMk,-1);
    const prevSuns=getSundaysForMk(prevMk);
    const prevSpent=grandMonthTotal(prevSuns);
    const diff=moSpent-prevSpent;
    if(prevSpent>0||moSpent>0){
      const diffStr=diff===0?'same as':(diff>0?`${cur()}${Math.abs(diff).toFixed(2)} more than`:`${cur()}${Math.abs(diff).toFixed(2)} less than`);
      html+=`<div class="summ-insight" style="background:var(--mo-bg);border-color:var(--mo-hdr)"><h4 style="color:var(--navy)">Trend</h4>
        <div class="summ-insight-row"><span class="name">vs last month (${mShort(prevMk)})</span><span class="amt" style="color:${diff>0?'var(--red)':diff<0?'var(--green)':'var(--muted)'}">${diffStr} last month</span></div>
      </div>`;
    }

    // YTD
    const yr=fyForMk(currentMk);
    const annBud=n(db.annualBudgets[yr]);
    const annSp=yearTotal(yr);
    if(annBud>0||annSp>0){
      const annRem=annBud-annSp;
      html+=`<div class="summ-ytd">
        <div><span>Year to date (${fyLabel(yr)})</span><br><strong>${cur()}${annSp.toFixed(2)} spent</strong></div>
        ${annBud>0?`<div style="text-align:right"><span>of ${cur()}${annBud.toFixed(2)}</span><br><strong style="color:${annRem>=0?'#6EE7B7':'#FCA5A5'}">${cur()}${Math.abs(annRem).toFixed(2)} ${annRem>=0?'left':'over'}</strong></div>`:''}
      </div>`;
    }
  }

  // ══════════════ YEAR VIEW ══════════════
  else if(summaryView==='year'){
    const canPrevYr=summaryYr>minYr; const canNextYr=summaryYr<maxYr;
    const allSuns=sundaysForFY(summaryYr);
    const annSpent=allSuns.reduce((s,k)=>s+weekColTotal(k),0);
    const annBud=n(db.annualBudgets[summaryYr]);

    html+=`<div class="summ-nav">
      <button class="mnav-btn" id="sv-prev" ${!canPrevYr?'disabled':''}>‹</button>
      <div class="summ-nav-lbl">${fyLabel(summaryYr)}</div>
      <button class="mnav-btn" id="sv-next" ${!canNextYr?'disabled':''}>›</button>
    </div>`;

    html+=summaryBar(annBud, annSpent);

    // Month table
    html+=`<div class="summ-table">
      <div class="summ-table-row hdr" style="grid-template-columns:2fr 1fr 1fr 1fr">
        <div class="summ-tc bold">Month</div>
        <div class="summ-tc bold right">Budget</div>
        <div class="summ-tc bold right">Spent</div>
        <div class="summ-tc bold right">Left</div>
      </div>`;
    let totalBud=0; let totalSp=0;
    const {startMk:fyStart,endMk:fyEnd}=fyRange(summaryYr);
    let mk_iter=fyStart;
    const fyMonths=[];
    while(mk_iter<=fyEnd){ fyMonths.push(mk_iter); mk_iter=offsetMk(mk_iter,1); }
    for(let mi=0;mi<fyMonths.length;mi++){
      const m=parseInt(fyMonths[mi].split('-')[1]);
      const mk=fyMonths[mi];
      const suns=getSundaysForMk(mk);
      const bud=calcMonthBudget(suns);
      const sp=grandMonthTotal(suns);
      const rem=bud-sp; const hasBud=bud>0;
      totalBud+=bud; totalSp+=sp;
      const mName=new Date(parseInt(summaryYr),m-1,1).toLocaleString('default',{month:'short'});
      const isFut=mk>mkey(new Date());
      html+=`<div class="summ-table-row" style="grid-template-columns:2fr 1fr 1fr 1fr;${isFut?'opacity:.5':''}">
        <div class="summ-tc">${mName}</div>
        <div class="summ-tc right">${hasBud?cur()+bud.toFixed(2):'—'}</div>
        <div class="summ-tc right">${sp>0?cur()+sp.toFixed(2):'—'}</div>
        <div class="summ-tc right ${hasBud?(rem>=0?'pos':'neg'):sp>0?'neg':''}">${hasBud||sp>0?(rem<0?'-':'')+cur()+Math.abs(rem).toFixed(2):'—'}</div>
      </div>`;
    }
    html+=`<div class="summ-table-row total" style="grid-template-columns:2fr 1fr 1fr 1fr">
      <div class="summ-tc wht bold">Year total</div>
      <div class="summ-tc wht-dim right">${totalBud>0?cur()+totalBud.toFixed(2):'—'}</div>
      <div class="summ-tc wht bold right">${totalSp>0?cur()+totalSp.toFixed(2):'—'}</div>
      <div class="summ-tc wht bold right">${totalBud>0||(totalSp>0&&totalBud===0)?((totalBud-totalSp)<0?'-':'')+cur()+Math.abs(totalBud-totalSp).toFixed(2):'—'}</div>
    </div></div>`;

    // Store sections for year
    const storeTotals=buildStoreTotals(allSuns);
    html+=storeSections(storeTotals,allSuns,expanded,false);
    if(annSpent>0) html+=`<div class="summ-grand"><span>Year total</span><strong>${cur()}${annSpent.toFixed(2)}</strong></div>`;

    // Top 5 for year
    const items=buildItemList(allSuns);
    if(items.length>0){
      html+=`<div class="summ-insight"><h4>Top items this year</h4>`;
      items.slice(0,5).forEach((item,i)=>{
        html+=`<div class="summ-insight-row">
          <span class="rank">${i+1}</span>
          <span class="name">${esc(item.desc)} <span style="color:var(--muted);font-size:11px">${esc(item.group||'Other')}</span></span>
          <span class="amt">${cur()}${item.total.toFixed(2)}</span>
        </div>`;
      });
      html+=`</div>`;
    }

    // Year-on-year
    const prevYr=String(parseInt(summaryYr)-1);
    const prevYrSuns=sundaysForYear(prevYr);
    const prevYrSp=prevYrSuns.reduce((s,k)=>s+weekColTotal(k),0);
    if(prevYrSp>0){
      const diff=annSpent-prevYrSp;
      const diffStr=diff===0?'Same as':(diff>0?`${cur()}${Math.abs(diff).toFixed(2)} more than`:`${cur()}${Math.abs(diff).toFixed(2)} less than`);
      html+=`<div class="summ-insight" style="background:var(--mo-bg);border-color:var(--mo-hdr)"><h4 style="color:var(--navy)">Year on Year</h4>
        <div class="summ-insight-row"><span class="name">vs ${prevYr}</span><span class="amt" style="color:${diff>0?'var(--red)':diff<0?'var(--green)':'var(--muted)'}">${diffStr} ${prevYr}</span></div>
      </div>`;
    }
  }

  main.innerHTML=`<div class="summ-wrap">${html}</div>`;

  // ── EVENTS ──
  // Toggle
  main.querySelectorAll('[data-sv]').forEach(btn=>{
    btn.onclick=()=>{ summaryView=btn.dataset.sv; renderPage(); };
  });

  // Navigation
  const prev=document.getElementById('sv-prev');
  const next=document.getElementById('sv-next');
  const todayBtn=document.getElementById('sv-today');

  if(prev) prev.onclick=()=>{
    if(summaryView==='week'){
      const allSuns=[];
      let mk2=minMk; while(mk2<=maxMk){ getSundaysForMk(mk2).forEach(s=>allSuns.push(s)); mk2=offsetMk(mk2,1); }
      allSuns.sort();
      const i=allSuns.indexOf(summaryWkKey);
      if(i>0){ summaryWkKey=allSuns[i-1]; renderPage(); }
    } else if(summaryView==='month'){
      if(currentMk>minMk){ currentMk=offsetMk(currentMk,-1); renderPage(); }
    } else if(summaryView==='year'){
      if(summaryYr>minYr){ summaryYr=String(parseInt(summaryYr)-1); renderPage(); }
    }
  };
  if(next) next.onclick=()=>{
    if(summaryView==='week'){
      const allSuns=[];
      let mk2=minMk; while(mk2<=maxMk){ getSundaysForMk(mk2).forEach(s=>allSuns.push(s)); mk2=offsetMk(mk2,1); }
      allSuns.sort();
      const i=allSuns.indexOf(summaryWkKey);
      if(i<allSuns.length-1){ summaryWkKey=allSuns[i+1]; renderPage(); }
    } else if(summaryView==='month'){
      if(currentMk<maxMk){ currentMk=offsetMk(currentMk,1); renderPage(); }
    } else if(summaryView==='year'){
      if(summaryYr<maxYr){ summaryYr=String(parseInt(summaryYr)+1); renderPage(); }
    }
  };
  if(todayBtn) todayBtn.onclick=()=>{
    if(summaryView==='week'){
      const suns=getSundaysForMk(todayMkNow);
      summaryWkKey=suns[Math.min(todayWkIdx(todayMkNow),suns.length-1)];
    } else if(summaryView==='month'){
      currentMk=todayMkNow;
    } else {
      summaryYr=todayYr;
    }
    renderPage();
  };

  // Store expand/collapse
  main.querySelectorAll('[data-toggle]').forEach(el=>{
    el.onclick=()=>{
      const name=el.dataset.toggle;
      if(expanded.has(name)) expanded.delete(name); else expanded.add(name);
      renderPage();
    };
  });

  // Item expand/collapse
  main.querySelectorAll('[data-item-toggle]').forEach(el=>{
    el.onclick=()=>{
      const key='detail-'+el.dataset.itemToggle;
      if(expanded.has(key)) expanded.delete(key); else expanded.add(key);
      renderPage();
    };
  });
}

// CREDIT CARDS PAGE
// ═══════════════════════════════════════════════════════════
function renderCards(main){
  if(!db.cardGroups) db.cardGroups=[];
  if(!db.cards) db.cards=[];
  if(!db.cardData) db.cardData={};
  if(!db.cardData[currentMk]) db.cardData[currentMk]={entries:{}};
  const mcd=db.cardData[currentMk];
  if(!mcd.entries) mcd.entries={};

  const todayMkNow=mkey(new Date());
  const minMk=offsetMk(todayMkNow,-13);
  const maxMk=offsetMk(todayMkNow,12);
  const isCurrent=currentMk===todayMkNow;
  const isFuture=currentMk>todayMkNow;

  let badgeHtml='';
  if(isCurrent) badgeHtml='<span class="mnav-badge today">Today</span>';
  else if(isFuture) badgeHtml='<span class="mnav-badge future">Future</span>';

  // grand total
  const grandTotal=db.cards.reduce((s,card)=>s+n((mcd.entries[card.name]||{}).amount),0);

  let html=`<div class="mnavbar">
    <button class="mnav-btn" id="cmn-prev" ${currentMk<=minMk?'disabled':''}>‹</button>
    <div class="mnav-center"><span class="mnav-month">${mLabel(currentMk)}</span>${badgeHtml}</div>
    <button class="mnav-btn" id="cmn-next" ${currentMk>=maxMk?'disabled':''}>›</button>
  </div>
  <div class="cards-wrap"><div class="cards-grid">`;

  // ── HEADER ROW ──
  html+=`<div class="gc hdr"><div class="hdr-inner"><div class="hdr-lbl">Card</div></div></div>`;
  html+=`<div class="gc hdr"><div class="hdr-inner"><div class="hdr-lbl">Statement date</div></div></div>`;
  html+=`<div class="gc hdr"><div class="hdr-inner"><div class="hdr-lbl">Due date</div></div></div>`;
  html+=`<div class="gc amt-hdr"><div class="hdr-inner"><div class="hdr-lbl">Amount</div></div></div>`;

  if(db.cardGroups.length===0 && db.cards.length===0){
    html+=`<div class="gc" style="grid-column:1/-1;padding:20px 14px;color:var(--muted);font-size:13px;font-style:italic">
      No groups or cards yet — add a group below to get started.
    </div>`;
  } else {
    // ── GROUPS ──
    const allGroups=[...db.cardGroups, {name:'',budget:''}];
    allGroups.forEach(grp=>{
      const grpCards=db.cards.filter(card=>(card.group||'')===grp.name);
      if(grp.name==='' && grpCards.length===0) return; // skip empty ungrouped

      const grpTotal=grpCards.reduce((s,card)=>s+n((mcd.entries[card.name]||{}).amount),0);
      const grpBudget=n(grp.budget);

      // group header row
      if(grp.name){
        html+=`<div class="gc grp-span" style="grid-column:1/-1;background:var(--grp-hdr)">
          <div class="grp-cell">
            <span class="grp-name">${esc(grp.name)}</span>
            <span style="font-size:11px;color:var(--muted);margin-right:6px">Budget:</span>
            <input class="bud-in" type="number" min="0" step="0.01" placeholder="0"
              value="${esc(grp.budget||'')}" data-a="grp-budget" data-grp="${esc(grp.name)}"
              style="width:80px;font-size:13px">
            <button class="grp-del" data-a="del-card-grp" data-grp="${esc(grp.name)}" title="Remove group">×</button>
          </div>
        </div>`;
      }

      // card rows in this group
      grpCards.forEach(card=>{
        const e=mcd.entries[card.name]||{};
        html+=`<div class="gc" style="display:flex;align-items:center;padding:0 8px;height:46px;font-size:13px;font-weight:500;gap:6px">
          <span style="flex:1">${esc(card.name)}</span>
          <button style="background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px;border-radius:4px;font-family:var(--font)" data-a="del-card" data-card="${esc(card.name)}" title="Remove card">×</button>
        </div>`;
        html+=`<div class="gc"><input class="card-in" type="text" placeholder="e.g. 15 Apr"
          value="${esc(e.statDate||'')}" data-a="card-stat" data-card="${esc(card.name)}" autocomplete="off"></div>`;
        html+=`<div class="gc"><input class="card-in" type="text" placeholder="e.g. 22 Apr"
          value="${esc(e.dueDate||'')}" data-a="card-due" data-card="${esc(card.name)}" autocomplete="off"></div>`;
        html+=`<div class="gc amt-cell"><input class="card-in right" type="number" min="0" step="0.01" placeholder="0.00"
          value="${esc(e.amount||'')}" data-a="card-amt" data-card="${esc(card.name)}"></div>`;
      });

      // group subtotal + remaining (only for named groups)
      if(grp.name){
        html+=`<div class="gc sub"><div class="tp lbl">${esc(grp.name)} subtotal</div></div>`;
        html+=`<div class="gc sub"></div>`;
        html+=`<div class="gc sub"></div>`;
        html+=`<div class="gc sub amt-cell"><div class="tp num">${grpTotal>0?fmtPos(grpTotal):'—'}</div></div>`;

        html+=`<div class="gc tot"><div class="tp lbl">Remaining</div></div>`;
        html+=`<div class="gc tot"></div>`;
        html+=`<div class="gc tot"></div>`;
        html+=`<div class="gc tot amt-cell">${remSpan(grpBudget-grpTotal,grpBudget>0,grpTotal)}</div>`;
      }
    });
  }

  // ── GRAND TOTAL ──
  html+=`<div class="gc tot strong-top"><div class="tp lbl">Grand total</div></div>`;
  html+=`<div class="gc tot strong-top"></div>`;
  html+=`<div class="gc tot strong-top"></div>`;
  html+=`<div class="gc tot amt-cell strong-top"><div class="tp num">${grandTotal>0?fmtPos(grandTotal):'—'}</div></div>`;

  html+=`</div></div>`;

  // buttons bar
  html+=`<div class="add-card-bar" style="gap:10px;flex-wrap:wrap">
    <button class="add-grp-btn" id="add-cgrp-btn">＋ Add group</button>
    <button class="add-grp-btn" id="add-card-btn">＋ Add card</button>
  </div>`;

  main.innerHTML=html;

  // Month nav
  document.getElementById('cmn-prev').onclick=()=>{ currentMk=offsetMk(currentMk,-1); renderPage(); };
  document.getElementById('cmn-next').onclick=()=>{ currentMk=offsetMk(currentMk,1); renderPage(); };

  // Add group
  document.getElementById('add-cgrp-btn').onclick=()=>{
    showInputModal('Add card group','Group name (e.g. Food)',name=>{
      if(name&&!db.cardGroups.find(g=>g.name===name)){
        db.cardGroups.push({name,budget:''});
        save();
      }
      renderPage();
    });
  };

  // Add card — ask which group
  document.getElementById('add-card-btn').onclick=()=>{
    showInputModal('Add credit card','Card name (e.g. Barclays)',name=>{
      if(!name) return;
      if(db.cards.find(c=>c.name===name)){ renderPage(); return; }
      if(db.cardGroups.length===0){
        db.cards.push({name,group:''});
        save(); renderPage();
      } else {
        // Ask which group
        const opts=db.cardGroups.map(g=>g.name).concat(['(no group)']);
        const box=document.getElementById('modal-box');
        const ov=document.getElementById('modal-overlay');
        const btns=opts.map((o,i)=>`<button class="modal-btn" data-modal-cb="grp_${i}">${esc(o)}</button>`).join('');
        box.innerHTML=`<div class="modal-title">Assign "${esc(name)}" to a group</div><div class="modal-body">Which group does this card belong to?</div><div class="modal-btns" style="flex-wrap:wrap">${btns}</div>`;
        box._cbs={};
        opts.forEach((o,i)=>{
          box._cbs[`grp_${i}`]=()=>{
            const grp=o==='(no group)'?'':o;
            db.cards.push({name,group:grp});
            save(); renderPage();
          };
        });
        box.style.display='block'; ov.style.display='block';
      }
    });
  };

  // Grid events
  const grid=document.querySelector('.cards-grid');
  if(!grid) return;
  grid.addEventListener('change',e=>{
    const el=e.target; const a=el.dataset.a;
    if(!db.cardData[currentMk]) db.cardData[currentMk]={entries:{}};
    const mcd2=db.cardData[currentMk];
    if(a==='grp-budget'){
      const grp=db.cardGroups.find(g=>g.name===el.dataset.grp);
      if(grp){ grp.budget=el.value; save(); renderPage(); }
    } else if(a==='card-stat'||a==='card-due'||a==='card-amt'){
      const card=el.dataset.card;
      if(!mcd2.entries[card]) mcd2.entries[card]={};
      if(a==='card-stat') mcd2.entries[card].statDate=el.value;
      else if(a==='card-due') mcd2.entries[card].dueDate=el.value;
      else mcd2.entries[card].amount=el.value;
      save(); renderPage();
    }
  });
  grid.addEventListener('click',e=>{
    const a=e.target.dataset.a;
    if(a==='del-card'){
      const cardName=e.target.dataset.card;
      confirmModal(`Remove "${cardName}"?`,'This removes the card and all its payment data.',()=>{
        const i=db.cards.findIndex(c=>c.name===cardName); if(i>-1) db.cards.splice(i,1);
        Object.values(db.cardData).forEach(md=>{ if(md.entries) delete md.entries[cardName]; });
        save(); renderPage();
      },'Remove','danger');
    } else if(a==='del-card-grp'){
      const grpName=e.target.dataset.grp;
      confirmModal(`Remove group "${grpName}"?`,'Cards in this group will become ungrouped. No payment data is deleted.',()=>{
        const i=db.cardGroups.findIndex(g=>g.name===grpName); if(i>-1) db.cardGroups.splice(i,1);
        db.cards.forEach(c=>{ if(c.group===grpName) c.group=''; });
        save(); renderPage();
      },'Remove','danger');
    }
  });
}

        save(); renderPage();
      },'Remove','danger');
    } else if(a==='rename-card-grp'){
      showInputModal(`Rename "${val}"`,val,newName=>{
        if(newName&&newName!==val){
          const g=db.cardGroups.find(g=>g.name===val); if(g) g.name=newName;
          db.cards.forEach(c=>{ if(c.group===val) c.group=newName; });
          save(); renderPage();
        }
      });

  function detectDevice(){

    const safari=/^((?!chrome|android).)*safari/i.test(ua);
    const mac=/Mac/.test(navigator.platform||'')&&!ios;
    if(ios) return 'ios';
    if(mac&&safari) return 'mac-safari';
    return 'desktop'; // Chrome, Firefox, Edge on PC or Mac
  }
